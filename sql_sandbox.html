<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity SQL Sandbox</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --surface: #1a1d27;
            --surface-2: #282a36;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --primary: #10b981; 
            --primary-hover: #059669;
            --action: #6366f1;
            --action-hover: #4f46e5;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Navbar */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .brand { font-weight: 600; color: white; display: flex; align-items: center; gap: 10px; }
        .nav-actions { display: flex; gap: 10px; }
        
        /* Main Layout */
        .workspace {
            display: flex;
            height: calc(100vh - 60px);
            padding: 0.5rem;
            gap: 0.5rem;
        }
        .panel {
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .left-pane { flex: 1; min-width: 30%; max-width: 50%; }
        .right-pane { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .panel-header {
            background: rgba(255,255,255,0.03);
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        
        /* Content Styling (LeetCode HTML) */
        .content-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #d1d5db;
        }
        .content-body h1 { font-size: 1.5rem; margin-bottom: 1rem; color: white; }
        .content-body pre {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--border);
        }
        .content-body code {
            background: rgba(255,255,255,0.1);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
        }
        .content-body strong { color: white; }
        
        /* Editor */
        .editor-env { flex: 1; display: flex; flex-direction: column; }
        .CodeMirror { height: 100% !important; font-family: 'Fira Code', monospace; font-size: 14px; background: transparent !important; }
        
        /* Run / Submit */
        .btn {
            border: none; border-radius: 4px; padding: 6px 16px; font-weight: 500;
            font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: white;
        }
        .btn-run { background: var(--surface-2); border: 1px solid var(--border); }
        .btn-run:hover { background: rgba(255,255,255,0.1); }
        .btn-submit { background: var(--primary); }
        .btn-submit:hover { background: var(--primary-hover); }
        
        /* Output Console */
        .console-env { flex: 1; display: flex; flex-direction: column; background: #12141c; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { padding: 8px 16px; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: white; border-bottom-color: var(--action); }
        .console-body { padding: 1rem; overflow-y: auto; flex: 1; font-family: 'Fira Code', monospace; font-size: 0.85rem; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 0.5rem; }
        th, td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
        th { background: rgba(255,255,255,0.05); color: var(--text-dim); }
        
        .success-text { color: var(--primary); font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .err-text { color: var(--danger); background: rgba(239,68,68,0.1); padding: 10px; border-radius: 4px; border: 1px solid rgba(239,68,68,0.2); }
    </style>
</head>
<body x-data="sqlApp()">
    
    <header>
        <div class="brand">🚀 Antigravity SQL IDE</div>
        <div class="nav-actions">
            <!-- Cannot validate against hidden DB locally, explaining via tooltip -->
            <button class="btn btn-run" @click="executeQuery()">▶ Run Code</button>
            <button class="btn btn-submit" @click="submitCode()" title="Validates against sample dataset">✅ Submit</button>
        </div>
    </header>

    <div class="workspace">
        
        <div class="panel left-pane">
            <div class="panel-header">📝 Description</div>
            <div class="content-body">
                <template x-if="!dbLoaded">
                    <div>Loading problem data...</div>
                </template>
                <div x-html="activeContent"></div>
            </div>
        </div>
        
        <div class="right-pane">
            <div class="panel editor-env">
                <div class="panel-header">
                    <span>MySQL 8.0</span>
                    <span style="display:flex; gap:10px;">
                        <span style="font-size: 0.75rem; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; cursor:pointer;" @click="insertTemplate()">Reset</span>
                    </span>
                </div>
                <div id="editorWrap" style="flex:1; overflow:hidden;"></div>
            </div>
            
            <div class="panel console-env">
                <div class="tabs">
                    <div class="tab" :class="activeTab === 'result' ? 'active' : ''" @click="activeTab = 'result'">Testcase Result</div>
                    <div class="tab" :class="activeTab === 'schema' ? 'active' : ''" @click="activeTab = 'schema'">Database State</div>
                </div>
                
                <div class="console-body" x-show="activeTab === 'result'">
                    <template x-if="!executed && !error">
                        <div style="color:var(--text-dim);">Run code to see results...</div>
                    </template>
                    <template x-if="error">
                        <div class="err-text" x-text="error"></div>
                    </template>
                    <template x-if="executed && !error">
                        <div>
                            <div :class="statusClass" x-text="statusMsg"></div>
                            
                            <div style="margin-bottom: 5px; color:var(--text-dim);">Your Output:</div>
                            <template x-if="results.length > 0">
                                <table style="margin-bottom:20px;">
                                    <thead><tr><template x-for="col in results[0].columns"><th x-text="col"></th></template></tr></thead>
                                    <tbody>
                                        <template x-for="row in results[0].values">
                                            <tr><template x-for="val in row"><td x-text="val !== null ? val : 'null'"></td></template></tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template x-if="results.length === 0">
                                <div style="margin-bottom:20px; color:var(--text-dim);">No rows returned.</div>
                            </template>
                            
                            <!-- Detailed diffing -->
                            <template x-if="isValidationFailed && expectedResults.length > 0">
                                <div style="margin-top: 10px;">
                                    <div style="margin-bottom: 5px; color:var(--text-dim);">Expected Output (Hidden Dataset):</div>
                                    <table>
                                        <thead><tr><template x-for="col in expectedResults[0].columns"><th x-text="col"></th></template></tr></thead>
                                        <tbody>
                                            <template x-for="row in expectedResults[0].values">
                                                <tr><template x-for="val in row"><td x-text="val !== null ? val : 'null'"></td></template></tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                
                <div class="console-body" x-show="activeTab === 'schema'">
                    <div x-html="schemaHTML"></div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // Bake the JSON directly into memory
        const dbMeta = {"duplicate-emails": {"title": "Duplicate Emails", "schemas": ["Create table If Not Exists Person (id int, email varchar(255))", "DELETE FROM  Person", "insert into Person (id, email) values ('1', 'a@b.com')", "insert into Person (id, email) values ('2', 'c@d.com')", "insert into Person (id, email) values ('3', 'a@b.com')"], "content": "<p>Table: <code>Person</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| email       | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains an email. The emails will not contain uppercase letters.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to report all the duplicate emails. Note that it&#39;s guaranteed that the email&nbsp;field is not NULL.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nPerson table:\n+----+---------+\n| id | email   |\n+----+---------+\n| 1  | a@b.com |\n| 2  | c@d.com |\n| 3  | a@b.com |\n+----+---------+\n<strong>Output:</strong> \n+---------+\n| Email   |\n+---------+\n| a@b.com |\n+---------+\n<strong>Explanation:</strong> a@b.com is repeated two times.\n</pre>\n", "shadow": {"inserts": ["DELETE FROM Person", "insert into Person (id, email) values ('1', 'a@b.com')", "insert into Person (id, email) values ('2', 'c@d.com')", "insert into Person (id, email) values ('3', 'a@b.com')", "insert into Person (id, email) values ('4', 'a@b.com')", "insert into Person (id, email) values ('5', 'z@z.com')", "insert into Person (id, email) values ('6', 'c@d.com')"], "gold": "SELECT email as Email FROM Person GROUP BY email HAVING count(email) > 1"}}, "classes-more-than-5-students": {"title": "Classes More Than 5 Students", "schemas": [], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>There is a table <code>courses</code> with columns: <b>student</b> and <b>class</b></p>\n<p>Please list out all classes which have more than or equal to 5 students.</p>\n<p>For example, the table:</p>\n<pre>\n+---------+------------+\n| student | class      |\n+---------+------------+\n| A       | Math       |\n| B       | English    |\n| C       | Math       |\n| D       | Biology    |\n| E       | Math       |\n| F       | Computer   |\n| G       | Math       |\n| H       | Math       |\n| I       | Math       |\n+---------+------------+\n</pre>\n<p>Should output:</p>\n<pre>\n+---------+\n| class   |\n+---------+\n| Math    |\n+---------+\n</pre>\n<p>\u00a0</p>\n<p><b>Note:</b><br/>\n        The students should not be counted duplicate in each course.</p>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-07-18-596-Classes-More-Than-\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">596-Classes-More-Than-</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>", "shadow": {"inserts": ["DELETE FROM Courses", "insert into Courses (student, class) values ('A', 'Math')", "insert into Courses (student, class) values ('B', 'Math')", "insert into Courses (student, class) values ('C', 'Math')", "insert into Courses (student, class) values ('D', 'Math')", "insert into Courses (student, class) values ('E', 'Math')", "insert into Courses (student, class) values ('F', 'Math')", "insert into Courses (student, class) values ('G', 'Physics')"], "gold": "SELECT class FROM Courses GROUP BY class HAVING COUNT(student) >= 5"}}, "customers-who-bought-all-products": {"title": "Customers Who Bought All Products", "schemas": ["Create table If Not Exists Customer (customer_id int, product_key int)", "Create table Product (product_key int)", "DELETE FROM  Customer", "insert into Customer (customer_id, product_key) values ('1', '5')", "insert into Customer (customer_id, product_key) values ('2', '6')", "insert into Customer (customer_id, product_key) values ('3', '5')", "insert into Customer (customer_id, product_key) values ('3', '6')", "insert into Customer (customer_id, product_key) values ('1', '6')", "DELETE FROM  Product", "insert into Product (product_key) values ('5')", "insert into Product (product_key) values ('6')"], "content": "<p>Table: <code>Customer</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| customer_id | int     |\n| product_key | int     |\n+-------------+---------+\nThis table may contain duplicates rows. \n<code>customer_id</code> is not NULL<code>.</code>\nproduct_key is a foreign key (reference column) to <code>Product</code> table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Product</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| product_key | int     |\n+-------------+---------+\nproduct_key is the primary key (column with unique values) for this table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to report the customer ids from the <code>Customer</code> table that bought all the products in the <code>Product</code> table.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nCustomer table:\n+-------------+-------------+\n| customer_id | product_key |\n+-------------+-------------+\n| 1           | 5           |\n| 2           | 6           |\n| 3           | 5           |\n| 3           | 6           |\n| 1           | 6           |\n+-------------+-------------+\nProduct table:\n+-------------+\n| product_key |\n+-------------+\n| 5           |\n| 6           |\n+-------------+\n<strong>Output:</strong> \n+-------------+\n| customer_id |\n+-------------+\n| 1           |\n| 3           |\n+-------------+\n<strong>Explanation:</strong> \nThe customers who bought all the products (5 and 6) are customers with IDs 1 and 3.\n</pre>\n"}, "immediate-food-delivery-ii": {"title": "Immediate Food Delivery II", "schemas": ["Create table If Not Exists Delivery (delivery_id int, customer_id int, order_date date, customer_pref_delivery_date date)", "DELETE FROM  Delivery", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('1', '1', '2019-08-01', '2019-08-02')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('2', '2', '2019-08-02', '2019-08-02')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('3', '1', '2019-08-11', '2019-08-12')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('4', '3', '2019-08-24', '2019-08-24')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('5', '3', '2019-08-21', '2019-08-22')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('6', '2', '2019-08-11', '2019-08-13')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('7', '4', '2019-08-09', '2019-08-09')"], "content": "<p>Table: <code>Delivery</code></p>\n\n<pre>\n+-----------------------------+---------+\n| Column Name                 | Type    |\n+-----------------------------+---------+\n| delivery_id                 | int     |\n| customer_id                 | int     |\n| order_date                  | date    |\n| customer_pref_delivery_date | date    |\n+-----------------------------+---------+\ndelivery_id is the column of unique values of this table.\nThe table holds information about food delivery to customers that make orders at some date and specify a preferred delivery date (on the same order date or after it).\n</pre>\n\n<p>&nbsp;</p>\n\n<p>If the customer&#39;s preferred delivery date is the same as the order date, then the order is called <strong>immediate;</strong> otherwise, it is called <strong>scheduled</strong>.</p>\n\n<p>The <strong>first order</strong> of a customer is the order with the earliest order date that the customer made. It is guaranteed that a customer has precisely one first order.</p>\n\n<p>Write a solution to find the percentage of immediate orders in the first orders of all customers, <strong>rounded to 2 decimal places</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nDelivery table:\n+-------------+-------------+------------+-----------------------------+\n| delivery_id | customer_id | order_date | customer_pref_delivery_date |\n+-------------+-------------+------------+-----------------------------+\n| 1           | 1           | 2019-08-01 | 2019-08-02                  |\n| 2           | 2           | 2019-08-02 | 2019-08-02                  |\n| 3           | 1           | 2019-08-11 | 2019-08-12                  |\n| 4           | 3           | 2019-08-24 | 2019-08-24                  |\n| 5           | 3           | 2019-08-21 | 2019-08-22                  |\n| 6           | 2           | 2019-08-11 | 2019-08-13                  |\n| 7           | 4           | 2019-08-09 | 2019-08-09                  |\n+-------------+-------------+------------+-----------------------------+\n<strong>Output:</strong> \n+----------------------+\n| immediate_percentage |\n+----------------------+\n| 50.00                |\n+----------------------+\n<strong>Explanation:</strong> \nThe customer id 1 has a first order with delivery id 1 and it is scheduled.\nThe customer id 2 has a first order with delivery id 2 and it is immediate.\nThe customer id 3 has a first order with delivery id 5 and it is scheduled.\nThe customer id 4 has a first order with delivery id 7 and it is immediate.\nHence, half the customers have immediate first orders.\n</pre>\n"}, "average-salary-departments-vs-company": {"title": "Average Salary: Departments vs Company", "schemas": ["Create table If Not Exists Salary (id int, employee_id int, amount int, pay_date date)", "Create table If Not Exists Employee (employee_id int, department_id int)", "DELETE FROM  Salary", "insert into Salary (id, employee_id, amount, pay_date) values ('1', '1', '9000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('2', '2', '6000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('3', '3', '10000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('4', '1', '7000', '2017/02/28')", "insert into Salary (id, employee_id, amount, pay_date) values ('5', '2', '6000', '2017/02/28')", "insert into Salary (id, employee_id, amount, pay_date) values ('6', '3', '8000', '2017/02/28')", "DELETE FROM  Employee", "insert into Employee (employee_id, department_id) values ('1', '1')", "insert into Employee (employee_id, department_id) values ('2', '2')", "insert into Employee (employee_id, department_id) values ('3', '2')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n\n    Given two tables as below, write a query to display the comparison result (higher/lower/same) of\n    the average salary of employees in a department to the company's average salary.\n    <p>\u00a0</p>\n    Table: <code>salary</code>\n<pre>\n| id | employee_id | amount | pay_date   |\n|----|-------------|--------|------------|\n| 1  | 1           | 9000   | 2017-03-31 |\n| 2  | 2           | 6000   | 2017-03-31 |\n| 3  | 3           | 10000  | 2017-03-31 |\n| 4  | 1           | 7000   | 2017-02-28 |\n| 5  | 2           | 6000   | 2017-02-28 |\n| 6  | 3           | 8000   | 2017-02-28 |\n</pre>\n<p>\u00a0</p>\n    The <b>employee_id</b> column refers to the <b>employee_id</b> in the following table <code>employee</code>.\n\n    <p>\u00a0</p>\n<pre>\n| employee_id | department_id |\n|-------------|---------------|\n| 1           | 1             |\n| 2           | 2             |\n| 3           | 2             |\n</pre>\n<p>\u00a0</p>\n    So for the sample data above, the result is:\n\n    <p>\u00a0</p>\n<pre>\n| pay_month | department_id | comparison  |\n|-----------|---------------|-------------|\n| 2017-03   | 1             | higher      |\n| 2017-03   | 2             | lower       |\n| 2017-02   | 1             | same        |\n| 2017-02   | 2             | same        |\n</pre>\n<p>\u00a0</p>\n<b>Explanation</b>\n<p>\u00a0</p>\n    In March, the company's average salary is (9000+6000+10000)/3 = 8333.33...\n\n    <p>\u00a0</p>\n    The average salary for department '1' is 9000, which is the salary of <b>employee_id</b>\n    '1' since there is only one employee in this department. So the comparison result is\n    'higher' since 9000 &gt; 8333.33 obviously.\n\n    <p>\u00a0</p>\n    The average salary of department '2' is (6000 + 10000)/2 = 8000, which is the average of\n    <b>employee_id</b> '2' and '3'. So the comparison result is 'lower'\n    since 8000 &lt; 8333.33.\n\n    <p>\u00a0</p>\n    With he same formula for the average salary comparison in February, the result is 'same'\n    since both the department '1' and '2' have the same average salary with the\n    company, which is 7000.\n\n    <p>\u00a0</p>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-08-06-615-Average-Salary-Departments-VS-Company\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">615-Average-Salary-Departments-VS-Company</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "customers-who-never-order": {"title": "Customers Who Never Order", "schemas": ["Create table If Not Exists Customers (id int, name varchar(255))", "Create table If Not Exists Orders (id int, customerId int)", "DELETE FROM  Customers", "insert into Customers (id, name) values ('1', 'Joe')", "insert into Customers (id, name) values ('2', 'Henry')", "insert into Customers (id, name) values ('3', 'Sam')", "insert into Customers (id, name) values ('4', 'Max')", "DELETE FROM  Orders", "insert into Orders (id, customerId) values ('1', '3')", "insert into Orders (id, customerId) values ('2', '1')"], "content": "<p>Table: <code>Customers</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table indicates the ID and name of a customer.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Orders</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| customerId  | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\ncustomerId is a foreign key (reference columns) of the ID from the Customers table.\nEach row of this table indicates the ID of an order and the ID of the customer who ordered it.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find all customers who never order anything.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nCustomers table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | Joe   |\n| 2  | Henry |\n| 3  | Sam   |\n| 4  | Max   |\n+----+-------+\nOrders table:\n+----+------------+\n| id | customerId |\n+----+------------+\n| 1  | 3          |\n| 2  | 1          |\n+----+------------+\n<strong>Output:</strong> \n+-----------+\n| Customers |\n+-----------+\n| Henry     |\n| Max       |\n+-----------+\n</pre>\n", "shadow": {"inserts": ["DELETE FROM Customers", "DELETE FROM Orders", "insert into Customers (id, name) values ('1', 'Joe')", "insert into Customers (id, name) values ('2', 'Henry')", "insert into Customers (id, name) values ('3', 'Sam')", "insert into Customers (id, name) values ('4', 'Max')", "insert into Customers (id, name) values ('5', 'Naveen')", "insert into Orders (id, customerId) values ('1', '3')", "insert into Orders (id, customerId) values ('2', '1')"], "gold": "SELECT name as Customers FROM Customers WHERE id NOT IN (SELECT customerId FROM Orders)"}}, "department-highest-salary": {"title": "Department Highest Salary", "schemas": ["Create table If Not Exists Employee (id int, name varchar(255), salary int, departmentId int)", "Create table If Not Exists Department (id int, name varchar(255))", "DELETE FROM  Employee", "insert into Employee (id, name, salary, departmentId) values ('1', 'Joe', '70000', '1')", "insert into Employee (id, name, salary, departmentId) values ('2', 'Jim', '90000', '1')", "insert into Employee (id, name, salary, departmentId) values ('3', 'Henry', '80000', '2')", "insert into Employee (id, name, salary, departmentId) values ('4', 'Sam', '60000', '2')", "insert into Employee (id, name, salary, departmentId) values ('5', 'Max', '90000', '1')", "DELETE FROM  Department", "insert into Department (id, name) values ('1', 'IT')", "insert into Department (id, name) values ('2', 'Sales')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| id           | int     |\n| name         | varchar |\n| salary       | int     |\n| departmentId | int     |\n+--------------+---------+\nid is the primary key (column with unique values) for this table.\ndepartmentId is a foreign key (reference columns) of the ID from the <code>Department </code>table.\nEach row of this table indicates the ID, name, and salary of an employee. It also contains the ID of their department.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Department</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table. It is guaranteed that department name is not <code>NULL.</code>\nEach row of this table indicates the ID of a department and its name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find employees who have the highest salary in each of the departments.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+-------+--------+--------------+\n| id | name  | salary | departmentId |\n+----+-------+--------+--------------+\n| 1  | Joe   | 70000  | 1            |\n| 2  | Jim   | 90000  | 1            |\n| 3  | Henry | 80000  | 2            |\n| 4  | Sam   | 60000  | 2            |\n| 5  | Max   | 90000  | 1            |\n+----+-------+--------+--------------+\nDepartment table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | IT    |\n| 2  | Sales |\n+----+-------+\n<strong>Output:</strong> \n+------------+----------+--------+\n| Department | Employee | Salary |\n+------------+----------+--------+\n| IT         | Jim      | 90000  |\n| Sales      | Henry    | 80000  |\n| IT         | Max      | 90000  |\n+------------+----------+--------+\n<strong>Explanation:</strong> Max and Jim both have the highest salary in the IT department and Henry has the highest salary in the Sales department.\n</pre>\n", "shadow": {"inserts": ["DELETE FROM Employee", "DELETE FROM Department", "insert into Employee (id, name, salary, departmentId) values ('1', 'Joe', '70000', '1')", "insert into Employee (id, name, salary, departmentId) values ('2', 'Jim', '90000', '1')", "insert into Employee (id, name, salary, departmentId) values ('3', 'Henry', '80000', '2')", "insert into Employee (id, name, salary, departmentId) values ('4', 'Sam', '60000', '2')", "insert into Employee (id, name, salary, departmentId) values ('5', 'Max', '90000', '1')", "insert into Department (id, name) values ('1', 'IT')", "insert into Department (id, name) values ('2', 'Sales')"], "gold": "SELECT d.name as Department, e.name as Employee, e.salary as Salary FROM Employee e JOIN Department d ON e.departmentId = d.id WHERE (e.departmentId, e.salary) IN (SELECT departmentId, MAX(salary) FROM Employee GROUP BY departmentId)"}}, "exchange-seats": {"title": "Exchange Seats", "schemas": ["Create table If Not Exists Seat (id int, student varchar(255))", "DELETE FROM  Seat", "insert into Seat (id, student) values ('1', 'Abbot')", "insert into Seat (id, student) values ('2', 'Doris')", "insert into Seat (id, student) values ('3', 'Emerson')", "insert into Seat (id, student) values ('4', 'Green')", "insert into Seat (id, student) values ('5', 'Jeames')"], "content": "<p>Table: <code>Seat</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| student     | varchar |\n+-------------+---------+\nid is the primary key (unique value) column for this table.\nEach row of this table indicates the name and the ID of a student.\nThe ID sequence always starts from 1 and increments continuously.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to swap the seat id of every two consecutive students. If the number of students is odd, the id of the last student is not swapped.</p>\n\n<p>Return the result table ordered by <code>id</code> <strong>in ascending order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nSeat table:\n+----+---------+\n| id | student |\n+----+---------+\n| 1  | Abbot   |\n| 2  | Doris   |\n| 3  | Emerson |\n| 4  | Green   |\n| 5  | Jeames  |\n+----+---------+\n<strong>Output:</strong> \n+----+---------+\n| id | student |\n+----+---------+\n| 1  | Doris   |\n| 2  | Abbot   |\n| 3  | Green   |\n| 4  | Emerson |\n| 5  | Jeames  |\n+----+---------+\n<strong>Explanation:</strong> \nNote that if the number of students is odd, there is no need to change the last one&#39;s seat.\n</pre>\n", "shadow": {"inserts": ["DELETE FROM Seat", "insert into Seat (id, student) values ('1', 'Abbot')", "insert into Seat (id, student) values ('2', 'Doris')", "insert into Seat (id, student) values ('3', 'Emerson')", "insert into Seat (id, student) values ('4', 'Green')", "insert into Seat (id, student) values ('5', 'Jeames')"], "gold": "SELECT CASE WHEN MOD(id, 2) != 0 AND id != (SELECT COUNT(*) FROM Seat) THEN id + 1 WHEN MOD(id, 2) != 0 AND id = (SELECT COUNT(*) FROM Seat) THEN id ELSE id - 1 END AS id, student FROM Seat ORDER BY id ASC"}}, "median-employee-salary": {"title": "Median Employee Salary", "schemas": ["Create table If Not Exists Employee (id int, company varchar(255), salary int)", "DELETE FROM  Employee", "insert into Employee (id, company, salary) values ('1', 'A', '2341')", "insert into Employee (id, company, salary) values ('2', 'A', '341')", "insert into Employee (id, company, salary) values ('3', 'A', '15')", "insert into Employee (id, company, salary) values ('4', 'A', '15314')", "insert into Employee (id, company, salary) values ('5', 'A', '451')", "insert into Employee (id, company, salary) values ('6', 'A', '513')", "insert into Employee (id, company, salary) values ('7', 'B', '15')", "insert into Employee (id, company, salary) values ('8', 'B', '13')", "insert into Employee (id, company, salary) values ('9', 'B', '1154')", "insert into Employee (id, company, salary) values ('10', 'B', '1345')", "insert into Employee (id, company, salary) values ('11', 'B', '1221')", "insert into Employee (id, company, salary) values ('12', 'B', '234')", "insert into Employee (id, company, salary) values ('13', 'C', '2345')", "insert into Employee (id, company, salary) values ('14', 'C', '2645')", "insert into Employee (id, company, salary) values ('15', 'C', '2645')", "insert into Employee (id, company, salary) values ('16', 'C', '2652')", "insert into Employee (id, company, salary) values ('17', 'C', '65')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Employee</code> table holds all employees. The employee table has three columns:\n        Employee Id, Company Name, and Salary.</p>\n<pre>\n+-----+------------+--------+\n|Id   | Company    | Salary |\n+-----+------------+--------+\n|1    | A          | 2341   |\n|2    | A          | 341    |\n|3    | A          | 15     |\n|4    | A          | 15314  |\n|5    | A          | 451    |\n|6    | A          | 513    |\n|7    | B          | 15     |\n|8    | B          | 13     |\n|9    | B          | 1154   |\n|10   | B          | 1345   |\n|11   | B          | 1221   |\n|12   | B          | 234    |\n|13   | C          | 2345   |\n|14   | C          | 2645   |\n|15   | C          | 2645   |\n|16   | C          | 2652   |\n|17   | C          | 65     |\n+-----+------------+--------+\n</pre>\n<p>Write a SQL query to find the median salary of each company. Bonus points if you can solve it\n        without using any built-in SQL functions.</p>\n<pre>\n+-----+------------+--------+\n|Id   | Company    | Salary |\n+-----+------------+--------+\n|5    | A          | 451    |\n|6    | A          | 513    |\n|12   | B          | 234    |\n|9    | B          | 1154   |\n|14   | C          | 2645   |\n+-----+------------+--------+\n</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-06-21-569-Median-Employee-Salary\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">569-Median-Employee-Salary</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "game-play-analysis-v": {"title": "Game Play Analysis V", "schemas": ["Create table If Not Exists Activity (player_id int, device_id int, event_date date, games_played int)", "DELETE FROM  Activity", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-01', '5')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-02', '6')", "insert into Activity (player_id, device_id, event_date, games_played) values ('2', '3', '2017-06-25', '1')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '1', '2016-03-01', '0')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '4', '2018-07-03', '5')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table:\u00a0<code>Activity</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| player_id    | int     |\n| device_id    | int     |\n| event_date   | date    |\n| games_played | int     |\n+--------------+---------+\n(player_id, event_date) is the primary key of this table.\nThis table shows the activity of players of some game.\nEach row is a record of a player who logged in and played a number of games (possibly 0) before logging out on some day using some device.\n</pre>\n<p>\u00a0</p>\n<p>We define the <em>install date</em> of a player to be the first login day of that player.</p>\n<p>We also define <em>day 1 retention</em>\u00a0of some date <code>X</code>\u00a0to be the\n        number\u00a0of players whose install date is\u00a0<code>X</code>\u00a0and they logged back\n        in on the day right after <code>X</code>, divided by the number of players whose install\n        date is\u00a0<code>X</code>, <strong>rounded to 2 decimal places</strong>.</p>\n<p>Write an SQL query that reports for each <strong>install date</strong>, the <strong>number\u00a0of\n        players</strong> that installed the game on that day and the <strong>day 1\n        retention</strong>.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nActivity table:\n+-----------+-----------+------------+--------------+\n| player_id | device_id | event_date | games_played |\n+-----------+-----------+------------+--------------+\n| 1         | 2         | 2016-03-01 | 5            |\n| 1         | 2         | 2016-03-02 | 6            |\n| 2         | 3         | 2017-06-25 | 1            |\n| 3         | 1         | 2016-03-01 | 0            |\n| 3         | 4         | 2016-07-03 | 5            |\n+-----------+-----------+------------+--------------+\n\nResult table:\n+------------+----------+----------------+\n| install_dt | installs | Day1_retention |\n+------------+----------+----------------+\n| 2016-03-01 | 2        | 0.50           |\n| 2017-06-25 | 1        | 0.00           |\n+------------+----------+----------------+\nPlayer 1 and 3 installed the game on 2016-03-01 but only player 1 logged back in on 2016-03-02 so the day 1 retention of 2016-03-01 is 1 / 2 = 0.50\nPlayer 2 installed the game on 2017-06-25 but didn't log back in on 2017-06-26 so the day 1 retention of 2017-06-25 is 0 / 1 = 0.00\n</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2018-12-01-1097-Game-Play-Analysis-V\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1097-Game-Play-Analysis-V</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "employees-earning-more-than-managers": {"title": "Employees Earning More Than Managers", "schemas": [], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Employee</code> table holds all employees including their managers. Every employee\n        has an Id, and there is also a column for the manager Id.</p>\n<pre>\n+----+-------+--------+-----------+\n| Id | Name  | Salary | ManagerId |\n+----+-------+--------+-----------+\n| 1  | Joe   | 70000  | 3         |\n| 2  | Henry | 80000  | 4         |\n| 3  | Sam   | 60000  | NULL      |\n| 4  | Max   | 90000  | NULL      |\n+----+-------+--------+-----------+\n</pre>\n<p>Given the <code>Employee</code> table, write a SQL query that finds out employees who earn\n        more than their managers. For the above table, Joe is the only employee who earns more than\n        his manager.</p>\n<pre>\n+----------+\n| Employee |\n+----------+\n| Joe      |\n+----------+\n</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n\n\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2016-05-29-181-Employees-Earning-More-Than-Their-Managers\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">181-Employees-Earning-More-Than-Their-Managers</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "friend-requests-ii": {"title": "Friend Requests II", "schemas": [], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n\n    In social network like Facebook or Twitter, people send friend requests and accept others'\n    requests as well.\n    <p>\u00a0</p>\n    Table <code>request_accepted</code> holds the data of friend acceptance, while\n    <b>requester_id</b> and <b>accepter_id</b> both are the id of a person.\n\n    <p>\u00a0</p>\n<pre>\n| requester_id | accepter_id | accept_date|\n|--------------|-------------|------------|\n| 1            | 2           | 2016_06-03 |\n| 1            | 3           | 2016-06-08 |\n| 2            | 3           | 2016-06-08 |\n| 3            | 4           | 2016-06-09 |\n</pre>\n    Write a query to find the the people who has most friends and the most friends number. For the\n    sample data above, the result is:\n\n    <pre>\n| id | num |\n|----|-----|\n| 3  | 3   |\n</pre>\n<b>Note:</b>\n<ul>\n<li>It is guaranteed there is only 1 people having the most friends.</li>\n<li>The friend request could only been accepted once, which mean there is no multiple\n            records with the same <b>requester_id</b> and <b>accepter_id</b> value.\n            <p>\u00a0</p>\n<b>Explanation:</b><br/>\n            The person with id '3' is a friend of people '1', '2' and '4',\n            so he has 3 friends in total, which is the most number than any others.\n            <p>\u00a0</p>\n<b>Follow-up:</b><br/>\n            In the real world, multiple people could have the same most number of friends, can you\n            find all these people in this case?\n        </li>\n</ul>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-07-24-602-Friend-Requests-II-Who-Has-the-Most-Friends\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">602-Friend-Requests-II-Who-Has-the-Most-Friends</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "market-analysis-i": {"title": "Market Analysis I", "schemas": ["Create table If Not Exists Users (user_id int, join_date date, favorite_brand varchar(10))", "Create table If Not Exists Orders (order_id int, order_date date, item_id int, buyer_id int, seller_id int)", "Create table If Not Exists Items (item_id int, item_brand varchar(10))", "DELETE FROM  Users", "insert into Users (user_id, join_date, favorite_brand) values ('1', '2018-01-01', 'Lenovo')", "insert into Users (user_id, join_date, favorite_brand) values ('2', '2018-02-09', 'Samsung')", "insert into Users (user_id, join_date, favorite_brand) values ('3', '2018-01-19', 'LG')", "insert into Users (user_id, join_date, favorite_brand) values ('4', '2018-05-21', 'HP')", "DELETE FROM  Orders", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('1', '2019-08-01', '4', '1', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('2', '2018-08-02', '2', '1', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('3', '2019-08-03', '3', '2', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('4', '2018-08-04', '1', '4', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('5', '2018-08-04', '1', '3', '4')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('6', '2019-08-05', '2', '2', '4')", "DELETE FROM  Items", "insert into Items (item_id, item_brand) values ('1', 'Samsung')", "insert into Items (item_id, item_brand) values ('2', 'Lenovo')", "insert into Items (item_id, item_brand) values ('3', 'LG')", "insert into Items (item_id, item_brand) values ('4', 'HP')"], "content": "<p>Table: <code>Users</code></p>\n\n<pre>\n+----------------+---------+\n| Column Name    | Type    |\n+----------------+---------+\n| user_id        | int     |\n| join_date      | date    |\n| favorite_brand | varchar |\n+----------------+---------+\nuser_id is the primary key (column with unique values) of this table.\nThis table has the info of the users of an online shopping website where users can sell and buy items.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Orders</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| order_date    | date    |\n| item_id       | int     |\n| buyer_id      | int     |\n| seller_id     | int     |\n+---------------+---------+\norder_id is the primary key (column with unique values) of this table.\nitem_id is a foreign key (reference column) to the Items table.\nbuyer_id and seller_id are foreign keys to the Users table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Items</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| item_id       | int     |\n| item_brand    | varchar |\n+---------------+---------+\nitem_id is the primary key (column with unique values) of this table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution&nbsp;to find for each user, the join date and the number of orders they made as a buyer in <code>2019</code>.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nUsers table:\n+---------+------------+----------------+\n| user_id | join_date  | favorite_brand |\n+---------+------------+----------------+\n| 1       | 2018-01-01 | Lenovo         |\n| 2       | 2018-02-09 | Samsung        |\n| 3       | 2018-01-19 | LG             |\n| 4       | 2018-05-21 | HP             |\n+---------+------------+----------------+\nOrders table:\n+----------+------------+---------+----------+-----------+\n| order_id | order_date | item_id | buyer_id | seller_id |\n+----------+------------+---------+----------+-----------+\n| 1        | 2019-08-01 | 4       | 1        | 2         |\n| 2        | 2018-08-02 | 2       | 1        | 3         |\n| 3        | 2019-08-03 | 3       | 2        | 3         |\n| 4        | 2018-08-04 | 1       | 4        | 2         |\n| 5        | 2018-08-04 | 1       | 3        | 4         |\n| 6        | 2019-08-05 | 2       | 2        | 4         |\n+----------+------------+---------+----------+-----------+\nItems table:\n+---------+------------+\n| item_id | item_brand |\n+---------+------------+\n| 1       | Samsung    |\n| 2       | Lenovo     |\n| 3       | LG         |\n| 4       | HP         |\n+---------+------------+\n<strong>Output:</strong> \n+-----------+------------+----------------+\n| buyer_id  | join_date  | orders_in_2019 |\n+-----------+------------+----------------+\n| 1         | 2018-01-01 | 1              |\n| 2         | 2018-02-09 | 2              |\n| 3         | 2018-01-19 | 0              |\n| 4         | 2018-05-21 | 0              |\n+-----------+------------+----------------+\n</pre>\n"}, "trips-and-users": {"title": "Trips and Users", "schemas": ["Create table If Not Exists Trips (id int, client_id int, driver_id int, city_id int, status ENUM('completed', 'cancelled_by_driver', 'cancelled_by_client'), request_at varchar(50))", "Create table If Not Exists Users (users_id int, banned varchar(50), role ENUM('client', 'driver', 'partner'))", "DELETE FROM  Trips", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('1', '1', '10', '1', 'completed', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('2', '2', '11', '1', 'cancelled_by_driver', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('3', '3', '12', '6', 'completed', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('4', '4', '13', '6', 'cancelled_by_client', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('5', '1', '10', '1', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('6', '2', '11', '6', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('7', '3', '12', '6', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('8', '2', '12', '12', 'completed', '2013-10-03')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('9', '3', '10', '12', 'completed', '2013-10-03')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('10', '4', '13', '12', 'cancelled_by_driver', '2013-10-03')", "DELETE FROM  Users", "insert into Users (users_id, banned, role) values ('1', 'No', 'client')", "insert into Users (users_id, banned, role) values ('2', 'Yes', 'client')", "insert into Users (users_id, banned, role) values ('3', 'No', 'client')", "insert into Users (users_id, banned, role) values ('4', 'No', 'client')", "insert into Users (users_id, banned, role) values ('10', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('11', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('12', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('13', 'No', 'driver')"], "content": "<p>Table: <code>Trips</code></p>\n\n<pre>\n+-------------+----------+\n| Column Name | Type     |\n+-------------+----------+\n| id          | int      |\n| client_id   | int      |\n| driver_id   | int      |\n| city_id     | int      |\n| status      | enum     |\n| request_at  | varchar  |     \n+-------------+----------+\nid is the primary key (column with unique values) for this table.\nThe table holds all taxi trips. Each trip has a unique id, while client_id and driver_id are foreign keys to the users_id at the Users table.\nStatus is an ENUM (category) type of (&#39;completed&#39;, &#39;cancelled_by_driver&#39;, &#39;cancelled_by_client&#39;).\n</pre>\n\n<p> </p>\n\n<p>Table: <code>Users</code></p>\n\n<pre>\n+-------------+----------+\n| Column Name | Type     |\n+-------------+----------+\n| users_id    | int      |\n| banned      | enum     |\n| role        | enum     |\n+-------------+----------+\nusers_id is the primary key (column with unique values) for this table.\nThe table holds all users. Each user has a unique users_id, and role is an ENUM type of (&#39;client&#39;, &#39;driver&#39;, &#39;partner&#39;).\nbanned is an ENUM (category) type of (&#39;Yes&#39;, &#39;No&#39;).\n</pre>\n\n<p> </p>\n\n<p>The <strong>cancellation rate</strong> is computed by dividing the number of canceled (by client or driver) requests with unbanned users by the total number of requests with unbanned users on that day.</p>\n\n<p>Write a solution to find the <strong>cancellation rate</strong> of requests with unbanned users (<strong>both client and driver must not be banned</strong>) each day between <code>&quot;2013-10-01&quot;</code> and <code>&quot;2013-10-03&quot;</code> with <strong>at least</strong> one trip. Round <code>Cancellation Rate</code> to <strong>two decimal</strong> points.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nTrips table:\n+----+-----------+-----------+---------+---------------------+------------+\n| id | client_id | driver_id | city_id | status              | request_at |\n+----+-----------+-----------+---------+---------------------+------------+\n| 1  | 1         | 10        | 1       | completed           | 2013-10-01 |\n| 2  | 2         | 11        | 1       | cancelled_by_driver | 2013-10-01 |\n| 3  | 3         | 12        | 6       | completed           | 2013-10-01 |\n| 4  | 4         | 13        | 6       | cancelled_by_client | 2013-10-01 |\n| 5  | 1         | 10        | 1       | completed           | 2013-10-02 |\n| 6  | 2         | 11        | 6       | completed           | 2013-10-02 |\n| 7  | 3         | 12        | 6       | completed           | 2013-10-02 |\n| 8  | 2         | 12        | 12      | completed           | 2013-10-03 |\n| 9  | 3         | 10        | 12      | completed           | 2013-10-03 |\n| 10 | 4         | 13        | 12      | cancelled_by_driver | 2013-10-03 |\n+----+-----------+-----------+---------+---------------------+------------+\nUsers table:\n+----------+--------+--------+\n| users_id | banned | role   |\n+----------+--------+--------+\n| 1        | No     | client |\n| 2        | Yes    | client |\n| 3        | No     | client |\n| 4        | No     | client |\n| 10       | No     | driver |\n| 11       | No     | driver |\n| 12       | No     | driver |\n| 13       | No     | driver |\n+----------+--------+--------+\n<strong>Output:</strong> \n+------------+-------------------+\n| Day        | Cancellation Rate |\n+------------+-------------------+\n| 2013-10-01 | 0.33              |\n| 2013-10-02 | 0.00              |\n| 2013-10-03 | 0.50              |\n+------------+-------------------+\n<strong>Explanation:</strong> \nOn 2013-10-01:\n  - There were 4 requests in total, 2 of which were canceled.\n  - However, the request with Id=2 was made by a banned client (User_Id=2), so it is ignored in the calculation.\n  - Hence there are 3 unbanned requests in total, 1 of which was canceled.\n  - The Cancellation Rate is (1 / 3) = 0.33\nOn 2013-10-02:\n  - There were 3 requests in total, 0 of which were canceled.\n  - The request with Id=6 was made by a banned client, so it is ignored.\n  - Hence there are 2 unbanned requests in total, 0 of which were canceled.\n  - The Cancellation Rate is (0 / 2) = 0.00\nOn 2013-10-03:\n  - There were 3 requests in total, 1 of which was canceled.\n  - The request with Id=8 was made by a banned client, so it is ignored.\n  - Hence there are 2 unbanned request in total, 1 of which were canceled.\n  - The Cancellation Rate is (1 / 2) = 0.50\n</pre>\n"}, "customers-with-strictly-increasing-purchases": {"title": "Customers with Strictly Increasing Purchases", "schemas": ["Create table If Not Exists Orders (order_id int, customer_id int, order_date date, price int)", "DELETE FROM  Orders", "insert into Orders (order_id, customer_id, order_date, price) values ('1', '1', '2019-07-01', '1100')", "insert into Orders (order_id, customer_id, order_date, price) values ('2', '1', '2019-11-01', '1200')", "insert into Orders (order_id, customer_id, order_date, price) values ('3', '1', '2020-05-26', '3000')", "insert into Orders (order_id, customer_id, order_date, price) values ('4', '1', '2021-08-31', '3100')", "insert into Orders (order_id, customer_id, order_date, price) values ('5', '1', '2022-12-07', '4700')", "insert into Orders (order_id, customer_id, order_date, price) values ('6', '2', '2015-01-01', '700')", "insert into Orders (order_id, customer_id, order_date, price) values ('7', '2', '2017-11-07', '1000')", "insert into Orders (order_id, customer_id, order_date, price) values ('8', '3', '2017-01-01', '900')", "insert into Orders (order_id, customer_id, order_date, price) values ('9', '3', '2018-11-07', '900')"], "content": "<p>Problem is locked. \ud83d\ude1e</p>"}, "students-and-examinations": {"title": "Students and Examinations", "schemas": ["Create table If Not Exists Students (student_id int, student_name varchar(20))", "Create table If Not Exists Subjects (subject_name varchar(20))", "Create table If Not Exists Examinations (student_id int, subject_name varchar(20))", "DELETE FROM  Students", "insert into Students (student_id, student_name) values ('1', 'Alice')", "insert into Students (student_id, student_name) values ('2', 'Bob')", "insert into Students (student_id, student_name) values ('13', 'John')", "insert into Students (student_id, student_name) values ('6', 'Alex')", "DELETE FROM  Subjects", "insert into Subjects (subject_name) values ('Math')", "insert into Subjects (subject_name) values ('Physics')", "insert into Subjects (subject_name) values ('Programming')", "DELETE FROM  Examinations", "insert into Examinations (student_id, subject_name) values ('1', 'Math')", "insert into Examinations (student_id, subject_name) values ('1', 'Physics')", "insert into Examinations (student_id, subject_name) values ('1', 'Programming')", "insert into Examinations (student_id, subject_name) values ('2', 'Programming')", "insert into Examinations (student_id, subject_name) values ('1', 'Physics')", "insert into Examinations (student_id, subject_name) values ('1', 'Math')", "insert into Examinations (student_id, subject_name) values ('13', 'Math')", "insert into Examinations (student_id, subject_name) values ('13', 'Programming')", "insert into Examinations (student_id, subject_name) values ('13', 'Physics')", "insert into Examinations (student_id, subject_name) values ('2', 'Math')", "insert into Examinations (student_id, subject_name) values ('1', 'Math')"], "content": "<p>Table: <code>Students</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| student_id    | int     |\n| student_name  | varchar |\n+---------------+---------+\nstudent_id is the primary key (column with unique values) for this table.\nEach row of this table contains the ID and the name of one student in the school.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Subjects</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| subject_name | varchar |\n+--------------+---------+\nsubject_name is the primary key (column with unique values) for this table.\nEach row of this table contains the name of one subject in the school.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Examinations</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| student_id   | int     |\n| subject_name | varchar |\n+--------------+---------+\nThere is no primary key (column with unique values) for this table. It may contain duplicates.\nEach student from the Students table takes every course from the Subjects table.\nEach row of this table indicates that a student with ID student_id attended the exam of subject_name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the number of times each student attended each exam.</p>\n\n<p>Return the result table ordered by <code>student_id</code> and <code>subject_name</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nStudents table:\n+------------+--------------+\n| student_id | student_name |\n+------------+--------------+\n| 1          | Alice        |\n| 2          | Bob          |\n| 13         | John         |\n| 6          | Alex         |\n+------------+--------------+\nSubjects table:\n+--------------+\n| subject_name |\n+--------------+\n| Math         |\n| Physics      |\n| Programming  |\n+--------------+\nExaminations table:\n+------------+--------------+\n| student_id | subject_name |\n+------------+--------------+\n| 1          | Math         |\n| 1          | Physics      |\n| 1          | Programming  |\n| 2          | Programming  |\n| 1          | Physics      |\n| 1          | Math         |\n| 13         | Math         |\n| 13         | Programming  |\n| 13         | Physics      |\n| 2          | Math         |\n| 1          | Math         |\n+------------+--------------+\n<strong>Output:</strong> \n+------------+--------------+--------------+----------------+\n| student_id | student_name | subject_name | attended_exams |\n+------------+--------------+--------------+----------------+\n| 1          | Alice        | Math         | 3              |\n| 1          | Alice        | Physics      | 2              |\n| 1          | Alice        | Programming  | 1              |\n| 2          | Bob          | Math         | 1              |\n| 2          | Bob          | Physics      | 0              |\n| 2          | Bob          | Programming  | 1              |\n| 6          | Alex         | Math         | 0              |\n| 6          | Alex         | Physics      | 0              |\n| 6          | Alex         | Programming  | 0              |\n| 13         | John         | Math         | 1              |\n| 13         | John         | Physics      | 1              |\n| 13         | John         | Programming  | 1              |\n+------------+--------------+--------------+----------------+\n<strong>Explanation:</strong> \nThe result table should contain all students and all subjects.\nAlice attended the Math exam 3 times, the Physics exam 2 times, and the Programming exam 1 time.\nBob attended the Math exam 1 time, the Programming exam 1 time, and did not attend the Physics exam.\nAlex did not attend any exams.\nJohn attended the Math exam 1 time, the Physics exam 1 time, and the Programming exam 1 time.\n</pre>\n"}, "find-the-missing-ids": {"title": "Find the Missing IDs", "schemas": ["Create table If Not Exists Customers (customer_id int, customer_name varchar(20))", "DELETE FROM  Customers", "insert into Customers (customer_id, customer_name) values ('1', 'Alice')", "insert into Customers (customer_id, customer_name) values ('4', 'Bob')", "insert into Customers (customer_id, customer_name) values ('5', 'Charlie')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Customers</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| customer_id   | int     |\n| customer_name | varchar |\n+---------------+---------+\ncustomer_id is the primary key for this table.\nEach row of this table contains the name and the id customer.\n</pre>\n<p>\u00a0</p>\n<p>Write an SQL query to find the missing customer IDs. The missing IDs are ones that\n                are not in the <code>Customers</code> table but are in the range between\n                <code>1</code> and the <strong>maximum</strong> <code>customer_id</code> present in\n                the table.</p>\n<p><strong>Notice</strong> that the maximum <code>customer_id</code> will not exceed\n                <code>100</code>.</p>\n<p>Return the result table ordered by <code>ids</code> in <strong>ascending\n                order</strong>.</p>\n<p>The query result format is in the following example.</p>\n<p>\u00a0</p>\n<pre><code>Customer</code> table:\n+-------------+---------------+\n| customer_id | customer_name |\n+-------------+---------------+\n| 1           | Alice         |\n| 4           | Bob           |\n| 5           | Charlie       |\n+-------------+---------------+\n\nResult table:\n+-----+\n| <code>ids </code>|\n+-----+\n| 2   |\n| 3   |\n+-----+\nThe maximum customer_id present in the table is 5, so in the range [1,5], IDs 2 and 3 are missing from the table.</pre>\n</div>\n</div>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2020-04-30-1613-Find-the-Missing-IDs\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1613-Find-the-Missing-IDs</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "sales-by-day-of-the-week": {"title": "Sales by Day of the Week", "schemas": ["Create table If Not Exists Orders (order_id int, customer_id int, order_date date, item_id varchar(30), quantity int)", "Create table If Not Exists Items (item_id varchar(30), item_name varchar(30), item_category varchar(30))", "DELETE FROM  Orders", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('1', '1', '2020-06-01', '1', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('2', '1', '2020-06-08', '2', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('3', '2', '2020-06-02', '1', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('4', '3', '2020-06-03', '3', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('5', '4', '2020-06-04', '4', '1')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('6', '4', '2020-06-05', '5', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('7', '5', '2020-06-05', '1', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('8', '5', '2020-06-14', '4', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('9', '5', '2020-06-21', '3', '5')", "DELETE FROM  Items", "insert into Items (item_id, item_name, item_category) values ('1', 'LC Alg. Book', 'Book')", "insert into Items (item_id, item_name, item_category) values ('2', 'LC DB. Book', 'Book')", "insert into Items (item_id, item_name, item_category) values ('3', 'LC SmarthPhone', 'Phone')", "insert into Items (item_id, item_name, item_category) values ('4', 'LC Phone 2020', 'Phone')", "insert into Items (item_id, item_name, item_category) values ('5', 'LC SmartGlass', 'Glasses')", "insert into Items (item_id, item_name, item_category) values ('6', 'LC T-Shirt XL', 'T-shirt')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Orders</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| customer_id   | int     |\n| order_date    | date    |\n| item_id       | varchar |\n| quantity      | int     |\n+---------------+---------+\n(ordered_id, item_id) is the primary key for this table.\nThis table contains information of the orders placed.\norder_date is the date when item_id was ordered by the customer with id customer_id.\n</pre>\n<p>\u00a0</p>\n<p>Table: <code>Items</code></p>\n<pre>+---------------------+---------+\n| Column Name         | Type    |\n+---------------------+---------+\n| item_id             | varchar |\n| item_name           | varchar |\n| item_category       | varchar |\n+---------------------+---------+\nitem_id is the primary key for this table.\nitem_name is the name of the item.\nitem_category\u00a0is the category of the item.\n</pre>\n<p>\u00a0</p>\n<p>You are the business owner and would like to obtain a sales report for category items\n                and day of the week.</p>\n<p>Write an SQL query to\u00a0report how many units in each category have been ordered\n                on each <strong>day of the week</strong>.</p>\n<p>Return the result table\u00a0<strong>ordered</strong>\u00a0by category.</p>\n<p>The query result format is in the following example:</p>\n<p>\u00a0</p>\n<pre><code>Orders</code> table:\n+------------+--------------+-------------+--------------+-------------+\n| order_id   | customer_id  | order_date  | item_id      | quantity    |\n+------------+--------------+-------------+--------------+-------------+\n| 1          | 1            | 2020-06-01  | 1            | 10          |\n| 2          | 1            | 2020-06-08  | 2            | 10          |\n| 3          | 2            | 2020-06-02  | 1            | 5           |\n| 4          | 3            | 2020-06-03  | 3            | 5           |\n| 5          | 4            | 2020-06-04  | 4            | 1           |\n| 6          | 4            | 2020-06-05  | 5            | 5           |\n| 7          | 5            | 2020-06-05  | 1            | 10          |\n| 8          | 5            | 2020-06-14  | 4            | 5           |\n| 9          | 5            | 2020-06-21  | 3            | 5           |\n+------------+--------------+-------------+--------------+-------------+\n\n<code>Items</code> table:\n+------------+----------------+---------------+\n| item_id    | item_name      | item_category |\n+------------+----------------+---------------+\n| 1          | LC Alg. Book   | Book          |\n| 2          | LC DB. Book    | Book          |\n| 3          | LC SmarthPhone | Phone         |\n| 4          | LC Phone 2020  | Phone         |\n| 5          | LC SmartGlass  | Glasses       |\n| 6          | LC T-Shirt XL  | T-Shirt       |\n+------------+----------------+---------------+\n\nResult table:\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\n| Category   | Monday    | Tuesday   | Wednesday | Thursday  | Friday    | Saturday  | Sunday    |\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\n| Book       | 20        | 5         | 0         | 0         | 10        | 0         | 0         |\n| Glasses    | 0         | 0         | 0         | 0         | 5         | 0         | 0         |\n| Phone      | 0         | 0         | 5         | 1         | 0         | 0         | 10        |\n| T-Shirt    | 0         | 0         | 0         | 0         | 0         | 0         | 0         |\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\nOn Monday (2020-06-01, 2020-06-08) were sold a total of 20 units (10 + 10) in the category Book (ids: 1, 2).\nOn Tuesday (2020-06-02) were sold a total of 5 units  in the category Book (ids: 1, 2).\nOn Wednesday (2020-06-03) were sold a total of 5 units in the category Phone (ids: 3, 4).\nOn Thursday (2020-06-04) were sold a total of 1 unit in the category Phone (ids: 3, 4).\nOn Friday (2020-06-05) were sold 10 units in the category Book (ids: 1, 2) and 5 units in Glasses (ids: 5).\nOn Saturday there are no items sold.\nOn Sunday (2020-06-14, 2020-06-21) were sold a total of 10 units (5 +5) in the category Phone (ids: 3, 4).\nThere are no sales of T-Shirt.\n</pre>\n</div>\n</div>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2019-12-18-1479-Sales-by-Day-of-the-Week\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1479-Sales-by-Day-of-the-Week</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "second-highest-salary": {"title": "Second Highest Salary", "schemas": ["Create table If Not Exists Employee (id int, salary int)", "DELETE FROM  Employee", "insert into Employee (id, salary) values ('1', '100')", "insert into Employee (id, salary) values ('2', '200')", "insert into Employee (id, salary) values ('3', '300')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| salary      | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains information about the salary of an employee.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solutio
