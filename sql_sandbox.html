   |\n| 6        | 2019-08-05 | 2       | 2        | 4         |\n+----------+------------+---------+----------+-----------+\nItems table:\n+---------+------------+\n| item_id | item_brand |\n+---------+------------+\n| 1       | Samsung    |\n| 2       | Lenovo     |\n| 3       | LG         |\n| 4       | HP         |\n+---------+------------+\n<strong>Output:</strong> \n+-----------+------------+----------------+\n| buyer_id  | join_date  | orders_in_2019 |\n+-----------+------------+----------------+\n| 1         | 2018-01-01 | 1              |\n| 2         | 2018-02-09 | 2              |\n| 3         | 2018-01-19 | 0              |\n| 4         | 2018-05-21 | 0              |\n+-----------+------------+----------------+\n</pre>", "shadow": {"gold": "SELECT u.user_id AS buyer_id, u.join_date,\n            COALESCE(SUM(CASE WHEN strftime('%Y', o.order_date) = '2019' THEN 1 ELSE 0 END), 0) AS orders_in_2019\n        FROM Users u LEFT JOIN Orders o ON o.buyer_id = u.user_id\n        GROUP BY u.user_id, u.join_date ORDER BY u.user_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "User with zero 2019 orders", "hint": "All Users must appear in output, even with 0 orders.", "inserts": ["DELETE FROM Users", "INSERT INTO Users VALUES (10,'2018-05-01','HP')", "DELETE FROM Orders"]}]}}, "trips-and-users": {"title": "Trips and Users", "schemas": ["Create table If Not Exists Trips (id int, client_id int, driver_id int, city_id int, status VARCHAR(50), request_at varchar(50))", "Create table If Not Exists Users (users_id int, banned varchar(50), role VARCHAR(50))", "DELETE FROM  Trips", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('1', '1', '10', '1', 'completed', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('2', '2', '11', '1', 'cancelled_by_driver', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('3', '3', '12', '6', 'completed', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('4', '4', '13', '6', 'cancelled_by_client', '2013-10-01')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('5', '1', '10', '1', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('6', '2', '11', '6', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('7', '3', '12', '6', 'completed', '2013-10-02')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('8', '2', '12', '12', 'completed', '2013-10-03')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('9', '3', '10', '12', 'completed', '2013-10-03')", "insert into Trips (id, client_id, driver_id, city_id, status, request_at) values ('10', '4', '13', '12', 'cancelled_by_driver', '2013-10-03')", "DELETE FROM  Users", "insert into Users (users_id, banned, role) values ('1', 'No', 'client')", "insert into Users (users_id, banned, role) values ('2', 'Yes', 'client')", "insert into Users (users_id, banned, role) values ('3', 'No', 'client')", "insert into Users (users_id, banned, role) values ('4', 'No', 'client')", "insert into Users (users_id, banned, role) values ('10', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('11', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('12', 'No', 'driver')", "insert into Users (users_id, banned, role) values ('13', 'No', 'driver')"], "content": "<p>Table: <code>Trips</code></p>\n\n<pre>\n+-------------+----------+\n| Column Name | Type     |\n+-------------+----------+\n| id          | int      |\n| client_id   | int      |\n| driver_id   | int      |\n| city_id     | int      |\n| status      | enum     |\n| request_at  | varchar  |     \n+-------------+----------+\nid is the primary key (column with unique values) for this table.\nThe table holds all taxi trips. Each trip has a unique id, while client_id and driver_id are foreign keys to the users_id at the Users table.\nStatus is an ENUM (category) type of (&#39;completed&#39;, &#39;cancelled_by_driver&#39;, &#39;cancelled_by_client&#39;).\n</pre>\n\n<p> </p>\n\n<p>Table: <code>Users</code></p>\n\n<pre>\n+-------------+----------+\n| Column Name | Type     |\n+-------------+----------+\n| users_id    | int      |\n| banned      | enum     |\n| role        | enum     |\n+-------------+----------+\nusers_id is the primary key (column with unique values) for this table.\nThe table holds all users. Each user has a unique users_id, and role is an ENUM type of (&#39;client&#39;, &#39;driver&#39;, &#39;partner&#39;).\nbanned is an ENUM (category) type of (&#39;Yes&#39;, &#39;No&#39;).\n</pre>\n\n<p> </p>\n\n<p>The <strong>cancellation rate</strong> is computed by dividing the number of canceled (by client or driver) requests with unbanned users by the total number of requests with unbanned users on that day.</p>\n\n<p>Write a solution to find the <strong>cancellation rate</strong> of requests with unbanned users (<strong>both client and driver must not be banned</strong>) each day between <code>&quot;2013-10-01&quot;</code> and <code>&quot;2013-10-03&quot;</code> with <strong>at least</strong> one trip. Round <code>Cancellation Rate</code> to <strong>two decimal</strong> points.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nTrips table:\n+----+-----------+-----------+---------+---------------------+------------+\n| id | client_id | driver_id | city_id | status              | request_at |\n+----+-----------+-----------+---------+---------------------+------------+\n| 1  | 1         | 10        | 1       | completed           | 2013-10-01 |\n| 2  | 2         | 11        | 1       | cancelled_by_driver | 2013-10-01 |\n| 3  | 3         | 12        | 6       | completed           | 2013-10-01 |\n| 4  | 4         | 13        | 6       | cancelled_by_client | 2013-10-01 |\n| 5  | 1         | 10        | 1       | completed           | 2013-10-02 |\n| 6  | 2         | 11        | 6       | completed           | 2013-10-02 |\n| 7  | 3         | 12        | 6       | completed           | 2013-10-02 |\n| 8  | 2         | 12        | 12      | completed           | 2013-10-03 |\n| 9  | 3         | 10        | 12      | completed           | 2013-10-03 |\n| 10 | 4         | 13        | 12      | cancelled_by_driver | 2013-10-03 |\n+----+-----------+-----------+---------+---------------------+------------+\nUsers table:\n+----------+--------+--------+\n| users_id | banned | role   |\n+----------+--------+--------+\n| 1        | No     | client |\n| 2        | Yes    | client |\n| 3        | No     | client |\n| 4        | No     | client |\n| 10       | No     | driver |\n| 11       | No     | driver |\n| 12       | No     | driver |\n| 13       | No     | driver |\n+----------+--------+--------+\n<strong>Output:</strong> \n+------------+-------------------+\n| Day        | Cancellation Rate |\n+------------+-------------------+\n| 2013-10-01 | 0.33              |\n| 2013-10-02 | 0.00              |\n| 2013-10-03 | 0.50              |\n+------------+-------------------+\n<strong>Explanation:</strong> \nOn 2013-10-01:\n  - There were 4 requests in total, 2 of which were canceled.\n  - However, the request with Id=2 was made by a banned client (User_Id=2), so it is ignored in the calculation.\n  - Hence there are 3 unbanned requests in total, 1 of which was canceled.\n  - The Cancellation Rate is (1 / 3) = 0.33\nOn 2013-10-02:\n  - There were 3 requests in total, 0 of which were canceled.\n  - The request with Id=6 was made by a banned client, so it is ignored.\n  - Hence there are 2 unbanned requests in total, 0 of which were canceled.\n  - The Cancellation Rate is (0 / 2) = 0.00\nOn 2013-10-03:\n  - There were 3 requests in total, 1 of which was canceled.\n  - The request with Id=8 was made by a banned client, so it is ignored.\n  - Hence there are 2 unbanned request in total, 1 of which were canceled.\n  - The Cancellation Rate is (1 / 2) = 0.50\n</pre>", "shadow": {"gold": "SELECT request_at AS Day,\n            ROUND(1.0 * SUM(CASE WHEN status != 'completed' THEN 1 ELSE 0 END) / COUNT(*), 2) AS \"Cancellation Rate\"\n        FROM Trips t\n        WHERE request_at BETWEEN '2013-10-01' AND '2013-10-03'\n          AND client_id IN (SELECT users_id FROM Users WHERE banned = 'No' AND role = 'client')\n          AND driver_id IN (SELECT users_id FROM Users WHERE banned = 'No' AND role = 'driver')\n        GROUP BY request_at ORDER BY request_at", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "All trips with banned users", "hint": "Dates whose only trips involve banned clients/drivers produce no row.", "inserts": ["DELETE FROM Trips", "INSERT INTO Trips VALUES (20,2,10,1,'completed','2013-10-05')", "DELETE FROM Users", "INSERT INTO Users VALUES (2,'Yes','client')", "INSERT INTO Users VALUES (10,'No','driver')"]}]}}, "customers-with-strictly-increasing-purchases": {"title": "Customers with Strictly Increasing Purchases", "schemas": ["Create table If Not Exists Orders (order_id int, customer_id int, order_date date, price int)", "DELETE FROM  Orders", "insert into Orders (order_id, customer_id, order_date, price) values ('1', '1', '2019-07-01', '1100')", "insert into Orders (order_id, customer_id, order_date, price) values ('2', '1', '2019-11-01', '1200')", "insert into Orders (order_id, customer_id, order_date, price) values ('3', '1', '2020-05-26', '3000')", "insert into Orders (order_id, customer_id, order_date, price) values ('4', '1', '2021-08-31', '3100')", "insert into Orders (order_id, customer_id, order_date, price) values ('5', '1', '2022-12-07', '4700')", "insert into Orders (order_id, customer_id, order_date, price) values ('6', '2', '2015-01-01', '700')", "insert into Orders (order_id, customer_id, order_date, price) values ('7', '2', '2017-11-07', '1000')", "insert into Orders (order_id, customer_id, order_date, price) values ('8', '3', '2017-01-01', '900')", "insert into Orders (order_id, customer_id, order_date, price) values ('9', '3', '2018-11-07', '900')"], "content": "<p>Table: <code>Orders(order_id, customer_id, order_date, price)</code></p>\n<p>Return the <code>customer_id</code> of every customer whose <strong>yearly total spend strictly increases every year for at least two consecutive years with no year missing in between</strong>.</p>\n<ul>\n  <li>Aggregate <code>SUM(price)</code> per (customer, year).</li>\n  <li>A customer qualifies only if every adjacent pair of their years is both (a) 1 year apart, and (b) the later year's total is strictly greater than the previous year's.</li>\n  <li>Customers with only a single year of data do <strong>not</strong> qualify.</li>\n</ul>\n<p>Output column: <code>customer_id</code>, sorted ascending.</p>\n<h4>Example</h4>\n<p>From the sample: customer 1's yearly totals are <code>2019 → 2300</code>, <code>2020 → 3000</code>, <code>2021 → 3100</code>, <code>2022 → 4700</code> — four consecutive years, each total higher → qualifies. Customer 2 has a gap between 2015 and 2017 → disqualified. Customer 3 has ties (900 → 900), not strictly increasing → disqualified.</p>", "shadow": {"gold": "WITH yearly AS (\n            SELECT customer_id, CAST(strftime('%Y', order_date) AS INT) AS yr, SUM(price) AS total\n            FROM Orders GROUP BY customer_id, CAST(strftime('%Y', order_date) AS INT)\n        ),\n        prev AS (\n            SELECT customer_id, yr, total,\n                   LAG(yr) OVER (PARTITION BY customer_id ORDER BY yr) AS py,\n                   LAG(total) OVER (PARTITION BY customer_id ORDER BY yr) AS pt\n            FROM yearly\n        )\n        SELECT customer_id FROM prev\n        GROUP BY customer_id\n        HAVING SUM(CASE WHEN py IS NOT NULL AND (yr - py != 1 OR total <= pt) THEN 1 ELSE 0 END) = 0\n           AND COUNT(*) >= 2\n        ORDER BY customer_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Gap year disqualifies", "hint": "A missing year breaks the streak — (2020, 100) → (2022, 200) is NOT consecutive even though 200 > 100.", "inserts": ["DELETE FROM Orders", "INSERT INTO Orders VALUES (1,7,'2020-01-01',100)", "INSERT INTO Orders VALUES (2,7,'2022-01-01',200)", "INSERT INTO Orders VALUES (3,8,'2020-01-01',100)", "INSERT INTO Orders VALUES (4,8,'2021-01-01',200)", "INSERT INTO Orders VALUES (5,8,'2022-01-01',300)"]}, {"name": "Tie year disqualifies", "hint": "Strictly increasing — equal totals (100 → 100) do not count.", "inserts": ["DELETE FROM Orders", "INSERT INTO Orders VALUES (1,9,'2020-01-01',100)", "INSERT INTO Orders VALUES (2,9,'2021-01-01',100)"]}]}}, "students-and-examinations": {"title": "Students and Examinations", "schemas": ["Create table If Not Exists Students (student_id int, student_name varchar(20))", "Create table If Not Exists Subjects (subject_name varchar(20))", "Create table If Not Exists Examinations (student_id int, subject_name varchar(20))", "DELETE FROM  Students", "insert into Students (student_id, student_name) values ('1', 'Alice')", "insert into Students (student_id, student_name) values ('2', 'Bob')", "insert into Students (student_id, student_name) values ('13', 'John')", "insert into Students (student_id, student_name) values ('6', 'Alex')", "DELETE FROM  Subjects", "insert into Subjects (subject_name) values ('Math')", "insert into Subjects (subject_name) values ('Physics')", "insert into Subjects (subject_name) values ('Programming')", "DELETE FROM  Examinations", "insert into Examinations (student_id, subject_name) values ('1', 'Math')", "insert into Examinations (student_id, subject_name) values ('1', 'Physics')", "insert into Examinations (student_id, subject_name) values ('1', 'Programming')", "insert into Examinations (student_id, subject_name) values ('2', 'Programming')", "insert into Examinations (student_id, subject_name) values ('1', 'Physics')", "insert into Examinations (student_id, subject_name) values ('1', 'Math')", "insert into Examinations (student_id, subject_name) values ('13', 'Math')", "insert into Examinations (student_id, subject_name) values ('13', 'Programming')", "insert into Examinations (student_id, subject_name) values ('13', 'Physics')", "insert into Examinations (student_id, subject_name) values ('2', 'Math')", "insert into Examinations (student_id, subject_name) values ('1', 'Math')"], "content": "<p>Table: <code>Students</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| student_id    | int     |\n| student_name  | varchar |\n+---------------+---------+\nstudent_id is the primary key (column with unique values) for this table.\nEach row of this table contains the ID and the name of one student in the school.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Subjects</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| subject_name | varchar |\n+--------------+---------+\nsubject_name is the primary key (column with unique values) for this table.\nEach row of this table contains the name of one subject in the school.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Examinations</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| student_id   | int     |\n| subject_name | varchar |\n+--------------+---------+\nThere is no primary key (column with unique values) for this table. It may contain duplicates.\nEach student from the Students table takes every course from the Subjects table.\nEach row of this table indicates that a student with ID student_id attended the exam of subject_name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the number of times each student attended each exam.</p>\n\n<p>Return the result table ordered by <code>student_id</code> and <code>subject_name</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nStudents table:\n+------------+--------------+\n| student_id | student_name |\n+------------+--------------+\n| 1          | Alice        |\n| 2          | Bob          |\n| 13         | John         |\n| 6          | Alex         |\n+------------+--------------+\nSubjects table:\n+--------------+\n| subject_name |\n+--------------+\n| Math         |\n| Physics      |\n| Programming  |\n+--------------+\nExaminations table:\n+------------+--------------+\n| student_id | subject_name |\n+------------+--------------+\n| 1          | Math         |\n| 1          | Physics      |\n| 1          | Programming  |\n| 2          | Programming  |\n| 1          | Physics      |\n| 1          | Math         |\n| 13         | Math         |\n| 13         | Programming  |\n| 13         | Physics      |\n| 2          | Math         |\n| 1          | Math         |\n+------------+--------------+\n<strong>Output:</strong> \n+------------+--------------+--------------+----------------+\n| student_id | student_name | subject_name | attended_exams |\n+------------+--------------+--------------+----------------+\n| 1          | Alice        | Math         | 3              |\n| 1          | Alice        | Physics      | 2              |\n| 1          | Alice        | Programming  | 1              |\n| 2          | Bob          | Math         | 1              |\n| 2          | Bob          | Physics      | 0              |\n| 2          | Bob          | Programming  | 1              |\n| 6          | Alex         | Math         | 0              |\n| 6          | Alex         | Physics      | 0              |\n| 6          | Alex         | Programming  | 0              |\n| 13         | John         | Math         | 1              |\n| 13         | John         | Physics      | 1              |\n| 13         | John         | Programming  | 1              |\n+------------+--------------+--------------+----------------+\n<strong>Explanation:</strong> \nThe result table should contain all students and all subjects.\nAlice attended the Math exam 3 times, the Physics exam 2 times, and the Programming exam 1 time.\nBob attended the Math exam 1 time, the Programming exam 1 time, and did not attend the Physics exam.\nAlex did not attend any exams.\nJohn attended the Math exam 1 time, the Physics exam 1 time, and the Programming exam 1 time.\n</pre>", "shadow": {"gold": "SELECT s.student_id, s.student_name, sub.subject_name,\n                COALESCE(COUNT(e.subject_name), 0) AS attended_exams\n         FROM Students s\n         CROSS JOIN Subjects sub\n         LEFT JOIN Examinations e ON e.student_id = s.student_id AND e.subject_name = sub.subject_name\n         GROUP BY s.student_id, s.student_name, sub.subject_name\n         ORDER BY s.student_id, sub.subject_name", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "A student never took any exam", "inserts": ["INSERT INTO Students VALUES (99,'Empty')"], "hint": "CROSS JOIN Subjects ensures every (student,subject) row exists even with zero attendance."}]}}, "find-the-missing-ids": {"title": "Find the Missing IDs", "schemas": ["Create table If Not Exists Customers (customer_id int, customer_name varchar(20))", "DELETE FROM  Customers", "insert into Customers (customer_id, customer_name) values ('1', 'Alice')", "insert into Customers (customer_id, customer_name) values ('4', 'Bob')", "insert into Customers (customer_id, customer_name) values ('5', 'Charlie')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Customers</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| customer_id   | int     |\n| customer_name | varchar |\n+---------------+---------+\ncustomer_id is the primary key for this table.\nEach row of this table contains the name and the id customer.\n</pre>\n<p> </p>\n<p>Write an SQL query to find the missing customer IDs. The missing IDs are ones that\n                are not in the <code>Customers</code> table but are in the range between\n                <code>1</code> and the <strong>maximum</strong> <code>customer_id</code> present in\n                the table.</p>\n<p><strong>Notice</strong> that the maximum <code>customer_id</code> will not exceed\n                <code>100</code>.</p>\n<p>Return the result table ordered by <code>ids</code> in <strong>ascending\n                order</strong>.</p>\n<p>The query result format is in the following example.</p>\n<p> </p>\n<pre><code>Customer</code> table:\n+-------------+---------------+\n| customer_id | customer_name |\n+-------------+---------------+\n| 1           | Alice         |\n| 4           | Bob           |\n| 5           | Charlie       |\n+-------------+---------------+\n\nResult table:\n+-----+\n| <code>ids </code>|\n+-----+\n| 2   |\n| 3   |\n+-----+\nThe maximum customer_id present in the table is 5, so in the range [1,5], IDs 2 and 3 are missing from the table.</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "WITH RECURSIVE seq(n) AS (\n            SELECT 1 UNION ALL SELECT n+1 FROM seq WHERE n < (SELECT MAX(customer_id) FROM Customers)\n        )\n        SELECT n AS ids FROM seq WHERE n NOT IN (SELECT customer_id FROM Customers) ORDER BY n", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "No gaps at all", "inserts": ["DELETE FROM Customers", "INSERT INTO Customers VALUES (1,'A')", "INSERT INTO Customers VALUES (2,'B')", "INSERT INTO Customers VALUES (3,'C')"], "hint": "Return empty result when ids are contiguous."}]}}, "sales-by-day-of-the-week": {"title": "Sales by Day of the Week", "schemas": ["Create table If Not Exists Orders (order_id int, customer_id int, order_date date, item_id varchar(30), quantity int)", "Create table If Not Exists Items (item_id varchar(30), item_name varchar(30), item_category varchar(30))", "DELETE FROM  Orders", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('1', '1', '2020-06-01', '1', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('2', '1', '2020-06-08', '2', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('3', '2', '2020-06-02', '1', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('4', '3', '2020-06-03', '3', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('5', '4', '2020-06-04', '4', '1')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('6', '4', '2020-06-05', '5', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('7', '5', '2020-06-05', '1', '10')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('8', '5', '2020-06-14', '4', '5')", "insert into Orders (order_id, customer_id, order_date, item_id, quantity) values ('9', '5', '2020-06-21', '3', '5')", "DELETE FROM  Items", "insert into Items (item_id, item_name, item_category) values ('1', 'LC Alg. Book', 'Book')", "insert into Items (item_id, item_name, item_category) values ('2', 'LC DB. Book', 'Book')", "insert into Items (item_id, item_name, item_category) values ('3', 'LC SmarthPhone', 'Phone')", "insert into Items (item_id, item_name, item_category) values ('4', 'LC Phone 2020', 'Phone')", "insert into Items (item_id, item_name, item_category) values ('5', 'LC SmartGlass', 'Glasses')", "insert into Items (item_id, item_name, item_category) values ('6', 'LC T-Shirt XL', 'T-shirt')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Orders</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| customer_id   | int     |\n| order_date    | date    |\n| item_id       | varchar |\n| quantity      | int     |\n+---------------+---------+\n(ordered_id, item_id) is the primary key for this table.\nThis table contains information of the orders placed.\norder_date is the date when item_id was ordered by the customer with id customer_id.\n</pre>\n<p> </p>\n<p>Table: <code>Items</code></p>\n<pre>+---------------------+---------+\n| Column Name         | Type    |\n+---------------------+---------+\n| item_id             | varchar |\n| item_name           | varchar |\n| item_category       | varchar |\n+---------------------+---------+\nitem_id is the primary key for this table.\nitem_name is the name of the item.\nitem_category is the category of the item.\n</pre>\n<p> </p>\n<p>You are the business owner and would like to obtain a sales report for category items\n                and day of the week.</p>\n<p>Write an SQL query to report how many units in each category have been ordered\n                on each <strong>day of the week</strong>.</p>\n<p>Return the result table <strong>ordered</strong> by category.</p>\n<p>The query result format is in the following example:</p>\n<p> </p>\n<pre><code>Orders</code> table:\n+------------+--------------+-------------+--------------+-------------+\n| order_id   | customer_id  | order_date  | item_id      | quantity    |\n+------------+--------------+-------------+--------------+-------------+\n| 1          | 1            | 2020-06-01  | 1            | 10          |\n| 2          | 1            | 2020-06-08  | 2            | 10          |\n| 3          | 2            | 2020-06-02  | 1            | 5           |\n| 4          | 3            | 2020-06-03  | 3            | 5           |\n| 5          | 4            | 2020-06-04  | 4            | 1           |\n| 6          | 4            | 2020-06-05  | 5            | 5           |\n| 7          | 5            | 2020-06-05  | 1            | 10          |\n| 8          | 5            | 2020-06-14  | 4            | 5           |\n| 9          | 5            | 2020-06-21  | 3            | 5           |\n+------------+--------------+-------------+--------------+-------------+\n\n<code>Items</code> table:\n+------------+----------------+---------------+\n| item_id    | item_name      | item_category |\n+------------+----------------+---------------+\n| 1          | LC Alg. Book   | Book          |\n| 2          | LC DB. Book    | Book          |\n| 3          | LC SmarthPhone | Phone         |\n| 4          | LC Phone 2020  | Phone         |\n| 5          | LC SmartGlass  | Glasses       |\n| 6          | LC T-Shirt XL  | T-Shirt       |\n+------------+----------------+---------------+\n\nResult table:\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\n| Category   | Monday    | Tuesday   | Wednesday | Thursday  | Friday    | Saturday  | Sunday    |\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\n| Book       | 20        | 5         | 0         | 0         | 10        | 0         | 0         |\n| Glasses    | 0         | 0         | 0         | 0         | 5         | 0         | 0         |\n| Phone      | 0         | 0         | 5         | 1         | 0         | 0         | 10        |\n| T-Shirt    | 0         | 0         | 0         | 0         | 0         | 0         | 0         |\n+------------+-----------+-----------+-----------+-----------+-----------+-----------+-----------+\nOn Monday (2020-06-01, 2020-06-08) were sold a total of 20 units (10 + 10) in the category Book (ids: 1, 2).\nOn Tuesday (2020-06-02) were sold a total of 5 units  in the category Book (ids: 1, 2).\nOn Wednesday (2020-06-03) were sold a total of 5 units in the category Phone (ids: 3, 4).\nOn Thursday (2020-06-04) were sold a total of 1 unit in the category Phone (ids: 3, 4).\nOn Friday (2020-06-05) were sold 10 units in the category Book (ids: 1, 2) and 5 units in Glasses (ids: 5).\nOn Saturday there are no items sold.\nOn Sunday (2020-06-14, 2020-06-21) were sold a total of 10 units (5 +5) in the category Phone (ids: 3, 4).\nThere are no sales of T-Shirt.\n</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "SELECT i.item_category AS Category,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '1' THEN o.quantity ELSE 0 END) AS Monday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '2' THEN o.quantity ELSE 0 END) AS Tuesday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '3' THEN o.quantity ELSE 0 END) AS Wednesday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '4' THEN o.quantity ELSE 0 END) AS Thursday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '5' THEN o.quantity ELSE 0 END) AS Friday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '6' THEN o.quantity ELSE 0 END) AS Saturday,\n            SUM(CASE WHEN strftime('%w', o.order_date) = '0' THEN o.quantity ELSE 0 END) AS Sunday\n         FROM Items i LEFT JOIN Orders o ON o.item_id = i.item_id\n         GROUP BY i.item_category ORDER BY i.item_category", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Category with zero orders", "hint": "LEFT JOIN — every Items category must appear even with all zeros.", "inserts": ["DELETE FROM Orders"]}]}}, "second-highest-salary": {"title": "Second Highest Salary", "schemas": ["Create table If Not Exists Employee (id int, salary int)", "DELETE FROM  Employee", "insert into Employee (id, salary) values ('1', '100')", "insert into Employee (id, salary) values ('2', '200')", "insert into Employee (id, salary) values ('3', '300')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| salary      | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains information about the salary of an employee.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find&nbsp;the second highest <strong>distinct</strong> salary from the <code>Employee</code> table. If there is no second highest salary,&nbsp;return&nbsp;<code>null (return&nbsp;None in Pandas)</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n| 2  | 200    |\n| 3  | 300    |\n+----+--------+\n<strong>Output:</strong> \n+---------------------+\n| SecondHighestSalary |\n+---------------------+\n| 200                 |\n+---------------------+\n</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n+----+--------+\n<strong>Output:</strong> \n+---------------------+\n| SecondHighestSalary |\n+---------------------+\n| null                |\n+---------------------+\n</pre>", "shadow": {"gold": "SELECT (SELECT DISTINCT salary FROM Employee ORDER BY salary DESC LIMIT 1 OFFSET 1) AS SecondHighestSalary", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Only one distinct salary — NULL expected", "inserts": ["DELETE FROM Employee", "INSERT INTO Employee VALUES (1,100)"], "hint": "Must return NULL (not empty result) when there is no second distinct salary — wrap in SELECT (... LIMIT 1 OFFSET 1)."}, {"name": "Duplicate salaries at top", "inserts": ["INSERT INTO Employee VALUES (10,300)", "INSERT INTO Employee VALUES (11,300)"], "hint": "Use DISTINCT — a duplicate of the top salary should not count as the second."}]}}, "nth-highest-salary": {"title": "Nth Highest Salary", "schemas": ["Create table If Not Exists Employee (Id int, Salary int)", "DELETE FROM  Employee", "insert into Employee (id, salary) values ('1', '100')", "insert into Employee (id, salary) values ('2', '200')", "insert into Employee (id, salary) values ('3', '300')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| salary      | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains information about the salary of an employee.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the <code>n<sup>th</sup></code> highest <strong>distinct</strong> salary from the <code>Employee</code> table. If there are less than <code>n</code> distinct salaries, return&nbsp;<code>null</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n| 2  | 200    |\n| 3  | 300    |\n+----+--------+\nn = 2\n<strong>Output:</strong> \n+---------------------+\n| getNthHighestSalary    |\n+---------------------+\n| 200                    |\n+---------------------+\n</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n+----+--------+\nn = 2\n<strong>Output:</strong> \n+---------------------+\n| getNthHighestSalary    |\n+---------------------+\n| null                   |\n+---------------------+\n</pre>", "shadow": {"gold": "SELECT (SELECT DISTINCT Salary FROM Employee ORDER BY Salary DESC LIMIT 1 OFFSET 1) AS getNthHighestSalary", "cases": [{"name": "Base sample (2nd highest)", "inserts": [], "hint": ""}, {"name": "Not enough rows — expect NULL", "inserts": ["DELETE FROM Employee", "INSERT INTO Employee VALUES (1,100)"], "hint": "Return NULL when fewer than N distinct salaries exist."}]}}, "rank-scores": {"title": "Rank Scores", "schemas": ["Create table If Not Exists Scores (id int, score DECIMAL(3,2))", "DELETE FROM  Scores", "insert into Scores (id, score) values ('1', '3.5')", "insert into Scores (id, score) values ('2', '3.65')", "insert into Scores (id, score) values ('3', '4.0')", "insert into Scores (id, score) values ('4', '3.85')", "insert into Scores (id, score) values ('5', '4.0')", "insert into Scores (id, score) values ('6', '3.65')"], "content": "<p>Table: <code>Scores</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| score       | decimal |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains the score of a game. Score is a floating point value with two decimal places.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the rank of the scores. The ranking should be calculated according to the following rules:</p>\n\n<ul>\n\t<li>The scores should be ranked from the highest to the lowest.</li>\n\t<li>If there is a tie between two scores, both should have the same ranking.</li>\n\t<li>After a tie, the next ranking number should be the next consecutive integer value. In other words, there should be no holes between ranks.</li>\n</ul>\n\n<p>Return the result table ordered by <code>score</code> in descending order.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nScores table:\n+----+-------+\n| id | score |\n+----+-------+\n| 1  | 3.50  |\n| 2  | 3.65  |\n| 3  | 4.00  |\n| 4  | 3.85  |\n| 5  | 4.00  |\n| 6  | 3.65  |\n+----+-------+\n<strong>Output:</strong> \n+-------+------+\n| score | rank |\n+-------+------+\n| 4.00  | 1    |\n| 4.00  | 1    |\n| 3.85  | 2    |\n| 3.65  | 3    |\n| 3.65  | 3    |\n| 3.50  | 4    |\n+-------+------+\n</pre>", "shadow": {"gold": "SELECT score, DENSE_RANK() OVER (ORDER BY score DESC) AS \"rank\" FROM Scores ORDER BY score DESC", "cases": [{"name": "Base sample (ties)", "inserts": [], "hint": ""}, {"name": "All unique scores", "inserts": ["DELETE FROM Scores", "INSERT INTO Scores VALUES (1,95.0)", "INSERT INTO Scores VALUES (2,80.0)", "INSERT INTO Scores VALUES (3,65.0)"], "hint": "Without ties DENSE_RANK behaves like RANK — output should be 1,2,3."}, {"name": "All equal scores", "inserts": ["DELETE FROM Scores", "INSERT INTO Scores VALUES (1,50.0)", "INSERT INTO Scores VALUES (2,50.0)"], "hint": "DENSE_RANK gives every row rank 1; RANK would too — but ROW_NUMBER wouldn't."}]}}, "department-top-three-salaries": {"title": "Department Top Three Salaries", "schemas": ["Create table If Not Exists Employee (id int, name varchar(255), salary int, departmentId int)", "Create table If Not Exists Department (id int, name varchar(255))", "DELETE FROM  Employee", "insert into Employee (id, name, salary, departmentId) values ('1', 'Joe', '85000', '1')", "insert into Employee (id, name, salary, departmentId) values ('2', 'Henry', '80000', '2')", "insert into Employee (id, name, salary, departmentId) values ('3', 'Sam', '60000', '2')", "insert into Employee (id, name, salary, departmentId) values ('4', 'Max', '90000', '1')", "insert into Employee (id, name, salary, departmentId) values ('5', 'Janet', '69000', '1')", "insert into Employee (id, name, salary, departmentId) values ('6', 'Randy', '85000', '1')", "insert into Employee (id, name, salary, departmentId) values ('7', 'Will', '70000', '1')", "DELETE FROM  Department", "insert into Department (id, name) values ('1', 'IT')", "insert into Department (id, name) values ('2', 'Sales')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| id           | int     |\n| name         | varchar |\n| salary       | int     |\n| departmentId | int     |\n+--------------+---------+\nid is the primary key (column with unique values) for this table.\ndepartmentId is a foreign key (reference column) of the ID from the <code>Department </code>table.\nEach row of this table indicates the ID, name, and salary of an employee. It also contains the ID of their department.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Department</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table indicates the ID of a department and its name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>A company&#39;s executives are interested in seeing who earns the most money in each of the company&#39;s departments. A <strong>high earner</strong> in a department is an employee who has a salary in the <strong>top three unique</strong> salaries for that department.</p>\n\n<p>Write a solution to find the employees who are <strong>high earners</strong> in each of the departments.</p>\n\n<p>Return the result table <strong>in any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+-------+--------+--------------+\n| id | name  | salary | departmentId |\n+----+-------+--------+--------------+\n| 1  | Joe   | 85000  | 1            |\n| 2  | Henry | 80000  | 2            |\n| 3  | Sam   | 60000  | 2            |\n| 4  | Max   | 90000  | 1            |\n| 5  | Janet | 69000  | 1            |\n| 6  | Randy | 85000  | 1            |\n| 7  | Will  | 70000  | 1            |\n+----+-------+--------+--------------+\nDepartment table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | IT    |\n| 2  | Sales |\n+----+-------+\n<strong>Output:</strong> \n+------------+----------+--------+\n| Department | Employee | Salary |\n+------------+----------+--------+\n| IT         | Max      | 90000  |\n| IT         | Joe      | 85000  |\n| IT         | Randy    | 85000  |\n| IT         | Will     | 70000  |\n| Sales      | Henry    | 80000  |\n| Sales      | Sam      | 60000  |\n+------------+----------+--------+\n<strong>Explanation:</strong> \nIn the IT department:\n- Max earns the highest unique salary\n- Both Randy and Joe earn the second-highest unique salary\n- Will earns the third-highest unique salary\n\nIn the Sales department:\n- Henry earns the highest salary\n- Sam earns the second-highest salary\n- There is no third-highest salary as there are only two employees\n</pre>\n\n<p>&nbsp;</p>\n<p><strong>Constraints:</strong></p>\n\n<ul>\n\t<li>There are no employees with the <strong>exact</strong> same name, salary <em>and</em> department.</li>\n</ul>", "shadow": {"gold": "WITH ranked AS (\n            SELECT e.*, DENSE_RANK() OVER (PARTITION BY departmentId ORDER BY salary DESC) AS rnk\n            FROM Employee e\n        )\n        SELECT d.name AS Department, r.name AS Employee, r.salary AS Salary\n        FROM ranked r JOIN Department d ON r.departmentId = d.id\n        WHERE r.rnk <= 3\n        ORDER BY d.name, r.salary DESC, r.name", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "More than 3 people tied at rank 3", "inserts": ["INSERT INTO Employee VALUES (100,'X',50000,1)", "INSERT INTO Employee VALUES (101,'Y',50000,1)"], "hint": "Use DENSE_RANK, not ROW_NUMBER — tied employees at 3rd place must all be included."}]}}, "market-analysis-ii": {"title": "Market Analysis II", "schemas": ["Create table If Not Exists Users (user_id int, join_date date, favorite_brand varchar(10))", "Create table If Not Exists Orders (order_id int, order_date date, item_id int, buyer_id int, seller_id int)", "Create table If Not Exists Items (item_id int, item_brand varchar(10))", "DELETE FROM  Users", "insert into Users (user_id, join_date, favorite_brand) values ('1', '2019-01-01', 'Lenovo')", "insert into Users (user_id, join_date, favorite_brand) values ('2', '2019-02-09', 'Samsung')", "insert into Users (user_id, join_date, favorite_brand) values ('3', '2019-01-19', 'LG')", "insert into Users (user_id, join_date, favorite_brand) values ('4', '2019-05-21', 'HP')", "DELETE FROM  Orders", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('1', '2019-08-01', '4', '1', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('2', '2019-08-02', '2', '1', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('3', '2019-08-03', '3', '2', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('4', '2019-08-04', '1', '4', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('5', '2019-08-04', '1', '3', '4')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('6', '2019-08-05', '2', '2', '4')", "DELETE FROM  Items", "insert into Items (item_id, item_brand) values ('1', 'Samsung')", "insert into Items (item_id, item_brand) values ('2', 'Lenovo')", "insert into Items (item_id, item_brand) values ('3', 'LG')", "insert into Items (item_id, item_brand) values ('4', 'HP')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Users</code></p>\n<pre>\n+----------------+---------+\n| Column Name    | Type    |\n+----------------+---------+\n| user_id        | int     |\n| join_date      | date    |\n| favorite_brand | varchar |\n+----------------+---------+\nuser_id is the primary key of this table.\nThis table has the info of the users of an online shopping website where users can sell and buy items.</pre>\n<p>Table: <code>Orders</code></p>\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| order_date    | date    |\n| item_id       | int     |\n| buyer_id      | int     |\n| seller_id     | int     |\n+---------------+---------+\norder_id is the primary key of this table.\nitem_id is a foreign key to the Items table.\nbuyer_id and seller_id are foreign keys to the Users table.\n</pre>\n<p>Table: <code>Items</code></p>\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| item_id       | int     |\n| item_brand    | varchar |\n+---------------+---------+\nitem_id is the primary key of this table.\n</pre>\n<p> </p>\n<p>Write an SQL query to find for each user, whether the brand of the second item (by date) they\n        sold is their favorite brand. If a user sold less than two items, report the\n        answer for that user as no.</p>\n<p>It is guaranteed that no seller sold more than one item on a day.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nUsers table:\n+---------+------------+----------------+\n| user_id | join_date  | favorite_brand |\n+---------+------------+----------------+\n| 1       | 2019-01-01 | Lenovo         |\n| 2       | 2019-02-09 | Samsung        |\n| 3       | 2019-01-19 | LG             |\n| 4       | 2019-05-21 | HP             |\n+---------+------------+----------------+\n\nOrders table:\n+----------+------------+---------+----------+-----------+\n| order_id | order_date | item_id | buyer_id | seller_id |\n+----------+------------+---------+----------+-----------+\n| 1        | 2019-08-01 | 4       | 1        | 2         |\n| 2        | 2019-08-02 | 2       | 1        | 3         |\n| 3        | 2019-08-03 | 3       | 2        | 3         |\n| 4        | 2019-08-04 | 1       | 4        | 2         |\n| 5        | 2019-08-04 | 1       | 3        | 4         |\n| 6        | 2019-08-05 | 2       | 2        | 4         |\n+----------+------------+---------+----------+-----------+\n\nItems table:\n+---------+------------+\n| item_id | item_brand |\n+---------+------------+\n| 1       | Samsung    |\n| 2       | Lenovo     |\n| 3       | LG         |\n| 4       | HP         |\n+---------+------------+\n\nResult table:\n+-----------+--------------------+\n| seller_id | 2nd_item_fav_brand |\n+-----------+--------------------+\n| 1         | no                 |\n| 2         | yes                |\n| 3         | yes                |\n| 4         | no                 |\n+-----------+--------------------+\n\nThe answer for the user with id 1 is no because they sold nothing.\nThe answer for the users with id 2 and 3 is yes because the brands of their second sold items are their favorite brands.\nThe answer for the user with id 4 is no because the brand of their second sold item is not their favorite brand.</pre>\n\n</div>", "shadow": {"gold": "WITH firsts AS (\n            SELECT seller_id, MIN(order_date) AS first_date FROM Orders GROUP BY seller_id\n        ),\n        first_item AS (\n            SELECT o.seller_id, o.item_id FROM Orders o JOIN firsts f\n              ON o.seller_id = f.seller_id AND o.order_date = f.first_date\n        )\n        SELECT u.user_id AS seller_id,\n               CASE WHEN u.favorite_brand = i.item_brand THEN 'yes' ELSE 'no' END AS \"2nd_item_fav_brand\"\n        FROM Users u\n        LEFT JOIN first_item fi ON fi.seller_id = u.user_id\n        LEFT JOIN Items i ON fi.item_id = i.item_id\n        ORDER BY u.user_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Seller with no orders", "hint": "LEFT JOIN — sellers without any orders must appear with 'no'.", "inserts": ["DELETE FROM Users", "INSERT INTO Users VALUES (99,'2019-01-01','Lenovo')", "DELETE FROM Orders"]}]}}, "rising-temperature": {"title": "Rising Temperature", "schemas": ["Create table If Not Exists Weather (id int, recordDate date, temperature int)", "DELETE FROM  Weather", "insert into Weather (id, recordDate, temperature) values ('1', '2015-01-01', '10')", "insert into Weather (id, recordDate, temperature) values ('2', '2015-01-02', '25')", "insert into Weather (id, recordDate, temperature) values ('3', '2015-01-03', '20')", "insert into Weather (id, recordDate, temperature) values ('4', '2015-01-04', '30')"], "content": "<p>Table: <code>Weather</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| id            | int     |\n| recordDate    | date    |\n| temperature   | int     |\n+---------------+---------+\nid is the column with unique values for this table.\nThere are no different rows with the same recordDate.\nThis table contains information about the temperature on a certain day.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find all dates&#39; <code>id</code> with higher temperatures compared to its previous dates (yesterday).</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nWeather table:\n+----+------------+-------------+\n| id | recordDate | temperature |\n+----+------------+-------------+\n| 1  | 2015-01-01 | 10          |\n| 2  | 2015-01-02 | 25          |\n| 3  | 2015-01-03 | 20          |\n| 4  | 2015-01-04 | 30          |\n+----+------------+-------------+\n<strong>Output:</strong> \n+----+\n| id |\n+----+\n| 2  |\n| 4  |\n+----+\n<strong>Explanation:</strong> \nIn 2015-01-02, the temperature was higher than the previous day (10 -&gt; 25).\nIn 2015-01-04, the temperature was higher than the previous day (20 -&gt; 30).\n</pre>", "shadow": {"gold": "SELECT w1.id FROM Weather w1 JOIN Weather w2 ON DATE(w1.recordDate) = DATE(w2.recordDate, '+1 day') WHERE w1.temperature > w2.temperature ORDER BY w1.id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Gap in dates — must NOT match", "inserts": ["DELETE FROM Weather", "INSERT INTO Weather VALUES (1,'2023-01-01',20)", "INSERT INTO Weather VALUES (2,'2023-01-03',30)"], "hint": "Must compare to previous-day, not previous-row. Gapped dates should not qualify."}, {"name": "Equal temperatures — excluded", "inserts": ["DELETE FROM Weather", "INSERT INTO Weather VALUES (1,'2023-01-01',25)", "INSERT INTO Weather VALUES (2,'2023-01-02',25)"], "hint": "Use strictly > not >="}]}}, "consecutive-numbers": {"title": "Consecutive Numbers", "schemas": ["Create table If Not Exists Logs (id int, num int)", "DELETE FROM  Logs", "insert into Logs (id, num) values ('1', '1')", "insert into Logs (id, num) values ('2', '1')", "insert into Logs (id, num) values ('3', '1')", "insert into Logs (id, num) values ('4', '2')", "insert into Logs (id, num) values ('5', '1')", "insert into Logs (id, num) values ('6', '2')", "insert into Logs (id, num) values ('7', '2')", "DELETE FROM Logs", "INSERT INTO Logs VALUES (1,1)", "INSERT INTO Logs VALUES (2,1)", "INSERT INTO Logs VALUES (3,1)", "INSERT INTO Logs VALUES (4,2)", "INSERT INTO Logs VALUES (5,1)", "INSERT INTO Logs VALUES (6,2)", "INSERT INTO Logs VALUES (7,2)", "DELETE FROM Logs", "INSERT INTO Logs VALUES (1,1)", "INSERT INTO Logs VALUES (2,1)", "INSERT INTO Logs VALUES (3,1)", "INSERT INTO Logs VALUES (4,2)", "INSERT INTO Logs VALUES (5,1)", "INSERT INTO Logs VALUES (6,2)", "INSERT INTO Logs VALUES (7,2)"], "content": "<p>Table: <code>Logs</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| num         | varchar |\n+-------------+---------+\nIn SQL, id is the primary key for this table.\nid is an autoincrement column starting from 1.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Find all numbers that appear at least three times consecutively.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nLogs table:\n+----+-----+\n| id | num |\n+----+-----+\n| 1  | 1   |\n| 2  | 1   |\n| 3  | 1   |\n| 4  | 2   |\n| 5  | 1   |\n| 6  | 2   |\n| 7  | 2   |\n+----+-----+\n<strong>Output:</strong> \n+-----------------+\n| ConsecutiveNums |\n+-----------------+\n| 1               |\n+-----------------+\n<strong>Explanation:</strong> 1 is the only number that appears consecutively for at least three times.\n</pre>", "shadow": {"gold": "SELECT DISTINCT l1.num AS ConsecutiveNums FROM Logs l1\n        JOIN Logs l2 ON l2.id = l1.id + 1\n        JOIN Logs l3 ON l3.id = l1.id + 2\n        WHERE l1.num = l2.num AND l2.num = l3.num\n        ORDER BY ConsecutiveNums", "cases": [{"name": "Base sample (1 appears 3+ times consecutively)", "inserts": [], "hint": ""}, {"name": "No three-in-a-row", "inserts": ["DELETE FROM Logs", "INSERT INTO Logs VALUES (1,1)", "INSERT INTO Logs VALUES (2,1)", "INSERT INTO Logs VALUES (3,2)"], "hint": "Return empty when no number appears 3 consecutive times."}, {"name": "Four in a row — still only returns once (DISTINCT)", "inserts": ["DELETE FROM Logs", "INSERT INTO Logs VALUES (1,5)", "INSERT INTO Logs VALUES (2,5)", "INSERT INTO Logs VALUES (3,5)", "INSERT INTO Logs VALUES (4,5)"], "hint": "Use SELECT DISTINCT or GROUP BY — 4-in-a-row should not emit duplicate rows."}]}}, "find-cumulative-salary-of-an-employee": {"title": "Find Cumulative Salary of an Employee", "schemas": ["Create table If Not Exists Employee (id int, month int, salary int)", "DELETE FROM  Employee", "insert into Employee (id, month, salary) values ('1', '1', '20')", "insert into Employee (id, month, salary) values ('2', '1', '20')", "insert into Employee (id, month, salary) values ('1', '2', '30')", "insert into Employee (id, month, salary) values ('2', '2', '30')", "insert into Employee (id, month, salary) values ('3', '2', '40')", "insert into Employee (id, month, salary) values ('1', '3', '40')", "insert into Employee (id, month, salary) values ('3', '3', '60')", "insert into Employee (id, month, salary) values ('1', '4', '60')", "insert into Employee (id, month, salary) values ('3', '4', '70')", "insert into Employee (id, month, salary) values ('1', '7', '90')", "insert into Employee (id, month, salary) values ('1', '8', '90')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <b>Employee</b> table holds the salary information in a year.</p>\n<p>Write a SQL to get the cumulative sum of an employee's salary over a period of 3 months\n        but exclude the most recent month.</p>\n<p>The result should be displayed by 'Id' ascending, and then by 'Month'\n        descending.</p>\n<p><b>Example</b><br/>\n<b>Input</b></p>\n<pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 1     | 20     |\n| 2  | 1     | 20     |\n| 1  | 2     | 30     |\n| 2  | 2     | 30     |\n| 3  | 2     | 40     |\n| 1  | 3     | 40     |\n| 3  | 3     | 60     |\n| 1  | 4     | 60     |\n| 3  | 4     | 70     |\n</pre>\n<b>Output</b>\n<pre>\n\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 3     | 90     |\n| 1  | 2     | 50     |\n| 1  | 1     | 20     |\n| 2  | 1     | 20     |\n| 3  | 3     | 100    |\n| 3  | 2     | 40     |\n</pre>\n<p> </p>\n<b>Explanation</b>\n<p>Employee '1' has 3 salary records for the following 3 months except the most recent\n        month '4': salary 40 for month '3', 30 for month '2' and 20 for\n        month '1'<br/>\n        So the cumulative sum of salary of this employee over 3 months is 90(40+30+20), 50(30+20)\n        and 20 respectively.</p>\n<pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 3     | 90     |\n| 1  | 2     | 50     |\n| 1  | 1     | 20     |\n</pre>\n    Employee '2' only has one salary record (month '1') except its most recent month\n    '2'.\n\n    <pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 2  | 1     | 20     |\n</pre>\n<p> </p>\n    Employ '3' has two salary records except its most recent pay month '4': month\n    '3' with 60 and month '2' with 40. So the cumulative salary is as following.\n\n    <pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 3  | 3     | 100    |\n| 3  | 2     | 40     |\n</pre>\n<p> </p>\n\n</div>", "shadow": {"gold": "WITH ranked AS (\n            SELECT id, month, salary,\n                   ROW_NUMBER() OVER (PARTITION BY id ORDER BY month DESC) AS rn\n            FROM Employee\n        ),\n        kept AS (SELECT * FROM ranked WHERE rn >= 2)\n        SELECT id, month,\n            SUM(salary) OVER (PARTITION BY id ORDER BY month ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS Salary\n        FROM kept ORDER BY id, month DESC", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Employee with only 1 month", "hint": "Excluding the most recent month leaves 0 rows for this employee.", "inserts": ["DELETE FROM Employee", "INSERT INTO Employee VALUES (99,1,50)"]}]}}, "game-play-analysis-iii": {"title": "Game Play Analysis III", "schemas": ["Create table If Not Exists Activity (player_id int, device_id int, event_date date, games_played int)", "DELETE FROM  Activity", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-01', '5')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-05-02', '6')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '3', '2017-06-25', '1')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '1', '2016-03-02', '0')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '4', '2018-07-03', '5')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Activity</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| player_id    | int     |\n| device_id    | int     |\n| event_date   | date    |\n| games_played | int     |\n+--------------+---------+\n(player_id, event_date) is the primary key of this table.\nThis table shows the activity of players of some game.\nEach row is a record of a player who logged in and played a number of games (possibly 0) before logging out on some day using some device.\n</pre>\n<p> </p>\n<p>Write an SQL query that reports the <strong>fraction</strong> of players that logged in again\n        on the day after the day they first logged in, <strong>rounded to 2 decimal\n            places</strong>. In other words, you need to count the number of players that\n        logged in for at least two consecutive days starting from their first login date, then\n        divide that number by the total number of players.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nActivity table:\n+-----------+-----------+------------+--------------+\n| player_id | device_id | event_date | games_played |\n+-----------+-----------+------------+--------------+\n| 1         | 2         | 2016-03-01 | 5            |\n| 1         | 2         | 2016-03-02 | 6            |\n| 2         | 3         | 2017-06-25 | 1            |\n| 3         | 1         | 2016-03-02 | 0            |\n| 3         | 4         | 2018-07-03 | 5            |\n+-----------+-----------+------------+--------------+\n\nResult table:\n+-----------+\n| fraction  |\n+-----------+\n| 0.33      |\n+-----------+\nOnly the player with id 1 logged back in after the first day he had logged in so the answer is 1/3 = 0.33\n</pre>\n\n</div>", "shadow": {"gold": "SELECT player_id, event_date, SUM(games_played) OVER (PARTITION BY player_id ORDER BY event_date) AS games_played_so_far FROM Activity ORDER BY player_id, event_date", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Single event", "hint": "Running sum of 1 row equals that row.", "inserts": ["DELETE FROM Activity", "INSERT INTO Activity VALUES (55,9,'2023-01-01',7)"]}]}}, "last-person-to-fit-in-the-bus": {"title": "Last Person to Fit in the Bus", "schemas": ["Create table If Not Exists Queue (person_id int, person_name varchar(30), weight int, turn int)", "DELETE FROM  Queue", "insert into Queue (person_id, person_name, weight, turn) values ('5', 'Alice', '250', '1')", "insert into Queue (person_id, person_name, weight, turn) values ('4', 'Bob', '175', '5')", "insert into Queue (person_id, person_name, weight, turn) values ('3', 'Alex', '350', '2')", "insert into Queue (person_id, person_name, weight, turn) values ('6', 'John Cena', '400', '3')", "insert into Queue (person_id, person_name, weight, turn) values ('1', 'Winston', '500', '6')", "insert into Queue (person_id, person_name, weight, turn) values ('2', 'Marie', '200', '4')"], "content": "<p>Table: <code>Queue</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| person_id   | int     |\n| person_name | varchar |\n| weight      | int     |\n| turn        | int     |\n+-------------+---------+\nperson_id column contains unique values.\nThis table has the information about all people waiting for a bus.\nThe person_id and turn columns will contain all numbers from 1 to n, where n is the number of rows in the table.\nturn determines the order of which the people will board the bus, where turn=1 denotes the first person to board and turn=n denotes the last person to board.\nweight is the weight of the person in kilograms.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>There is a queue of people waiting to board a bus. However, the bus has a weight limit of <code>1000</code><strong> kilograms</strong>, so there may be some people who cannot board.</p>\n\n<p>Write a solution to find the <code>person_name</code> of the <strong>last person</strong> that can fit on the bus without exceeding the weight limit. The test cases are generated such that the first person does not exceed the weight limit.</p>\n\n<p><strong>Note</strong> that <em>only one</em> person can board the bus at any given turn.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nQueue table:\n+-----------+-------------+--------+------+\n| person_id | person_name | weight | turn |\n+-----------+-------------+--------+------+\n| 5         | Alice       | 250    | 1    |\n| 4         | Bob         | 175    | 5    |\n| 3         | Alex        | 350    | 2    |\n| 6         | John Cena   | 400    | 3    |\n| 1         | Winston     | 500    | 6    |\n| 2         | Marie       | 200    | 4    |\n+-----------+-------------+--------+------+\n<strong>Output:</strong> \n+-------------+\n| person_name |\n+-------------+\n| John Cena   |\n+-------------+\n<strong>Explanation:</strong> The folowing table is ordered by the turn for simplicity.\n+------+----+-----------+--------+--------------+\n| Turn | ID | Name      | Weight | Total Weight |\n+------+----+-----------+--------+--------------+\n| 1    | 5  | Alice     | 250    | 250          |\n| 2    | 3  | Alex      | 350    | 600          |\n| 3    | 6  | John Cena | 400    | 1000         | (last person to board)\n| 4    | 2  | Marie     | 200    | 1200         | (cannot board)\n| 5    | 4  | Bob       | 175    | ___          |\n| 6    | 1  | Winston   | 500    | ___          |\n+------+----+-----------+--------+--------------+\n</pre>", "shadow": {"gold": "WITH cume AS (\n            SELECT person_id, person_name, weight, turn,\n                   SUM(weight) OVER (ORDER BY turn) AS running\n            FROM Queue\n        )\n        SELECT person_name FROM cume WHERE running <= 1000 ORDER BY running DESC LIMIT 1", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Everyone fits", "inserts": ["DELETE FROM Queue", "INSERT INTO Queue VALUES (1,'A',100,1)", "INSERT INTO Queue VALUES (2,'B',200,2)"], "hint": "Return the last person in turn order when total weight ≤ 1000."}]}}, "account-balance": {"title": "Account Balance", "schemas": ["Create table If Not Exists Transactions (account_id int, day date, type VARCHAR(20), amount int)", "DELETE FROM  Transactions", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-07', 'Deposit', '2000')", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-09', 'Withdraw', '1000')", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-11', 'Deposit', '3000')", "insert into Transactions (account_id, day, type, amount) values ('2', '2021-12-07', 'Deposit', '7000')", "insert into Transactions (account_id, day, type, amount) values ('2', '2021-12-12', 'Withdraw', '7000')"], "content": "<p>Table: <code>Transactions(account_id, day, type, amount)</code> where <code>type ∈ {'Deposit','Withdraw'}</code>.</p>\n<p>For every transaction, return the <strong>running account balance after that day</strong> — i.e. cumulative sum per account where <code>Deposit</code> adds <code>amount</code> and <code>Withdraw</code> subtracts <code>amount</code>.</p>\n<p>Output columns: <code>account_id</code>, <code>day</code>, <code>balance</code>. Sort by <code>account_id, day</code>.</p>\n<h4>Hint</h4>\n<p>Classic window pattern: <code>SUM(CASE WHEN type='Deposit' THEN amount ELSE -amount END) OVER (PARTITION BY account_id ORDER BY day)</code>.</p>\n<h4>Sample</h4>\n<pre>\naccount_id | day        | type     | amount      balance\n-----------+------------+----------+-------     ---------\n1          | 2021-11-07 | Deposit  | 2000  -->   2000\n1          | 2021-11-09 | Withdraw | 1000  -->   1000\n1          | 2021-11-11 | Deposit  | 3000  -->   4000\n2          | 2021-12-07 | Deposit  | 7000  -->   7000\n2          | 2021-12-12 | Withdraw | 7000  -->      0\n</pre>", "shadow": {"gold": "SELECT account_id, day,\n            SUM(CASE WHEN type='Deposit' THEN amount ELSE -amount END)\n              OVER (PARTITION BY account_id ORDER BY day) AS balance\n         FROM Transactions ORDER BY account_id, day", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Sign flip — large Withdraw after Deposit", "inserts": ["INSERT INTO Transactions VALUES (1,'2023-12-01','Withdraw',999999)"], "hint": "Use CASE to sign-flip Withdraws, else cumulative sum will inflate."}, {"name": "Single transaction", "hint": "Result row must still be emitted when the account has just one transaction.", "inserts": ["DELETE FROM Transactions", "INSERT INTO Transactions VALUES (5,'2022-01-01','Deposit',500)"]}, {"name": "Balance goes negative", "hint": "Withdrawals without prior deposits must produce a negative running balance.", "inserts": ["DELETE FROM Transactions", "INSERT INTO Transactions VALUES (9,'2022-01-01','Withdraw',300)", "INSERT INTO Transactions VALUES (9,'2022-01-02','Withdraw',100)", "INSERT INTO Transactions VALUES (9,'2022-01-03','Deposit',200)"]}]}}, "median-given-frequency-of-numbers": {"title": "Median Given Frequency of Numbers", "schemas": ["CREATE TABLE IF NOT EXISTS Numbers (num int, frequency int)", "DELETE FROM Numbers", "INSERT INTO Numbers VALUES (0,7)", "INSERT INTO Numbers VALUES (1,1)", "INSERT INTO Numbers VALUES (2,3)", "INSERT INTO Numbers VALUES (3,1)"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Numbers</code> table keeps the value of number and its frequency.</p>\n<pre>\n+----------+-------------+\n|  Number  |  Frequency  |\n+----------+-------------|\n|  0       |  7          |\n|  1       |  1          |\n|  2       |  3          |\n|  3       |  1          |\n+----------+-------------+\n</pre>\n<p>In this table, the numbers are <code>0, 0, 0, 0, 0, 0, 0, 1, 2, 2, 2, 3</code>, so the median\n        is <code>(0 + 0) / 2 = 0</code>.</p>\n<pre>\n+--------+\n| median |\n+--------|\n| 0.0000 |\n+--------+\n</pre>\n<p>Write a query to find the median of all numbers and name the result as <code>median</code>.\n    </p>\n\n</div>", "shadow": {"gold": "WITH exp AS (\n            SELECT num, frequency, SUM(frequency) OVER (ORDER BY num) AS rn_hi,\n                   SUM(frequency) OVER (ORDER BY num) - frequency + 1 AS rn_lo\n            FROM Numbers\n        ),\n        total AS (SELECT SUM(frequency) AS n FROM Numbers)\n        SELECT ROUND(AVG(1.0*num), 1) AS median FROM exp, total\n        WHERE rn_lo <= (n + 1) / 2 AND rn_hi >= (n + 2) / 2", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Even total count — median is average of middle pair", "inserts": ["DELETE FROM Numbers", "INSERT INTO Numbers VALUES (1,1)", "INSERT INTO Numbers VALUES (2,1)"], "hint": "When total count is even, median = average of the two middle values."}]}}, "active-businesses": {"title": "Active Businesses", "schemas": ["Create table If Not Exists Events (business_id int, event_type varchar(10), occurrences int)", "DELETE FROM  Events", "insert into Events (business_id, event_type, occurrences) values ('1', 'reviews', '7')", "insert into Events (business_id, event_type, occurrences) values ('3', 'reviews', '3')", "insert into Events (business_id, event_type, occurrences) values ('1', 'ads', '11')", "insert into Events (business_id, event_type, occurrences) values ('2', 'ads', '7')", "insert into Events (business_id, event_type, occurrences) values ('3', 'ads', '6')", "insert into Events (business_id, event_type, occurrences) values ('1', 'page views', '3')", "insert into Events (business_id, event_type, occurrences) values ('2', 'page views', '12')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Failed</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| fail_date    | date    |\n+--------------+---------+\nPrimary key for this table is fail_date.\nFailed table contains the days of failed tasks.\n</pre>\n<p>Table: <code>Succeeded</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| success_date | date    |\n+--------------+---------+\nPrimary key for this table is success_date.\nSucceeded table contains the days of succeeded tasks.\n</pre>\n<p> </p>\n<p>A system is running one task <strong>every day</strong>. Every task is independent of the\n        previous tasks. The tasks can fail or succeed.</p>\n<p>Write an SQL query to generate a report of <code>period_state</code> for each continuous\n        interval of days in the period from <strong>2019-01-01</strong> to\n        <strong>2019-12-31</strong>.</p>\n<p><code>period_state</code> is <em>'failed' </em>if tasks in this interval failed\n        or <em>'succeeded'</em> if tasks in this interval succeeded. Interval of days\n        are retrieved as <code>start_date</code> and <code>end_date.</code></p>\n<p>Order result by <code>start_date</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nFailed table:\n+-------------------+\n| fail_date         |\n+-------------------+\n| 2018-12-28        |\n| 2018-12-29        |\n| 2019-01-04        |\n| 2019-01-05        |\n+-------------------+\n\nSucceeded table:\n+-------------------+\n| success_date      |\n+-------------------+\n| 2018-12-30        |\n| 2018-12-31        |\n| 2019-01-01        |\n| 2019-01-02        |\n| 2019-01-03        |\n| 2019-01-06        |\n+-------------------+\n\nResult table:\n+--------------+--------------+--------------+\n| period_state | start_date   | end_date     |\n+--------------+--------------+--------------+\n| succeeded    | 2019-01-01   | 2019-01-03   |\n| failed       | 2019-01-04   | 2019-01-05   |\n| succeeded    | 2019-01-06   | 2019-01-06   |\n+--------------+--------------+--------------+\n\nThe report ignored the system state in 2018 as we care about the system in the period 2019-01-01 to 2019-12-31.\nFrom 2019-01-01 to 2019-01-03 all tasks succeeded and the system state was \"succeeded\".\nFrom 2019-01-04 to 2019-01-05 all tasks failed and system state was \"failed\".\nFrom 2019-01-06 to 2019-01-06 all tasks succeeded and system state was \"succeeded\".\n</pre>\n\n</div>", "shadow": {"gold": "WITH avg_ev AS (SELECT event_type, AVG(occurrences) AS avg_o FROM Events GROUP BY event_type)\n        SELECT e.business_id FROM Events e JOIN avg_ev a ON e.event_type = a.event_type\n        WHERE e.occurrences > a.avg_o\n        GROUP BY e.business_id HAVING COUNT(*) >= 2 ORDER BY e.business_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Single event type", "hint": "A business needs >= 2 event types above the global avg — a single-event business cannot qualify.", "inserts": ["DELETE FROM Events", "INSERT INTO Events VALUES (20,'reviews',999)", "INSERT INTO Events VALUES (21,'reviews',1)"]}]}}, "active-users": {"title": "Active Users", "schemas": ["Create table If Not Exists Accounts (id int, name varchar(10))", "Create table If Not Exists Logins (id int, login_date date)", "DELETE FROM  Accounts", "insert into Accounts (id, name) values ('1', 'Winston')", "insert into Accounts (id, name) values ('7', 'Jonathan')", "DELETE FROM  Logins", "insert into Logins (id, login_date) values ('7', '2020-05-30')", "insert into Logins (id, login_date) values ('1', '2020-05-30')", "insert into Logins (id, login_date) values ('7', '2020-05-31')", "insert into Logins (id, login_date) values ('7', '2020-06-01')", "insert into Logins (id, login_date) values ('7', '2020-06-02')", "insert into Logins (id, login_date) values ('7', '2020-06-02')", "insert into Logins (id, login_date) values ('7', '2020-06-03')", "insert into Logins (id, login_date) values ('1', '2020-06-07')", "insert into Logins (id, login_date) values ('7', '2020-06-10')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Logs</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| log_id        | int     |\n+---------------+---------+\nid is the primary key for this table.\nEach row of this table contains the ID in a log Table.\n\n</pre>\n<p>Since some IDs have been removed from <code>Logs</code>. Write an SQL query to\n                find the start and end number of continuous ranges in table <code>Logs</code>.</p>\n<p>Order the result table by <code>start_id</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre>Logs table:\n+------------+\n| log_id     |\n+------------+\n| 1          |\n| 2          |\n| 3          |\n| 7          |\n| 8          |\n| 10         |\n+------------+\n\nResult table:\n+------------+--------------+\n| start_id   | end_id       |\n+------------+--------------+\n| 1          | 3            |\n| 7          | 8            |\n| 10         | 10           |\n+------------+--------------+\nThe result table should contain all ranges in table Logs.\nFrom 1 to 3 is contained in the table.\nFrom 4 to 6 is missing in the table\nFrom 7 to 8 is contained in the table.\nNumber 9 is missing in the table.\nNumber 10 is contained in the table.\n</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "WITH diffs AS (\n            SELECT id, login_date,\n                   JULIANDAY(login_date) - JULIANDAY(LAG(login_date) OVER (PARTITION BY id ORDER BY login_date)) AS gap\n            FROM (SELECT DISTINCT id, login_date FROM Logins) x\n        )\n        SELECT DISTINCT l.id, a.name FROM diffs l JOIN Accounts a ON a.id = l.id WHERE l.gap = 1 ORDER BY l.id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "No consecutive-day logins", "hint": "Only accounts with at least one pair of consecutive login dates qualify.", "inserts": ["DELETE FROM Accounts", "INSERT INTO Accounts VALUES (5,'Solo')", "DELETE FROM Logins", "INSERT INTO Logins VALUES (5,'2024-01-01')", "INSERT INTO Logins VALUES (5,'2024-01-05')"]}]}}, "human-traffic-of-stadium": {"title": "Human Traffic of Stadium", "schemas": ["Create table If Not Exists Stadium (id int, visit_date DATE NULL, people int)", "DELETE FROM  Stadium", "insert into Stadium (id, visit_date, people) values ('1', '2017-01-01', '10')", "insert into Stadium (id, visit_date, people) values ('2', '2017-01-02', '109')", "insert into Stadium (id, visit_date, people) values ('3', '2017-01-03', '150')", "insert into Stadium (id, visit_date, people) values ('4', '2017-01-04', '99')", "insert into Stadium (id, visit_date, people) values ('5', '2017-01-05', '145')", "insert into Stadium (id, visit_date, people) values ('6', '2017-01-06', '1455')", "insert into Stadium (id, visit_date, people) values ('7', '2017-01-07', '199')", "insert into Stadium (id, visit_date, people) values ('8', '2017-01-09', '188')"], "content": "<p>Table: <code>Stadium</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| id            | int     |\n| visit_date    | date    |\n| people        | int     |\n+---------------+---------+\nvisit_date is the column with unique values for this table.\nEach row of this table contains the visit date and visit id to the stadium with the number of people during the visit.\nAs the id increases, the date increases as well.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to display the records with three or more rows with <strong>consecutive</strong> <code>id</code>&#39;s, and the number of people is greater than or equal to 100 for each.</p>\n\n<p>Return the result table ordered by <code>visit_date</code> in <strong>ascending order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nStadium table:\n+------+------------+-----------+\n| id   | visit_date | people    |\n+------+------------+-----------+\n| 1    | 2017-01-01 | 10        |\n| 2    | 2017-01-02 | 109       |\n| 3    | 2017-01-03 | 150       |\n| 4    | 2017-01-04 | 99        |\n| 5    | 2017-01-05 | 145       |\n| 6    | 2017-01-06 | 1455      |\n| 7    | 2017-01-07 | 199       |\n| 8    | 2017-01-09 | 188       |\n+------+------------+-----------+\n<strong>Output:</strong> \n+------+------------+-----------+\n| id   | visit_date | people    |\n+------+------------+-----------+\n| 5    | 2017-01-05 | 145       |\n| 6    | 2017-01-06 | 1455      |\n| 7    | 2017-01-07 | 199       |\n| 8    | 2017-01-09 | 188       |\n+------+------------+-----------+\n<strong>Explanation:</strong> \nThe four rows with ids 5, 6, 7, and 8 have consecutive ids and each of them has &gt;= 100 people attended. Note that row 8 was included even though the visit_date was not the next day after row 7.\nThe rows with ids 2 and 3 are not included because we need at least three consecutive ids.\n</pre>", "shadow": {"gold": "WITH busy AS (SELECT * FROM Stadium WHERE people >= 100),\n        grp AS (SELECT id, visit_date, people, id - ROW_NUMBER() OVER (ORDER BY id) AS g FROM busy),\n        cnt AS (SELECT g, COUNT(*) AS c FROM grp GROUP BY g)\n        SE
