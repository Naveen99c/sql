                highlightSQL(sql) {
                    if (!sql) return '';
                    const KEYWORDS = new Set(['SELECT','FROM','WHERE','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','AS','ON','AND','OR','NOT','IN','IS','NULL','LIKE','GLOB','BETWEEN','CASE','WHEN','THEN','ELSE','END','WITH','RECURSIVE','UNION','ALL','INTERSECT','EXCEPT','JOIN','LEFT','RIGHT','INNER','OUTER','CROSS','FULL','EXISTS','DISTINCT','OVER','PARTITION','ROWS','RANGE','BETWEEN','UNBOUNDED','PRECEDING','FOLLOWING','CURRENT','ROW','INTERVAL','ASC','DESC']);
                    const FUNCTIONS = new Set(['COUNT','SUM','AVG','MIN','MAX','ROW_NUMBER','RANK','DENSE_RANK','NTILE','LAG','LEAD','FIRST_VALUE','LAST_VALUE','NTH_VALUE','PERCENT_RANK','CUME_DIST','COALESCE','IFNULL','NULLIF','CAST','STRFTIME','DATE','DATETIME','JULIANDAY','SUBSTR','SUBSTRING','LENGTH','UPPER','LOWER','TRIM','REPLACE','ROUND','ABS','CEIL','FLOOR','POWER']);
                    const esc = this.escapeHTML(sql);
                    // Tokenize: strings, comments, numbers, identifiers, whitespace, punctuation
                    let out = '';
                    let i = 0;
                    const n = esc.length;
                    while (i < n) {
                        const ch = esc[i];
                        // Block comment
                        if (esc.startsWith('/*', i)) {
                            const end = esc.indexOf('*/', i + 2);
                            const stop = end === -1 ? n : end + 2;
                            out += `<span class="cmt">${esc.slice(i, stop)}</span>`;
                            i = stop; continue;
                        }
                        // Line comment
                        if (esc.startsWith('--', i)) {
                            let end = esc.indexOf('\n', i);
                            if (end === -1) end = n;
                            out += `<span class="cmt">${esc.slice(i, end)}</span>`;
                            i = end; continue;
                        }
                        // String literal
                        if (ch === "'" || ch === '"') {
                            const quote = ch;
                            let j = i + 1;
                            while (j < n && esc[j] !== quote) { j++; }
                            j = Math.min(j + 1, n);
                            out += `<span class="str">${esc.slice(i, j)}</span>`;
                            i = j; continue;
                        }
                        // Number
                        if (/[0-9]/.test(ch)) {
                            let j = i;
                            while (j < n && /[0-9.]/.test(esc[j])) j++;
                            out += `<span class="num">${esc.slice(i, j)}</span>`;
                            i = j; continue;
                        }
                        // Word
                        if (/[A-Za-z_]/.test(ch)) {
                            let j = i;
                            while (j < n && /[A-Za-z0-9_]/.test(esc[j])) j++;
                            const word = esc.slice(i, j);
                            const up = word.toUpperCase();
                            if (KEYWORDS.has(up)) {
                                out += `<span class="kw">${word}</span>`;
                            } else if (FUNCTIONS.has(up) && j < n && esc[j] === '(') {
                                out += `<span class="fn">${word}</span>`;
                            } else {
                                out += word;
                            }
                            i = j; continue;
                        }
                        out += ch;
                        i++;
                    }
                    return out;
                },

                detectPatterns(sql) {
                    if (!sql) return [];
                    const tags = [];
                    const up = sql.toUpperCase();
                    if (/\bWITH\s+RECURSIVE\b/.test(up)) tags.push('Recursive CTE');
                    else if (/\bWITH\b[\s\S]*\bAS\s*\(/.test(up)) tags.push('CTE');
                    if (/\bOVER\s*\(/.test(up)) tags.push('Window Function');
                    if (/\bROW_NUMBER\s*\(\s*\)/.test(up)) tags.push('ROW_NUMBER');
                    if (/\bRANK\s*\(\s*\)/.test(up)) tags.push('RANK');
                    if (/\bDENSE_RANK\s*\(\s*\)/.test(up)) tags.push('DENSE_RANK');
                    if (/\bLAG\s*\(/.test(up) || /\bLEAD\s*\(/.test(up)) tags.push('LAG/LEAD');
                    if (/\bPARTITION\s+BY\b/.test(up)) tags.push('Partitioned Window');
                    if (/\bROWS\s+BETWEEN\b|\bRANGE\s+BETWEEN\b/.test(up)) tags.push('Window Frame');
                    if (/\bGROUP\s+BY\b/.test(up)) tags.push('Aggregation');
                    if (/\bHAVING\b/.test(up)) tags.push('HAVING filter');
                    if (/\bNOT\s+EXISTS\b|\bNOT\s+IN\b|\bLEFT\s+JOIN\b[\s\S]*IS\s+NULL/.test(up)) tags.push('Anti-Join');
                    if (/\bEXISTS\b/.test(up) && !/NOT\s+EXISTS/.test(up)) tags.push('Semi-Join');
                    if (/\bUNION\s+ALL\b/.test(up)) tags.push('UNION ALL');
                    else if (/\bUNION\b/.test(up)) tags.push('UNION');
                    if (/\bINTERSECT\b/.test(up)) tags.push('INTERSECT');
                    if (/\bEXCEPT\b/.test(up)) tags.push('EXCEPT');
                    if (/\bCASE\s+WHEN\b/.test(up)) tags.push('Conditional CASE');
                    if (/\bSELF\s+JOIN\b/.test(up) || /\bFROM\s+(\w+)\s+\w+[\s\S]*JOIN\s+\1\b/i.test(sql)) tags.push('Self-Join');
                    if (/STRFTIME|DATE\s*\(|DATE_FORMAT|INTERVAL|JULIANDAY/.test(up)) tags.push('Date Logic');
                    if (/SUM\s*\(\s*CASE|COUNT\s*\(\s*CASE/.test(up)) tags.push('Conditional Aggregation');
                    if (/PIVOT|GROUP_CONCAT/.test(up)) tags.push('Pivot / String Agg');
                    return Array.from(new Set(tags));
                },

                buildExplanation(pData) {
                    if (!pData) return '<p>No explanation available.</p>';
                    // Author-supplied explanation takes precedence when present.
                    if (pData.explanation) return pData.explanation;

                    const gold = (pData.shadow && pData.shadow.gold) || '';
                    const cases = (pData.shadow && pData.shadow.cases) || [];
                    const patterns = this.detectPatterns(gold);
                    const orderSensitive = /\border\s+by\b/i.test(gold);

                    let html = '';

                    // Pattern tags
                    if (patterns.length) {
                        html += `<h4>Pattern</h4><p>`;
                        patterns.forEach(p => { html += `<span class="pattern-tag">${p}</span>`; });
                        html += `</p>`;
                    }

                    // How the gold query works — walk the structure
                    html += `<h4>How the Solution Works</h4><p>`;
                    const up = gold.toUpperCase();
                    const steps = [];
                    if (/\bWITH\s+RECURSIVE\b/.test(up)) {
                        steps.push('A <code>WITH RECURSIVE</code> CTE expands a base case repeatedly, unioning each generation onto the last until no new rows are produced.');
                    } else if (/\bWITH\b/.test(up) && /\bAS\s*\(/.test(up)) {
                        steps.push('One or more <code>WITH … AS (…)</code> CTEs stage intermediate transformations so the final <code>SELECT</code> stays flat and readable.');
                    }
                    if (/\bOVER\s*\(/.test(up)) {
                        steps.push('A window function (<code>OVER (…)</code>) computes per-row values without collapsing the rows — the key distinction from <code>GROUP BY</code>.');
                        if (/\bPARTITION\s+BY\b/.test(up)) {
                            steps.push('<code>PARTITION BY</code> resets the window calculation inside each group, so ranks/running totals restart per key.');
                        }
                        if (/\bROWS\s+BETWEEN\b|\bRANGE\s+BETWEEN\b/.test(up)) {
                            steps.push('The explicit frame (<code>ROWS BETWEEN …</code> or <code>RANGE BETWEEN …</code>) bounds which neighbour rows are aggregated per row.');
                        }
                    }
                    if (/\bGROUP\s+BY\b/.test(up)) {
                        steps.push('<code>GROUP BY</code> collapses rows into one per key so aggregates (<code>COUNT</code>, <code>SUM</code>, <code>AVG</code>) produce one value per group.');
                    }
                    if (/\bHAVING\b/.test(up)) {
                        steps.push('<code>HAVING</code> filters the already-aggregated groups — unlike <code>WHERE</code>, which filters raw rows before aggregation.');
                    }
                    if (/\bNOT\s+EXISTS\b/.test(up)) {
                        steps.push('<code>NOT EXISTS</code> is the NULL-safe way to anti-join: it returns outer rows that have no matching inner row, and behaves correctly even when the inner column is nullable.');
                    }
                    if (/\bLEFT\s+JOIN\b/.test(up) && /IS\s+NULL/.test(up)) {
                        steps.push('The <code>LEFT JOIN … WHERE x IS NULL</code> idiom is an anti-join — rows that failed to match the right side have <code>NULL</code> on that side.');
                    }
                    if (/\bCASE\s+WHEN\b/.test(up)) {
                        steps.push('<code>CASE WHEN</code> expresses per-row conditionals; wrapped in <code>SUM</code>/<code>COUNT</code> it becomes a conditional aggregate — the SQL equivalent of a pivot count.');
                    }
                    if (/\bUNION\s+ALL\b/.test(up)) {
                        steps.push('<code>UNION ALL</code> concatenates row-sets without de-duplicating (much faster than <code>UNION</code> when you know duplicates are impossible).');
                    }
                    if (/\bUNION\b/.test(up) && !/UNION\s+ALL/.test(up)) {
                        steps.push('<code>UNION</code> concatenates row-sets and removes duplicates — pay the sort cost only when duplicates are actually possible.');
                    }
                    if (/\bINTERSECT\b/.test(up)) {
                        steps.push('<code>INTERSECT</code> returns rows present in <em>both</em> sides — a set-based alternative to semi-join with <code>IN</code>.');
                    }
                    if (/\bEXCEPT\b/.test(up)) {
                        steps.push('<code>EXCEPT</code> returns rows present on the left but not the right — a set-based alternative to <code>NOT IN</code>/<code>NOT EXISTS</code>.');
                    }
                    if (steps.length === 0) {
                        steps.push('The query uses straightforward <code>SELECT</code> + <code>JOIN</code>/<code>WHERE</code>/<code>GROUP BY</code> semantics — trace each clause top-to-bottom to see how rows flow through filters and projection.');
                    }
                    html += steps.join(' ') + '</p>';

                    // ORDER BY
                    if (orderSensitive) {
                        html += `<h4>Ordering Requirement</h4><p>The gold query includes <code>ORDER BY</code>, so the grader is <em>order-sensitive</em> for this problem — make sure your final <code>ORDER BY</code> matches the column(s) and direction(s) implied by the problem.</p>`;
                    } else {
                        html += `<h4>Ordering</h4><p>The grader is set-equivalent (no <code>ORDER BY</code> in the gold), so you can return rows in any order — results are sorted canonically before comparison.</p>`;
                    }

                    // Edge cases from hidden test cases
                    const withHints = cases.filter(c => c.hint && c.hint.trim().length > 0);
                    if (withHints.length) {
                        html += `<h4>Edge Cases the Hidden Grader Checks</h4><ul>`;
                        withHints.forEach(c => {
                            html += `<li><strong>${this.escapeHTML(c.name || 'Edge case')}:</strong> ${this.escapeHTML(c.hint)}</li>`;
                        });
                        html += `</ul>`;
                    } else if (cases.length) {
                        html += `<h4>Hidden Cases</h4><p>The grader runs <strong>${cases.length}</strong> hidden case(s) with different seed data to ensure your query handles duplicates, empty inputs, and ordering correctly.</p>`;
                    }

                    // Pitfalls
                    const pitfalls = [];
                    if (/\bNOT\s+IN\b/.test(up)) pitfalls.push('<code>NOT IN</code> returns zero rows if the subquery ever yields a <code>NULL</code> — prefer <code>NOT EXISTS</code> when the inner column is nullable.');
                    if (/\bCOUNT\s*\(\s*\*\s*\)/.test(up)) pitfalls.push('<code>COUNT(*)</code> counts rows including <code>NULL</code>s; <code>COUNT(col)</code> skips nulls — pick the one that matches what "count" means for this problem.');
                    if (/\bLAG\s*\(/.test(up) || /\bLEAD\s*\(/.test(up)) pitfalls.push('<code>LAG</code>/<code>LEAD</code> return <code>NULL</code> at partition boundaries — handle those rows explicitly or accept them as intentional.');
                    if (/\bROW_NUMBER\s*\(\s*\)/.test(up)) pitfalls.push('<code>ROW_NUMBER</code> breaks ties arbitrarily — if ties should share a rank, use <code>RANK</code> or <code>DENSE_RANK</code>.');
                    if (/STRFTIME|DATE\s*\(/.test(up)) pitfalls.push('Date arithmetic is dialect-specific — this sandbox runs SQLite, so use <code>date(x, \'+N day\')</code> / <code>strftime(\'%Y-%m\', x)</code> rather than MySQL <code>DATE_ADD</code> if you write from scratch.');
                    if (pitfalls.length) {
                        html += `<h4>Common Pitfalls</h4><ul>`;
                        pitfalls.forEach(p => { html += `<li>${p}</li>`; });
                        html += `</ul>`;
                    }

                    html += `<h4>Study Tip</h4><p>Re-derive the gold query from scratch after reading the explanation — recall beats recognition for interview retention. Toggle the tab closed and try again before you move on.</p>`;

                    return html;
                },

                copySolution() {
                    if (!this.solutionSQL) return;
                    try {
                        navigator.clipboard.writeText(this.solutionSQL);
                        this.copyLabel = 'Copied ✓';
                        setTimeout(() => { this.copyLabel = 'Copy'; }, 1500);
                    } catch (_) {
                        this.copyLabel = 'Copy failed';
                        setTimeout(() => { this.copyLabel = 'Copy'; }, 1500);
                    }
                },

                loadSolutionIntoEditor() {
                    if (!this.solutionSQL || !_cmEditor) return;
                    _cmEditor.setValue(this.solutionSQL);
                    _cmEditor.focus();
                },
                
                // Sanitize MySQL-specific syntax for SQLite
                sanitizeSQL(stmt) {
                    // Strip ENUM(...) -> TEXT
                    let s = stmt.replace(/ENUM\s*\([^)]*\)/gi, 'TEXT');
                    // Strip DECIMAL(...) -> REAL
                    s = s.replace(/DECIMAL\s*\([^)]*\)/gi, 'REAL');
                    return s;
                },
                
                buildDB() {
                    const stmts = dbMeta[this.slug]?.schemas || [];
                    try {
                        stmts.forEach(s => this.db.run(this.sanitizeSQL(s)));
                        this.renderSchema();
                    } catch(e) {
                        console.error('Schema parsing err:', e);
                    }
                },
                
                renderSchema() {
                    let html = '';
                    const r = this.db.exec("SELECT name FROM sqlite_master WHERE type='table';");
                    if(r.length === 0) return;
                    
                    r[0].values.forEach(tbl => {
                        html += `<div style="margin-bottom:15px;">`;
                        html += `<div style="color:var(--action); font-weight:bold; margin-bottom:5px;">Table: ${tbl[0]}</div>`;
                        const cols = this.db.exec(`PRAGMA table_info(${tbl[0]});`);
                        if(cols.length > 0) {
                            html += `<table><thead><tr><th>Column Name</th><th>Type</th></tr></thead><tbody>`;
                            cols[0].values.forEach(c => {
                                html += `<tr><td>${c[1]}</td><td style="color:var(--text-dim)">${c[2]}</td></tr>`;
                            });
                            html += `</tbody></table>`;
                        }
                        html += `</div>`;
                    });
                    this.schemaHTML = html;
                },
                
                executeQuery() {
                    this.activeTab = 'result';
                    this.executed = true;
                    this.submitted = false;
                    this.error = null;
                    
                    // Always ensure we are testing on Sample Data on RUN
                    this.buildDB();
                    try {
                        this.results = this.db.exec(_cmEditor.getValue());
                        this.statusMsg = "Executed Successfully";
                        this.statusClass = "success-text";
                    } catch (err) {
                        this.results = [];
                        this.error = err.message;
                    }
                },
                
                // Normalize results into a comparable canonical form.
                // If the gold query has ORDER BY, we preserve row order; otherwise we sort
                // both gold & actual for set-equivalent comparison.
                canonicalize(execResult, orderSensitive) {
                    if (!execResult || execResult.length === 0) {
                        return { columns: [], values: [] };
                    }
                    const r = execResult[0];
                    const rows = r.values.map(v => v.map(c => (c === null ? null : String(c))));
                    if (!orderSensitive) {
                        rows.sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
                    }
                    return { columns: r.columns, values: rows };
                },

                diffSummary(gold, actual) {
                    // Produce a short, human-readable diff hint between expected/actual outputs.
                    if (gold.columns.length !== actual.columns.length) {
                        return `Column count mismatch — expected ${gold.columns.length} (${gold.columns.join(', ')}), got ${actual.columns.length} (${actual.columns.join(', ')}).`;
                    }
                    if (gold.columns.join('|').toLowerCase() !== actual.columns.join('|').toLowerCase()) {
                        return `Column names/order mismatch — expected [${gold.columns.join(', ')}], got [${actual.columns.join(', ')}].`;
                    }
                    if (gold.values.length !== actual.values.length) {
                        return `Row count mismatch — expected ${gold.values.length} row(s), got ${actual.values.length}.`;
                    }
                    // row-level diff
                    for (let i = 0; i < gold.values.length; i++) {
                        const g = gold.values[i], a = actual.values[i];
                        for (let j = 0; j < g.length; j++) {
                            if (String(g[j]) !== String(a[j])) {
                                return `Row ${i+1}, column "${gold.columns[j]}": expected \`${g[j]}\`, got \`${a[j]}\`.`;
                            }
                        }
                    }
                    return `Output differs in row ordering or subtle value formatting.`;
                },

                submitCode() {
                    this.activeTab = 'result';
                    this.executed = true;
                    this.submitted = true;
                    this.error = null;
                    this.isValidationFailed = false;
                    this.expectedResults = [];
                    this.results = [];

                    const pData = dbMeta[this.slug];
                    const userQuery = _cmEditor.getValue();

                    if (!pData.shadow || (!pData.shadow.cases && !pData.shadow.inserts)) {
                        // No validation configured — fall back to running against sample.
                        this.executeQuery();
                        if (!this.error) {
                            this.statusMsg = "Executed — no hidden validator configured for this problem";
                            this.statusClass = "success-text";
                        }
                        return;
                    }

                    // Normalize legacy format -> new `cases` format.
                    let cases = pData.shadow.cases;
                    if (!cases) {
                        cases = [{ name: "Hidden edge cases", inserts: pData.shadow.inserts || [], hint: pData.shadow.hint || "" }];
                    }
                    const goldSql = pData.shadow.gold;
                    if (!goldSql) {
                        this.error = "Validator misconfigured: missing gold query.";
                        this.statusMsg = "Runtime Error";
                        this.statusClass = "err-text";
                        return;
                    }

                    const orderSensitive = /\border\s+by\b/i.test(goldSql);
                    const passed = [];
                    let failedCase = null;
                    let failedGold = null;
                    let failedActual = null;
                    let failedDiff = "";
                    let runtimeErr = null;
                    let lastActualRaw = [];

                    for (const tc of cases) {
                        try {
                            // Rebuild base DB for each case (fresh state)
                            this.buildDB();
                            (tc.inserts || []).forEach(s => this.db.run(this.sanitizeSQL(s)));
                            const goldRaw = this.db.exec(goldSql);
                            const actualRaw = this.db.exec(userQuery);
                            lastActualRaw = actualRaw;
                            const gold = this.canonicalize(goldRaw, orderSensitive);
                            const actual = this.canonicalize(actualRaw, orderSensitive);

                            if (JSON.stringify(gold) === JSON.stringify(actual)) {
                                passed.push(tc.name);
                            } else {
                                failedCase = tc;
                                failedGold = goldRaw;
                                failedActual = actualRaw;
                                failedDiff = this.diffSummary(gold, actual);
                                break;
                            }
                        } catch (err) {
                            runtimeErr = { case: tc, message: err.message };
                            break;
                        }
                    }

                    // Always restore the base sample DB when done so the Database State tab is consistent.
                    this.buildDB();

                    if (runtimeErr) {
                        this.results = [];
                        this.error = `Runtime error on case "${runtimeErr.case.name}": ${runtimeErr.message}`;
                        this.statusMsg = `Runtime Error (case: ${runtimeErr.case.name})`;
                        this.statusClass = "err-text";
                        return;
                    }

                    if (!failedCase) {
                        this.statusMsg = `Accepted ✓ — passed all ${cases.length} hidden case(s): ${passed.join(' · ')}`;
                        this.statusClass = "success-text";
                        // Bridge to the SQL Atlas: mark this slug as passed so the atlas tree updates.
                        try { localStorage.setItem(`atlas.status.${this.slug}`, "passed"); } catch (_) {}
                        // Show the user's output from the last passing case (the fully-poisoned state).
                        this.results = lastActualRaw || [];
                        return;
                    }

                    // Failure path — show which case failed + a diagnostic hint.
                    this.results = failedActual || [];
                    this.expectedResults = failedGold || [];
                    this.isValidationFailed = true;
                    this.failedCaseName = failedCase.name;
                    this.failedCaseHint = failedCase.hint || "";
                    this.failedCaseDiff = failedDiff;
                    this.failedCasePassedBefore = passed;
                    const summary = passed.length
                        ? `passed ${passed.length}/${cases.length} — failed on: "${failedCase.name}"`
                        : `failed on first case: "${failedCase.name}"`;
                    this.statusMsg = `Wrong Answer — ${summary}`;
                    this.statusClass = "err-text";
                }
            }));
        });</script>
</body>
</html>
