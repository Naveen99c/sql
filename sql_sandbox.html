<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The SQL Atlas · Sandbox</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0c1220;
            --ink-soft: #111827;
            --ink-line: #1c2540;
            --parchment: #f3e6cf;
            --parchment-dim: #d8c9ae;
            --amber: #e5a63b;
            --amber-hot: #f5c55e;
            --teal: #67c9c0;
            --rust: #d26a4d;
            --muted: #8591a8;

            /* Legacy aliases mapped to atlas palette */
            --bg-dark: var(--ink);
            --surface: var(--ink-soft);
            --surface-2: #151d33;
            --text-main: var(--parchment);
            --text-dim: var(--muted);
            --border: var(--ink-line);
            --primary: var(--amber);
            --primary-hover: var(--amber-hot);
            --action: var(--teal);
            --action-hover: #8fd8d0;
            --danger: var(--rust);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Figtree', system-ui, sans-serif;
            font-weight: 400;
            letter-spacing: 0.005em;
            background-color: var(--ink);
            color: var(--parchment);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        /* Cartographer grid atmosphere */
        body::before {
            content: "";
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
              radial-gradient(ellipse 80% 60% at 50% 0%, rgba(229,166,59,0.05), transparent 60%),
              radial-gradient(ellipse 70% 70% at 90% 100%, rgba(103,201,192,0.04), transparent 60%),
              linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px) 0 0 / 100% 32px,
              linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px) 0 0 / 32px 100%;
        }
        body > * { position: relative; z-index: 1; }

        .serif { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144, "SOFT" 60; }
        .mono  { font-family: 'JetBrains Mono', monospace; }
        .small-caps {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.72rem;
            font-weight: 500;
        }

        /* Navbar */
        header {
            background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(12,18,32,0.9));
            border-bottom: 1px solid var(--ink-line);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 62px;
            backdrop-filter: blur(8px);
        }
        header::after {
            content: "";
            position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
            background: linear-gradient(to right, transparent, rgba(229,166,59,0.35) 20%, rgba(229,166,59,0.35) 80%, transparent);
            pointer-events: none;
        }
        .brand {
            font-family: 'Fraunces', serif;
            font-variation-settings: "opsz" 144, "SOFT" 100;
            font-weight: 400;
            color: var(--parchment);
            text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            font-size: 1.15rem;
            letter-spacing: -0.01em;
            transition: color 200ms ease;
        }
        .brand:hover { color: var(--amber-hot); }
        .brand em { font-style: italic; color: var(--amber); }
        .brand .back-arrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--muted);
            transition: transform 220ms ease, color 220ms ease;
        }
        .brand:hover .back-arrow { transform: translateX(-3px); color: var(--amber); }
        .brand .brand-mark {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--muted);
            padding: 2px 8px;
            border: 1px solid var(--ink-line);
            border-radius: 2px;
        }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        /* Main Layout */
        .workspace {
            display: flex;
            height: calc(100vh - 62px);
            padding: 0.6rem;
            gap: 0.6rem;
        }
        .panel {
            background: linear-gradient(180deg, rgba(23,30,51,0.55), rgba(12,18,32,0.75));
            border-radius: 4px;
            border: 1px solid var(--ink-line);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .panel::before {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(to right, transparent, rgba(229,166,59,0.25) 30%, rgba(229,166,59,0.25) 70%, transparent);
            pointer-events: none;
        }
        .left-pane { flex: 1; min-width: 30%; max-width: 50%; }
        .right-pane { flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }

        .panel-header {
            background: rgba(255,255,255,0.02);
            padding: 10px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--muted);
            border-bottom: 1px solid var(--ink-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Content Styling (problem description) */
        .content-body {
            padding: 1.75rem 1.9rem;
            overflow-y: auto;
            flex: 1;
            font-family: 'Figtree', sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--parchment-dim);
        }
        .content-body h1, .content-body h2, .content-body h3 {
            font-family: 'Fraunces', serif;
            font-variation-settings: "opsz" 144, "SOFT" 80;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--parchment);
        }
        .content-body h1 { font-size: 1.7rem; margin-bottom: 1rem; line-height: 1.15; }
        .content-body h2 { font-size: 1.3rem; margin: 1.4rem 0 0.6rem; }
        .content-body h3 { font-size: 1.1rem; margin: 1.2rem 0 0.5rem; }
        .content-body p { margin: 0.6rem 0; }
        .content-body pre {
            background: rgba(0,0,0,0.35);
            padding: 1rem 1.1rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--ink-line);
            color: var(--parchment);
        }
        .content-body code {
            background: rgba(229,166,59,0.08);
            color: var(--amber-hot);
            padding: 0.15em 0.4em;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
        .content-body pre code { background: transparent; color: inherit; padding: 0; }
        .content-body strong { color: var(--parchment); font-weight: 600; }
        .content-body a { color: var(--amber); text-decoration: underline; text-decoration-color: rgba(229,166,59,0.4); text-underline-offset: 3px; }
        .content-body a:hover { color: var(--amber-hot); }

        /* Editor */
        .editor-env { flex: 1; display: flex; flex-direction: column; }
        .CodeMirror {
            height: 100% !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            letter-spacing: normal;
            background: transparent !important;
            color: var(--parchment) !important;
        }
        /* Force every CM child to inherit the monospace + reset spacing so
           the hidden measure element agrees with the visible lines — otherwise
           the cursor drifts away from the caret position as you type. */
        .CodeMirror, .CodeMirror pre, .CodeMirror-line, .CodeMirror-line span,
        .CodeMirror-measure, .CodeMirror-measure pre, .CodeMirror-cursor {
            font-family: 'JetBrains Mono', monospace !important;
            letter-spacing: normal !important;
            font-variant-ligatures: none;
        }
        .cm-s-material-darker.CodeMirror { background: rgba(10,14,26,0.6) !important; }
        .cm-s-material-darker .CodeMirror-gutters { background: rgba(10,14,26,0.75) !important; border-right: 1px solid var(--ink-line); }
        .cm-s-material-darker .CodeMirror-linenumber { color: rgba(133,145,168,0.5); }
        .cm-s-material-darker .cm-keyword { color: var(--amber); font-weight: 600; }
        .cm-s-material-darker .cm-operator { color: var(--parchment); }
        .cm-s-material-darker .cm-string { color: var(--teal); }
        .cm-s-material-darker .cm-number { color: var(--rust); }
        .cm-s-material-darker .cm-comment { color: var(--muted); font-style: italic; }
        .cm-s-material-darker .cm-variable, .cm-s-material-darker .cm-variable-2 { color: var(--parchment); }
        .cm-s-material-darker .CodeMirror-cursor { border-left: 1.5px solid var(--amber); }
        .cm-s-material-darker .CodeMirror-selected { background: rgba(229,166,59,0.15) !important; }

        /* Run / Submit */
        .btn {
            border: 1px solid transparent;
            border-radius: 2px;
            padding: 8px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            cursor: pointer;
            transition: all 200ms ease;
            color: var(--parchment);
            background: transparent;
        }
        .btn-run {
            background: rgba(255,255,255,0.03);
            border-color: var(--ink-line);
            color: var(--parchment-dim);
        }
        .btn-run:hover {
            background: rgba(103,201,192,0.08);
            border-color: rgba(103,201,192,0.4);
            color: var(--teal);
        }
        .btn-submit {
            background: var(--amber);
            color: var(--ink);
            border-color: var(--amber);
            font-weight: 700;
        }
        .btn-submit:hover {
            background: var(--amber-hot);
            border-color: var(--amber-hot);
            box-shadow: 0 6px 20px -8px rgba(229,166,59,0.5);
            transform: translateY(-1px);
        }
        .panel-header span[style*="cursor:pointer"],
        .panel-header .reset-chip {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.62rem !important;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            background: rgba(229,166,59,0.08) !important;
            color: var(--amber) !important;
            padding: 3px 8px !important;
            border: 1px solid rgba(229,166,59,0.25);
            border-radius: 2px !important;
            transition: all 180ms ease;
        }
        .panel-header span[style*="cursor:pointer"]:hover,
        .panel-header .reset-chip:hover {
            background: rgba(229,166,59,0.18) !important;
            border-color: var(--amber);
        }

        /* Output Console */
        .console-env { flex: 1; display: flex; flex-direction: column; background: rgba(8,12,22,0.7); }
        .tabs { display: flex; border-bottom: 1px solid var(--ink-line); background: rgba(255,255,255,0.015); }
        .tab {
            padding: 10px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 180ms ease, border-color 180ms ease;
        }
        .tab:hover { color: var(--parchment-dim); }
        .tab.active { color: var(--amber); border-bottom-color: var(--amber); }
        .console-body {
            padding: 1.1rem 1.25rem;
            overflow-y: auto;
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--parchment-dim);
        }

        table { border-collapse: collapse; width: 100%; margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        th, td { padding: 8px 12px; border: 1px solid var(--ink-line); text-align: left; }
        th {
            background: rgba(229,166,59,0.06);
            color: var(--amber);
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }
        td { color: var(--parchment); }

        .success-text {
            font-family: 'Fraunces', serif;
            font-variation-settings: "opsz" 144, "SOFT" 80;
            font-style: italic;
            color: var(--teal);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .err-text {
            color: #f5b9a9;
            background: rgba(210,106,77,0.1);
            padding: 12px 14px;
            border-radius: 3px;
            border: 1px solid rgba(210,106,77,0.3);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.55;
        }

        /* Solution / Explanation panes */
        .reveal-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            padding: 24px 20px;
            border: 1px dashed var(--ink-line);
            border-radius: 4px;
            background: rgba(255,255,255,0.01);
            text-align: center;
            gap: 14px;
        }
        .reveal-gate .reveal-msg {
            font-family: 'Fraunces', serif;
            font-variation-settings: "opsz" 144, "SOFT" 80;
            font-style: italic;
            color: var(--parchment-dim);
            font-size: 1rem;
            max-width: 360px;
            line-height: 1.55;
        }
        .reveal-btn {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 9px 18px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid var(--amber);
            background: transparent;
            color: var(--amber);
            transition: background 180ms ease, color 180ms ease;
        }
        .reveal-btn:hover { background: var(--amber); color: var(--ink); }
        .sol-block {
            background: rgba(8,12,22,0.8);
            border: 1px solid var(--ink-line);
            border-left: 3px solid var(--teal);
            border-radius: 3px;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            color: var(--parchment);
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .sol-block .kw { color: var(--amber); font-weight: 600; }
        .sol-block .fn { color: var(--teal); }
        .sol-block .str { color: #c7d69a; }
        .sol-block .num { color: #f5b9a9; }
        .sol-block .cmt { color: var(--muted); font-style: italic; }
        .sol-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .sol-action-btn {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-size: 0.66rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid var(--ink-line);
            background: transparent;
            color: var(--parchment-dim);
            transition: border-color 180ms ease, color 180ms ease;
        }
        .sol-action-btn:hover { border-color: var(--teal); color: var(--teal); }
        .explain-body { color: var(--parchment-dim); font-size: 0.92rem; line-height: 1.65; }
        .explain-body h4 {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.72rem;
            color: var(--amber);
            margin: 16px 0 8px;
            font-weight: 600;
        }
        .explain-body h4:first-child { margin-top: 0; }
        .explain-body p { margin-bottom: 10px; }
        .explain-body ul { margin: 4px 0 10px 22px; }
        .explain-body li { margin-bottom: 4px; }
        .explain-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            background: rgba(229,166,59,0.08);
            color: var(--amber);
            padding: 1px 5px;
            border-radius: 2px;
        }
        .explain-body .pattern-tag {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--teal);
            border: 1px solid rgba(103,201,192,0.4);
            padding: 3px 8px;
            border-radius: 2px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ink-line); border-radius: 5px; border: 2px solid var(--ink); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(229,166,59,0.35); }

        /* ===========================
           Practice Timer
           =========================== */
        .timer-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 3px;
            border: 1px solid var(--ink-line);
            background: rgba(255,255,255,0.02);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--parchment);
            user-select: none;
            transition: border-color 220ms ease, color 220ms ease, background 220ms ease;
            min-width: 110px;
            justify-content: center;
        }
        .timer-chip .timer-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            font-weight: 500;
        }
        .timer-chip .timer-value { font-variant-numeric: tabular-nums; }
        .timer-chip.pace-ok      { border-color: rgba(103,201,192,0.45); color: var(--teal); background: rgba(103,201,192,0.05); }
        .timer-chip.pace-warn    { border-color: rgba(229,166,59,0.55);  color: var(--amber); background: rgba(229,166,59,0.06); }
        .timer-chip.pace-over    { border-color: rgba(210,106,77,0.6);   color: var(--rust);  background: rgba(210,106,77,0.08); animation: timerPulse 1.4s ease-in-out infinite; }
        .timer-chip.paused       { opacity: 0.55; }
        .timer-controls { display: inline-flex; gap: 4px; }
        .timer-btn {
            background: transparent;
            border: 1px solid var(--ink-line);
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            padding: 5px 9px;
            border-radius: 3px;
            cursor: pointer;
            transition: color 180ms ease, border-color 180ms ease;
        }
        .timer-btn:hover { color: var(--amber); border-color: var(--amber); }
        @keyframes timerPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(210,106,77,0.0); }
            50%      { box-shadow: 0 0 0 3px rgba(210,106,77,0.18); }
        }

        /* ===========================
           Responsive — tablet ≤1024px
           =========================== */
        @media (max-width: 1024px) {
            .left-pane  { min-width: 0; max-width: none; }
            .right-pane { min-width: 0; }
            .workspace  { gap: 0.5rem; padding: 0.5rem; }
            header      { padding: 0.6rem 1rem; }
            .brand      { font-size: 1rem; }
            .brand .brand-mark { font-size: 0.58rem; padding: 2px 6px; }
            .content-body { padding: 1.25rem 1.35rem; font-size: 0.9rem; }
            .content-body h1 { font-size: 1.45rem; }
        }

        /* ===========================
           Responsive — phone ≤768px
           Stack panels vertically.
           =========================== */
        @media (max-width: 768px) {
            body     { height: auto; min-height: 100vh; overflow: auto; }
            header   {
                flex-wrap: wrap;
                height: auto;
                gap: 8px;
                padding: 0.55rem 0.8rem;
            }
            .brand   { font-size: 0.95rem; gap: 6px; flex-wrap: wrap; }
            .brand .brand-mark { display: none; }
            .nav-actions { gap: 6px; flex-wrap: wrap; }
            .nav-actions .btn { padding: 7px 12px; font-size: 0.72rem; }
            .timer-chip { min-width: 0; padding: 5px 9px; font-size: 0.75rem; }
            .timer-chip .timer-label { display: none; }

            .workspace {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 64px);
                padding: 0.5rem;
                gap: 0.5rem;
            }
            .left-pane, .right-pane { flex: 0 0 auto; width: 100%; min-width: 0; max-width: none; }
            .left-pane  { min-height: 45vh; max-height: 60vh; }
            .right-pane { gap: 0.5rem; }
            .editor-env  { min-height: 40vh; }
            .console-env { min-height: 45vh; }

            .content-body { padding: 1rem 1.1rem; font-size: 0.88rem; line-height: 1.55; }
            .content-body h1 { font-size: 1.25rem; }
            .content-body h2 { font-size: 1.1rem; }
            .content-body h3 { font-size: 1rem; }
            .content-body pre { font-size: 0.76rem; padding: 0.75rem; }
            table          { font-size: 0.8rem; }
            thead th, tbody td { padding: 6px 8px; }

            .panel-header { padding: 8px 12px; font-size: 0.66rem; letter-spacing: 0.14em; }

            /* Left pane header — keep problem title + timer on a single row. */
            .left-pane .panel-header { gap: 6px !important; flex-wrap: nowrap !important; }
            .left-pane .panel-header > span:first-child { flex: 0 0 auto; }
            .left-pane .timer-wrap { flex: 0 0 auto; min-width: 0; }

            /* Editor header — hide the verbose "◆ Query · MySQL 8.0" label
               (wastes a row); buttons fill the width in a single nowrap flex. */
            .editor-env .panel-header { padding: 6px 10px !important; gap: 6px !important; flex-wrap: nowrap !important; }
            .editor-env .panel-header > span:first-child { display: none !important; }
            .editor-env .editor-actions { flex-wrap: nowrap !important; gap: 6px !important; width: 100%; justify-content: flex-start; }
            .editor-env .editor-actions .btn { padding: 6px 10px; font-size: 0.68rem; letter-spacing: 0.08em; flex: 1 1 auto; }
            .editor-env .editor-actions .reset-chip { padding: 6px 10px; font-size: 0.62rem; flex: 0 0 auto; }

            .tabs .tab   { padding: 8px 14px; font-size: 0.68rem; }
            .reveal-gate { padding: 18px 14px; }
            .reveal-msg  { font-size: 0.9rem; }
            .sol-actions { gap: 6px; }
            .sol-action-btn { padding: 5px 9px; font-size: 0.6rem; }
            .sol-block { font-size: 0.74rem; padding: 10px 12px; }

            .CodeMirror { font-size: 13px !important; }
        }

        /* ===========================
           Responsive — tiny phone ≤420px
           =========================== */
        @media (max-width: 420px) {
            .brand { font-size: 0.85rem; }
            .brand em { font-size: 0.9em; }
            .nav-actions .btn { padding: 6px 10px; font-size: 0.68rem; letter-spacing: 0.1em; }
            .timer-chip { padding: 4px 7px; font-size: 0.7rem; gap: 4px; }
            .content-body { padding: 0.85rem 0.95rem; }
            .left-pane  { min-height: 38vh; }
            .editor-env, .console-env { min-height: 38vh; }
        }
    </style>
</head>
<body x-data="sqlApp()">
    
    <header>
        <a href="sql_atlas.html" class="brand">
            <span class="back-arrow">←</span>
            <span>The <em>SQL</em> Atlas</span>
            <span class="brand-mark">Sandbox</span>
        </a>
        <!-- Run/Submit/Reset moved into the editor panel header so they remain
             visible inside the atlas overlay (which strips this <header>). -->
    </header>

    <div class="workspace">
        
        <div class="panel left-pane">
            <div class="panel-header" style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
                <span>◆ Problem</span>
                <!-- Practice timer — pacing-aware; sits at top of every problem. -->
                <span class="timer-wrap" style="display:inline-flex; align-items:center; gap:8px;">
                    <span class="timer-chip" :class="timerPaceClass" :title="timerTitle">
                        <span class="timer-label" x-text="timerLabel"></span>
                        <span class="timer-value" x-text="timerDisplay">00:00</span>
                    </span>
                    <span class="timer-controls">
                        <button class="timer-btn" @click="toggleTimer()" x-text="timerActive ? 'Pause' : 'Resume'" title="Pause / resume timer"></button>
                        <button class="timer-btn" @click="resetTimer()" title="Reset timer">Reset</button>
                    </span>
                </span>
            </div>
            <div class="content-body">
                <template x-if="!dbLoaded">
                    <div>Loading problem data...</div>
                </template>
                <div x-html="activeContent"></div>
            </div>
        </div>
        
        <div class="right-pane">
            <div class="panel editor-env">
                <div class="panel-header">
                    <span>◆ Query · MySQL 8.0</span>
                    <!-- Run / Submit / Reset live here so they survive the
                         merge-time header strip and stay visible in both the
                         standalone sandbox and the atlas overlay. -->
                    <span class="editor-actions" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        <button class="btn btn-run" @click="executeQuery()" title="Run query (⌘/Ctrl+Enter)">▶ Run</button>
                        <button class="btn btn-submit" @click="submitCode()" title="Validates against hidden edge-case dataset">Submit</button>
                        <span class="reset-chip" @click="insertTemplate()" title="Reset editor to starter template">Reset</span>
                    </span>
                </div>
                <div id="editorWrap" style="flex:1; overflow:hidden;"></div>
            </div>
            
            <div class="panel console-env">
                <div class="tabs">
                    <div class="tab" :class="activeTab === 'result' ? 'active' : ''" @click="activeTab = 'result'">Result</div>
                    <div class="tab" :class="activeTab === 'schema' ? 'active' : ''" @click="activeTab = 'schema'">Schema</div>
                    <div class="tab" :class="activeTab === 'solution' ? 'active' : ''" @click="activeTab = 'solution'">Solution</div>
                    <div class="tab" :class="activeTab === 'explanation' ? 'active' : ''" @click="activeTab = 'explanation'">Explanation</div>
                </div>
                
                <div class="console-body" x-show="activeTab === 'result'">
                    <template x-if="!executed && !error">
                        <div class="small-caps" style="color:var(--muted);">— run query to see results —</div>
                    </template>
                    <template x-if="error">
                        <div class="err-text" x-text="error"></div>
                    </template>
                    <template x-if="executed && !error">
                        <div>
                            <div :class="statusClass" x-text="statusMsg"></div>
                            
                            <div class="small-caps" style="margin-bottom: 6px; color:var(--muted);">Your Output</div>
                            <template x-if="results.length > 0">
                                <table style="margin-bottom:20px;">
                                    <thead><tr><template x-for="col in results[0].columns"><th x-text="col"></th></template></tr></thead>
                                    <tbody>
                                        <template x-for="row in results[0].values">
                                            <tr><template x-for="val in row"><td x-text="val !== null ? val : 'null'"></td></template></tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template x-if="results.length === 0">
                                <div style="margin-bottom:20px; color:var(--muted); font-style: italic;">No rows returned.</div>
                            </template>
                            
                            <!-- Failed Case Diagnostic -->
                            <template x-if="isValidationFailed && failedCaseName">
                                <div style="margin-top: 10px; margin-bottom: 14px; padding: 12px 14px; border-radius: 3px; background: rgba(210,106,77,0.08); border: 1px solid rgba(210,106,77,0.3); border-left: 3px solid var(--rust);">
                                    <div style="color: var(--rust); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; margin-bottom: 8px;">✗ Failed Case · <span x-text="failedCaseName" style="text-transform: none; letter-spacing: 0.03em;"></span></div>
                                    <template x-if="failedCasePassedBefore.length > 0">
                                        <div style="color: var(--teal); font-size: 0.8rem; margin-bottom: 4px;"><span class="small-caps" style="color: var(--teal);">Passed before</span> · <span x-text="failedCasePassedBefore.join(' · ')" class="mono"></span></div>
                                    </template>
                                    <template x-if="failedCaseDiff">
                                        <div style="color: var(--parchment); font-size: 0.85rem; margin-bottom: 4px;"><span class="small-caps" style="color: var(--amber);">Diff</span> · <span x-text="failedCaseDiff"></span></div>
                                    </template>
                                    <template x-if="failedCaseHint">
                                        <div style="color: var(--parchment-dim); font-size: 0.88rem; font-style: italic; font-family: 'Fraunces', serif;"><span class="small-caps" style="color: var(--muted); font-style: normal;">Hint</span> · <span x-text="failedCaseHint"></span></div>
                                    </template>
                                </div>
                            </template>

                            <!-- Detailed diffing -->
                            <template x-if="isValidationFailed && expectedResults.length > 0">
                                <div style="margin-top: 10px;">
                                    <div class="small-caps" style="margin-bottom: 6px; color: var(--amber);">Expected Output · hidden dataset</div>
                                    <table>
                                        <thead><tr><template x-for="col in expectedResults[0].columns"><th x-text="col"></th></template></tr></thead>
                                        <tbody>
                                            <template x-for="row in expectedResults[0].values">
                                                <tr><template x-for="val in row"><td x-text="val !== null ? val : 'null'"></td></template></tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                
                <div class="console-body" x-show="activeTab === 'schema'">
                    <div x-html="schemaHTML"></div>
                </div>

                <div class="console-body" x-show="activeTab === 'solution'">
                    <template x-if="!revealSolution">
                        <div class="reveal-gate">
                            <div class="small-caps" style="color:var(--amber);">✦ Reference Solution ✦</div>
                            <div class="reveal-msg">Try the problem yourself first — peeking too early short-circuits the pattern memory you're building. Click below when you're genuinely stuck or want to compare approaches.</div>
                            <button class="reveal-btn" @click="revealSolution = true">Reveal Solution</button>
                        </div>
                    </template>
                    <template x-if="revealSolution">
                        <div>
                            <div class="small-caps" style="margin-bottom: 8px; color:var(--teal);">Gold Query · used by the grader</div>
                            <div class="sol-actions">
                                <button class="sol-action-btn" @click="copySolution()" x-text="copyLabel"></button>
                                <button class="sol-action-btn" @click="loadSolutionIntoEditor()">Load Into Editor</button>
                                <button class="sol-action-btn" @click="revealSolution = false">Hide Again</button>
                            </div>
                            <pre class="sol-block" x-html="solutionHTML"></pre>
                        </div>
                    </template>
                </div>

                <div class="console-body" x-show="activeTab === 'explanation'">
                    <template x-if="!revealExplanation">
                        <div class="reveal-gate">
                            <div class="small-caps" style="color:var(--amber);">✦ Pattern Walkthrough ✦</div>
                            <div class="reveal-msg">The explanation reveals the underlying SQL pattern, key pitfalls, and why each clause is shaped the way it is. Reveal when you want the mental model, not just the answer.</div>
                            <button class="reveal-btn" @click="revealExplanation = true">Reveal Explanation</button>
                        </div>
                    </template>
                    <template x-if="revealExplanation">
                        <div class="explain-body" x-html="explanationHTML"></div>
                    </template>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Bake the JSON directly into memory
        const dbMeta = {"duplicate-emails": {"title": "Duplicate Emails", "schemas": ["Create table If Not Exists Person (id int, email varchar(255))", "DELETE FROM  Person", "insert into Person (id, email) values ('1', 'a@b.com')", "insert into Person (id, email) values ('2', 'c@d.com')", "insert into Person (id, email) values ('3', 'a@b.com')"], "content": "<p>Table: <code>Person</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| email       | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains an email. The emails will not contain uppercase letters.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to report all the duplicate emails. Note that it&#39;s guaranteed that the email&nbsp;field is not NULL.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nPerson table:\n+----+---------+\n| id | email   |\n+----+---------+\n| 1  | a@b.com |\n| 2  | c@d.com |\n| 3  | a@b.com |\n+----+---------+\n<strong>Output:</strong> \n+---------+\n| Email   |\n+---------+\n| a@b.com |\n+---------+\n<strong>Explanation:</strong> a@b.com is repeated two times.\n</pre>", "shadow": {"gold": "SELECT email AS Email FROM Person GROUP BY email HAVING COUNT(*) > 1 ORDER BY email", "cases": [{"name": "Base sample (one duplicate)", "inserts": [], "hint": ""}, {"name": "No duplicates at all", "inserts": ["DELETE FROM Person", "INSERT INTO Person VALUES (1,'only@x.com')"], "hint": "Your query must return zero rows when no email repeats."}, {"name": "Multiple duplicates + one-off", "inserts": ["DELETE FROM Person", "INSERT INTO Person VALUES (1,'a@b.com')", "INSERT INTO Person VALUES (2,'a@b.com')", "INSERT INTO Person VALUES (3,'c@d.com')", "INSERT INTO Person VALUES (4,'c@d.com')", "INSERT INTO Person VALUES (5,'c@d.com')", "INSERT INTO Person VALUES (6,'solo@x.com')"], "hint": "Ensure you use HAVING COUNT(*) > 1 not COUNT(*) >= 2, and don't over-count with self-join."}]}}, "classes-more-than-5-students": {"title": "Classes More Than 5 Students", "schemas": ["CREATE TABLE IF NOT EXISTS Courses (student varchar(255), class varchar(255))", "DELETE FROM Courses", "INSERT INTO Courses (student, class) VALUES ('A','Math')", "INSERT INTO Courses (student, class) VALUES ('B','English')", "INSERT INTO Courses (student, class) VALUES ('C','Math')", "INSERT INTO Courses (student, class) VALUES ('D','Biology')", "INSERT INTO Courses (student, class) VALUES ('E','Math')", "INSERT INTO Courses (student, class) VALUES ('F','Computer')", "INSERT INTO Courses (student, class) VALUES ('G','Math')", "INSERT INTO Courses (student, class) VALUES ('H','Math')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>There is a table <code>courses</code> with columns: <b>student</b> and <b>class</b></p>\n<p>Please list out all classes which have more than or equal to 5 students.</p>\n<p>For example, the table:</p>\n<pre>\n+---------+------------+\n| student | class      |\n+---------+------------+\n| A       | Math       |\n| B       | English    |\n| C       | Math       |\n| D       | Biology    |\n| E       | Math       |\n| F       | Computer   |\n| G       | Math       |\n| H       | Math       |\n| I       | Math       |\n+---------+------------+\n</pre>\n<p>Should output:</p>\n<pre>\n+---------+\n| class   |\n+---------+\n| Math    |\n+---------+\n</pre>\n<p> </p>\n<p><b>Note:</b><br/>\n        The students should not be counted duplicate in each course.</p>\n\n</div>", "shadow": {"gold": "SELECT class FROM Courses GROUP BY class HAVING COUNT(DISTINCT student) >= 5 ORDER BY class", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Duplicate student in class (should still count as 1)", "inserts": ["INSERT INTO Courses VALUES ('A','Math')", "INSERT INTO Courses VALUES ('A','Math')"], "hint": "Use COUNT(DISTINCT student) — simple COUNT(*) would over-count."}, {"name": "No class reaches 5 students", "inserts": ["DELETE FROM Courses", "INSERT INTO Courses VALUES ('A','Math')", "INSERT INTO Courses VALUES ('B','Math')"], "hint": "Return an empty result when no class qualifies."}]}}, "customers-who-bought-all-products": {"title": "Customers Who Bought All Products", "schemas": ["Create table If Not Exists Customer (customer_id int, product_key int)", "Create table Product (product_key int)", "DELETE FROM  Customer", "insert into Customer (customer_id, product_key) values ('1', '5')", "insert into Customer (customer_id, product_key) values ('2', '6')", "insert into Customer (customer_id, product_key) values ('3', '5')", "insert into Customer (customer_id, product_key) values ('3', '6')", "insert into Customer (customer_id, product_key) values ('1', '6')", "DELETE FROM  Product", "insert into Product (product_key) values ('5')", "insert into Product (product_key) values ('6')"], "content": "<p>Table: <code>Customer</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| customer_id | int     |\n| product_key | int     |\n+-------------+---------+\nThis table may contain duplicates rows. \n<code>customer_id</code> is not NULL<code>.</code>\nproduct_key is a foreign key (reference column) to <code>Product</code> table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Product</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| product_key | int     |\n+-------------+---------+\nproduct_key is the primary key (column with unique values) for this table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to report the customer ids from the <code>Customer</code> table that bought all the products in the <code>Product</code> table.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nCustomer table:\n+-------------+-------------+\n| customer_id | product_key |\n+-------------+-------------+\n| 1           | 5           |\n| 2           | 6           |\n| 3           | 5           |\n| 3           | 6           |\n| 1           | 6           |\n+-------------+-------------+\nProduct table:\n+-------------+\n| product_key |\n+-------------+\n| 5           |\n| 6           |\n+-------------+\n<strong>Output:</strong> \n+-------------+\n| customer_id |\n+-------------+\n| 1           |\n| 3           |\n+-------------+\n<strong>Explanation:</strong> \nThe customers who bought all the products (5 and 6) are customers with IDs 1 and 3.\n</pre>", "shadow": {"gold": "SELECT customer_id FROM Customer GROUP BY customer_id HAVING COUNT(DISTINCT product_key) = (SELECT COUNT(*) FROM Product) ORDER BY customer_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Customer has duplicate purchases of same product", "inserts": ["INSERT INTO Customer VALUES (1,5)", "INSERT INTO Customer VALUES (1,5)"], "hint": "Use COUNT(DISTINCT product_key) to handle duplicates."}, {"name": "New product added — fewer customers qualify", "inserts": ["INSERT INTO Product VALUES (7)"], "hint": "Compare against (SELECT COUNT(*) FROM Product), not a hard-coded number."}]}}, "immediate-food-delivery-ii": {"title": "Immediate Food Delivery II", "schemas": ["Create table If Not Exists Delivery (delivery_id int, customer_id int, order_date date, customer_pref_delivery_date date)", "DELETE FROM  Delivery", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('1', '1', '2019-08-01', '2019-08-02')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('2', '2', '2019-08-02', '2019-08-02')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('3', '1', '2019-08-11', '2019-08-12')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('4', '3', '2019-08-24', '2019-08-24')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('5', '3', '2019-08-21', '2019-08-22')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('6', '2', '2019-08-11', '2019-08-13')", "insert into Delivery (delivery_id, customer_id, order_date, customer_pref_delivery_date) values ('7', '4', '2019-08-09', '2019-08-09')"], "content": "<p>Table: <code>Delivery</code></p>\n\n<pre>\n+-----------------------------+---------+\n| Column Name                 | Type    |\n+-----------------------------+---------+\n| delivery_id                 | int     |\n| customer_id                 | int     |\n| order_date                  | date    |\n| customer_pref_delivery_date | date    |\n+-----------------------------+---------+\ndelivery_id is the column of unique values of this table.\nThe table holds information about food delivery to customers that make orders at some date and specify a preferred delivery date (on the same order date or after it).\n</pre>\n\n<p>&nbsp;</p>\n\n<p>If the customer&#39;s preferred delivery date is the same as the order date, then the order is called <strong>immediate;</strong> otherwise, it is called <strong>scheduled</strong>.</p>\n\n<p>The <strong>first order</strong> of a customer is the order with the earliest order date that the customer made. It is guaranteed that a customer has precisely one first order.</p>\n\n<p>Write a solution to find the percentage of immediate orders in the first orders of all customers, <strong>rounded to 2 decimal places</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nDelivery table:\n+-------------+-------------+------------+-----------------------------+\n| delivery_id | customer_id | order_date | customer_pref_delivery_date |\n+-------------+-------------+------------+-----------------------------+\n| 1           | 1           | 2019-08-01 | 2019-08-02                  |\n| 2           | 2           | 2019-08-02 | 2019-08-02                  |\n| 3           | 1           | 2019-08-11 | 2019-08-12                  |\n| 4           | 3           | 2019-08-24 | 2019-08-24                  |\n| 5           | 3           | 2019-08-21 | 2019-08-22                  |\n| 6           | 2           | 2019-08-11 | 2019-08-13                  |\n| 7           | 4           | 2019-08-09 | 2019-08-09                  |\n+-------------+-------------+------------+-----------------------------+\n<strong>Output:</strong> \n+----------------------+\n| immediate_percentage |\n+----------------------+\n| 50.00                |\n+----------------------+\n<strong>Explanation:</strong> \nThe customer id 1 has a first order with delivery id 1 and it is scheduled.\nThe customer id 2 has a first order with delivery id 2 and it is immediate.\nThe customer id 3 has a first order with delivery id 5 and it is scheduled.\nThe customer id 4 has a first order with delivery id 7 and it is immediate.\nHence, half the customers have immediate first orders.\n</pre>", "shadow": {"gold": "WITH FirstOrder AS (\n            SELECT customer_id, MIN(order_date) AS first_order FROM Delivery GROUP BY customer_id\n        )\n        SELECT ROUND(100.0 * SUM(CASE WHEN d.order_date = d.customer_pref_delivery_date THEN 1 ELSE 0 END) / COUNT(*), 2) AS immediate_percentage\n        FROM Delivery d\n        JOIN FirstOrder f ON d.customer_id = f.customer_id AND d.order_date = f.first_order", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "All first orders are immediate", "inserts": ["DELETE FROM Delivery", "INSERT INTO Delivery VALUES (1,1,'2020-01-01','2020-01-01')", "INSERT INTO Delivery VALUES (2,2,'2020-01-02','2020-01-02')"], "hint": "Result should be 100.00."}]}}, "average-salary-departments-vs-company": {"title": "Average Salary: Departments vs Company", "schemas": ["Create table If Not Exists Salary (id int, employee_id int, amount int, pay_date date)", "Create table If Not Exists Employee (employee_id int, department_id int)", "DELETE FROM  Salary", "insert into Salary (id, employee_id, amount, pay_date) values ('1', '1', '9000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('2', '2', '6000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('3', '3', '10000', '2017/03/31')", "insert into Salary (id, employee_id, amount, pay_date) values ('4', '1', '7000', '2017/02/28')", "insert into Salary (id, employee_id, amount, pay_date) values ('5', '2', '6000', '2017/02/28')", "insert into Salary (id, employee_id, amount, pay_date) values ('6', '3', '8000', '2017/02/28')", "DELETE FROM  Employee", "insert into Employee (employee_id, department_id) values ('1', '1')", "insert into Employee (employee_id, department_id) values ('2', '2')", "insert into Employee (employee_id, department_id) values ('3', '2')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n\n    Given two tables as below, write a query to display the comparison result (higher/lower/same) of\n    the average salary of employees in a department to the company's average salary.\n    <p> </p>\n    Table: <code>salary</code>\n<pre>\n| id | employee_id | amount | pay_date   |\n|----|-------------|--------|------------|\n| 1  | 1           | 9000   | 2017-03-31 |\n| 2  | 2           | 6000   | 2017-03-31 |\n| 3  | 3           | 10000  | 2017-03-31 |\n| 4  | 1           | 7000   | 2017-02-28 |\n| 5  | 2           | 6000   | 2017-02-28 |\n| 6  | 3           | 8000   | 2017-02-28 |\n</pre>\n<p> </p>\n    The <b>employee_id</b> column refers to the <b>employee_id</b> in the following table <code>employee</code>.\n\n    <p> </p>\n<pre>\n| employee_id | department_id |\n|-------------|---------------|\n| 1           | 1             |\n| 2           | 2             |\n| 3           | 2             |\n</pre>\n<p> </p>\n    So for the sample data above, the result is:\n\n    <p> </p>\n<pre>\n| pay_month | department_id | comparison  |\n|-----------|---------------|-------------|\n| 2017-03   | 1             | higher      |\n| 2017-03   | 2             | lower       |\n| 2017-02   | 1             | same        |\n| 2017-02   | 2             | same        |\n</pre>\n<p> </p>\n<b>Explanation</b>\n<p> </p>\n    In March, the company's average salary is (9000+6000+10000)/3 = 8333.33...\n\n    <p> </p>\n    The average salary for department '1' is 9000, which is the salary of <b>employee_id</b>\n    '1' since there is only one employee in this department. So the comparison result is\n    'higher' since 9000 &gt; 8333.33 obviously.\n\n    <p> </p>\n    The average salary of department '2' is (6000 + 10000)/2 = 8000, which is the average of\n    <b>employee_id</b> '2' and '3'. So the comparison result is 'lower'\n    since 8000 &lt; 8333.33.\n\n    <p> </p>\n    With he same formula for the average salary comparison in February, the result is 'same'\n    since both the department '1' and '2' have the same average salary with the\n    company, which is 7000.\n\n    <p> </p>\n\n</div>", "shadow": {"gold": "WITH monthly AS (\n            SELECT SUBSTR(pay_date,1,7) AS pay_month, e.department_id, s.amount\n            FROM Salary s JOIN Employee e ON s.employee_id = e.employee_id\n        ),\n        company AS (SELECT pay_month, AVG(amount) AS comp_avg FROM monthly GROUP BY pay_month),\n        dept AS (SELECT pay_month, department_id, AVG(amount) AS dept_avg FROM monthly GROUP BY pay_month, department_id)\n        SELECT d.pay_month, d.department_id,\n               CASE WHEN d.dept_avg > c.comp_avg THEN 'higher'\n                    WHEN d.dept_avg < c.comp_avg THEN 'lower'\n                    ELSE 'same' END AS comparison\n        FROM dept d JOIN company c ON d.pay_month = c.pay_month\n        ORDER BY d.pay_month, d.department_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Tie — 'same' label", "hint": "When dept_avg == company_avg, the comparison must read 'same'.", "inserts": ["DELETE FROM Salary", "INSERT INTO Salary VALUES (1,1,5000,'2018-01-15')", "INSERT INTO Salary VALUES (2,2,5000,'2018-01-15')", "DELETE FROM Employee", "INSERT INTO Employee VALUES (1,1)", "INSERT INTO Employee VALUES (2,2)"]}]}}, "customers-who-never-order": {"title": "Customers Who Never Order", "schemas": ["Create table If Not Exists Customers (id int, name varchar(255))", "Create table If Not Exists Orders (id int, customerId int)", "DELETE FROM  Customers", "insert into Customers (id, name) values ('1', 'Joe')", "insert into Customers (id, name) values ('2', 'Henry')", "insert into Customers (id, name) values ('3', 'Sam')", "insert into Customers (id, name) values ('4', 'Max')", "DELETE FROM  Orders", "insert into Orders (id, customerId) values ('1', '3')", "insert into Orders (id, customerId) values ('2', '1')"], "content": "<p>Table: <code>Customers</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table indicates the ID and name of a customer.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Orders</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| customerId  | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\ncustomerId is a foreign key (reference columns) of the ID from the Customers table.\nEach row of this table indicates the ID of an order and the ID of the customer who ordered it.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find all customers who never order anything.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nCustomers table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | Joe   |\n| 2  | Henry |\n| 3  | Sam   |\n| 4  | Max   |\n+----+-------+\nOrders table:\n+----+------------+\n| id | customerId |\n+----+------------+\n| 1  | 3          |\n| 2  | 1          |\n+----+------------+\n<strong>Output:</strong> \n+-----------+\n| Customers |\n+-----------+\n| Henry     |\n| Max       |\n+-----------+\n</pre>", "shadow": {"gold": "SELECT name AS Customers FROM Customers c WHERE NOT EXISTS (SELECT 1 FROM Orders o WHERE o.customerId = c.id) ORDER BY name", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Every customer has an order", "inserts": ["DELETE FROM Orders", "INSERT INTO Orders VALUES (1,1)", "INSERT INTO Orders VALUES (2,2)", "INSERT INTO Orders VALUES (3,3)", "INSERT INTO Orders VALUES (4,4)"], "hint": "Return empty when every customer has ordered."}, {"name": "All customers have no orders", "inserts": ["DELETE FROM Orders"], "hint": "Return all customers when the Orders table is empty."}]}}, "department-highest-salary": {"title": "Department Highest Salary", "schemas": ["Create table If Not Exists Employee (id int, name varchar(255), salary int, departmentId int)", "Create table If Not Exists Department (id int, name varchar(255))", "DELETE FROM  Employee", "insert into Employee (id, name, salary, departmentId) values ('1', 'Joe', '70000', '1')", "insert into Employee (id, name, salary, departmentId) values ('2', 'Jim', '90000', '1')", "insert into Employee (id, name, salary, departmentId) values ('3', 'Henry', '80000', '2')", "insert into Employee (id, name, salary, departmentId) values ('4', 'Sam', '60000', '2')", "insert into Employee (id, name, salary, departmentId) values ('5', 'Max', '90000', '1')", "DELETE FROM  Department", "insert into Department (id, name) values ('1', 'IT')", "insert into Department (id, name) values ('2', 'Sales')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| id           | int     |\n| name         | varchar |\n| salary       | int     |\n| departmentId | int     |\n+--------------+---------+\nid is the primary key (column with unique values) for this table.\ndepartmentId is a foreign key (reference columns) of the ID from the <code>Department </code>table.\nEach row of this table indicates the ID, name, and salary of an employee. It also contains the ID of their department.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Department</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table. It is guaranteed that department name is not <code>NULL.</code>\nEach row of this table indicates the ID of a department and its name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find employees who have the highest salary in each of the departments.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+-------+--------+--------------+\n| id | name  | salary | departmentId |\n+----+-------+--------+--------------+\n| 1  | Joe   | 70000  | 1            |\n| 2  | Jim   | 90000  | 1            |\n| 3  | Henry | 80000  | 2            |\n| 4  | Sam   | 60000  | 2            |\n| 5  | Max   | 90000  | 1            |\n+----+-------+--------+--------------+\nDepartment table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | IT    |\n| 2  | Sales |\n+----+-------+\n<strong>Output:</strong> \n+------------+----------+--------+\n| Department | Employee | Salary |\n+------------+----------+--------+\n| IT         | Jim      | 90000  |\n| Sales      | Henry    | 80000  |\n| IT         | Max      | 90000  |\n+------------+----------+--------+\n<strong>Explanation:</strong> Max and Jim both have the highest salary in the IT department and Henry has the highest salary in the Sales department.\n</pre>", "shadow": {"gold": "SELECT d.name AS Department, e.name AS Employee, e.salary AS Salary\n        FROM Employee e JOIN Department d ON e.departmentId = d.id\n        WHERE (e.departmentId, e.salary) IN (SELECT departmentId, MAX(salary) FROM Employee GROUP BY departmentId)\n        ORDER BY d.name, e.name", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Ties at the max salary — both must be returned", "inserts": ["INSERT INTO Employee VALUES (5,'Randy',90000,1)"], "hint": "Subquery MAX() + IN handles ties; ROW_NUMBER=1 would miss them — use RANK/DENSE_RANK or an IN-subquery."}]}}, "exchange-seats": {"title": "Exchange Seats", "schemas": ["Create table If Not Exists Seat (id int, student varchar(255))", "DELETE FROM  Seat", "insert into Seat (id, student) values ('1', 'Abbot')", "insert into Seat (id, student) values ('2', 'Doris')", "insert into Seat (id, student) values ('3', 'Emerson')", "insert into Seat (id, student) values ('4', 'Green')", "insert into Seat (id, student) values ('5', 'Jeames')"], "content": "<p>Table: <code>Seat</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| student     | varchar |\n+-------------+---------+\nid is the primary key (unique value) column for this table.\nEach row of this table indicates the name and the ID of a student.\nThe ID sequence always starts from 1 and increments continuously.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to swap the seat id of every two consecutive students. If the number of students is odd, the id of the last student is not swapped.</p>\n\n<p>Return the result table ordered by <code>id</code> <strong>in ascending order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nSeat table:\n+----+---------+\n| id | student |\n+----+---------+\n| 1  | Abbot   |\n| 2  | Doris   |\n| 3  | Emerson |\n| 4  | Green   |\n| 5  | Jeames  |\n+----+---------+\n<strong>Output:</strong> \n+----+---------+\n| id | student |\n+----+---------+\n| 1  | Doris   |\n| 2  | Abbot   |\n| 3  | Green   |\n| 4  | Emerson |\n| 5  | Jeames  |\n+----+---------+\n<strong>Explanation:</strong> \nNote that if the number of students is odd, there is no need to change the last one&#39;s seat.\n</pre>", "shadow": {"gold": "SELECT CASE\n            WHEN id % 2 = 1 AND id = (SELECT MAX(id) FROM Seat) THEN id\n            WHEN id % 2 = 1 THEN id + 1\n            ELSE id - 1 END AS id, student\n        FROM Seat ORDER BY id", "cases": [{"name": "Base sample (even count)", "inserts": [], "hint": ""}, {"name": "Odd number of students — last stays put", "inserts": ["DELETE FROM Seat", "INSERT INTO Seat VALUES (1,'A')", "INSERT INTO Seat VALUES (2,'B')", "INSERT INTO Seat VALUES (3,'C')"], "hint": "When there's an odd tail, the last id should remain unswapped."}]}}, "median-employee-salary": {"title": "Median Employee Salary", "schemas": ["Create table If Not Exists Employee (id int, company varchar(255), salary int)", "DELETE FROM  Employee", "insert into Employee (id, company, salary) values ('1', 'A', '2341')", "insert into Employee (id, company, salary) values ('2', 'A', '341')", "insert into Employee (id, company, salary) values ('3', 'A', '15')", "insert into Employee (id, company, salary) values ('4', 'A', '15314')", "insert into Employee (id, company, salary) values ('5', 'A', '451')", "insert into Employee (id, company, salary) values ('6', 'A', '513')", "insert into Employee (id, company, salary) values ('7', 'B', '15')", "insert into Employee (id, company, salary) values ('8', 'B', '13')", "insert into Employee (id, company, salary) values ('9', 'B', '1154')", "insert into Employee (id, company, salary) values ('10', 'B', '1345')", "insert into Employee (id, company, salary) values ('11', 'B', '1221')", "insert into Employee (id, company, salary) values ('12', 'B', '234')", "insert into Employee (id, company, salary) values ('13', 'C', '2345')", "insert into Employee (id, company, salary) values ('14', 'C', '2645')", "insert into Employee (id, company, salary) values ('15', 'C', '2645')", "insert into Employee (id, company, salary) values ('16', 'C', '2652')", "insert into Employee (id, company, salary) values ('17', 'C', '65')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Employee</code> table holds all employees. The employee table has three columns:\n        Employee Id, Company Name, and Salary.</p>\n<pre>\n+-----+------------+--------+\n|Id   | Company    | Salary |\n+-----+------------+--------+\n|1    | A          | 2341   |\n|2    | A          | 341    |\n|3    | A          | 15     |\n|4    | A          | 15314  |\n|5    | A          | 451    |\n|6    | A          | 513    |\n|7    | B          | 15     |\n|8    | B          | 13     |\n|9    | B          | 1154   |\n|10   | B          | 1345   |\n|11   | B          | 1221   |\n|12   | B          | 234    |\n|13   | C          | 2345   |\n|14   | C          | 2645   |\n|15   | C          | 2645   |\n|16   | C          | 2652   |\n|17   | C          | 65     |\n+-----+------------+--------+\n</pre>\n<p>Write a SQL query to find the median salary of each company. Bonus points if you can solve it\n        without using any built-in SQL functions.</p>\n<pre>\n+-----+------------+--------+\n|Id   | Company    | Salary |\n+-----+------------+--------+\n|5    | A          | 451    |\n|6    | A          | 513    |\n|12   | B          | 234    |\n|9    | B          | 1154   |\n|14   | C          | 2645   |\n+-----+------------+--------+\n</pre>\n\n</div>", "shadow": {"gold": "WITH ranked AS (\n            SELECT id, company, salary,\n                   ROW_NUMBER() OVER (PARTITION BY company ORDER BY salary, id) AS rn,\n                   COUNT(*) OVER (PARTITION BY company) AS cnt\n            FROM Employee\n        )\n        SELECT id, company, salary FROM ranked\n        WHERE rn IN ((cnt+1)/2, (cnt+2)/2) ORDER BY company, salary, id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Single-employee company", "inserts": ["INSERT INTO Employee VALUES (999,'Solo',42000)"], "hint": "For a company with 1 row, that row is the median."}]}}, "game-play-analysis-v": {"title": "Game Play Analysis V", "schemas": ["Create table If Not Exists Activity (player_id int, device_id int, event_date date, games_played int)", "DELETE FROM  Activity", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-01', '5')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-02', '6')", "insert into Activity (player_id, device_id, event_date, games_played) values ('2', '3', '2017-06-25', '1')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '1', '2016-03-01', '0')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '4', '2018-07-03', '5')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Activity</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| player_id    | int     |\n| device_id    | int     |\n| event_date   | date    |\n| games_played | int     |\n+--------------+---------+\n(player_id, event_date) is the primary key of this table.\nThis table shows the activity of players of some game.\nEach row is a record of a player who logged in and played a number of games (possibly 0) before logging out on some day using some device.\n</pre>\n<p> </p>\n<p>We define the <em>install date</em> of a player to be the first login day of that player.</p>\n<p>We also define <em>day 1 retention</em> of some date <code>X</code> to be the\n        number of players whose install date is <code>X</code> and they logged back\n        in on the day right after <code>X</code>, divided by the number of players whose install\n        date is <code>X</code>, <strong>rounded to 2 decimal places</strong>.</p>\n<p>Write an SQL query that reports for each <strong>install date</strong>, the <strong>number of\n        players</strong> that installed the game on that day and the <strong>day 1\n        retention</strong>.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nActivity table:\n+-----------+-----------+------------+--------------+\n| player_id | device_id | event_date | games_played |\n+-----------+-----------+------------+--------------+\n| 1         | 2         | 2016-03-01 | 5            |\n| 1         | 2         | 2016-03-02 | 6            |\n| 2         | 3         | 2017-06-25 | 1            |\n| 3         | 1         | 2016-03-01 | 0            |\n| 3         | 4         | 2016-07-03 | 5            |\n+-----------+-----------+------------+--------------+\n\nResult table:\n+------------+----------+----------------+\n| install_dt | installs | Day1_retention |\n+------------+----------+----------------+\n| 2016-03-01 | 2        | 0.50           |\n| 2017-06-25 | 1        | 0.00           |\n+------------+----------+----------------+\nPlayer 1 and 3 installed the game on 2016-03-01 but only player 1 logged back in on 2016-03-02 so the day 1 retention of 2016-03-01 is 1 / 2 = 0.50\nPlayer 2 installed the game on 2017-06-25 but didn't log back in on 2017-06-26 so the day 1 retention of 2017-06-25 is 0 / 1 = 0.00\n</pre>\n\n</div>", "shadow": {"gold": "WITH firsts AS (\n            SELECT player_id, MIN(event_date) AS install_dt FROM Activity GROUP BY player_id\n        ),\n        installs_day AS (SELECT install_dt, COUNT(*) AS installs FROM firsts GROUP BY install_dt),\n        retained AS (\n            SELECT f.install_dt, COUNT(DISTINCT a.player_id) AS kept\n            FROM firsts f LEFT JOIN Activity a\n              ON a.player_id = f.player_id AND a.event_date = DATE(f.install_dt, '+1 day')\n            GROUP BY f.install_dt\n        )\n        SELECT i.install_dt AS install_dt, i.installs, ROUND(1.0 * r.kept / i.installs, 2) AS Day1_retention\n        FROM installs_day i JOIN retained r ON i.install_dt = r.install_dt\n        ORDER BY i.install_dt", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "No one returns on day 2", "hint": "Retention 0 when no player comes back the next day.", "inserts": ["DELETE FROM Activity", "INSERT INTO Activity VALUES (10,1,'2020-01-01',3)", "INSERT INTO Activity VALUES (11,2,'2020-01-01',4)"]}]}}, "employees-earning-more-than-managers": {"title": "Employees Earning More Than Managers", "schemas": ["CREATE TABLE IF NOT EXISTS Employee (id int, name varchar(255), salary int, managerId int)", "DELETE FROM Employee", "INSERT INTO Employee VALUES (1,'Joe',70000,3)", "INSERT INTO Employee VALUES (2,'Henry',80000,4)", "INSERT INTO Employee VALUES (3,'Sam',60000,NULL)", "INSERT INTO Employee VALUES (4,'Max',90000,NULL)"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Employee</code> table holds all employees including their managers. Every employee\n        has an Id, and there is also a column for the manager Id.</p>\n<pre>\n+----+-------+--------+-----------+\n| Id | Name  | Salary | ManagerId |\n+----+-------+--------+-----------+\n| 1  | Joe   | 70000  | 3         |\n| 2  | Henry | 80000  | 4         |\n| 3  | Sam   | 60000  | NULL      |\n| 4  | Max   | 90000  | NULL      |\n+----+-------+--------+-----------+\n</pre>\n<p>Given the <code>Employee</code> table, write a SQL query that finds out employees who earn\n        more than their managers. For the above table, Joe is the only employee who earns more than\n        his manager.</p>\n<pre>\n+----------+\n| Employee |\n+----------+\n| Joe      |\n+----------+\n</pre>\n\n</div>", "shadow": {"gold": "SELECT e.name AS Employee FROM Employee e JOIN Employee m ON e.managerId = m.id WHERE e.salary > m.salary ORDER BY e.name", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Employee with NULL manager — excluded", "inserts": ["INSERT INTO Employee VALUES (5,'NoBoss',999999,NULL)"], "hint": "NULL managers should not be compared — use INNER JOIN or filter IS NOT NULL."}, {"name": "Ties (employee salary = manager salary) — not returned", "inserts": ["INSERT INTO Employee VALUES (6,'Equal',60000,3)"], "hint": "Only strictly greater (>) counts, not >=."}]}}, "friend-requests-ii": {"title": "Friend Requests II", "schemas": ["CREATE TABLE IF NOT EXISTS RequestAccepted (requester_id int, accepter_id int, accept_date date)", "DELETE FROM RequestAccepted", "INSERT INTO RequestAccepted VALUES (1,2,'2016-06-03')", "INSERT INTO RequestAccepted VALUES (1,3,'2016-06-08')", "INSERT INTO RequestAccepted VALUES (2,3,'2016-06-08')", "INSERT INTO RequestAccepted VALUES (3,4,'2016-06-09')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n\n    In social network like Facebook or Twitter, people send friend requests and accept others'\n    requests as well.\n    <p> </p>\n    Table <code>request_accepted</code> holds the data of friend acceptance, while\n    <b>requester_id</b> and <b>accepter_id</b> both are the id of a person.\n\n    <p> </p>\n<pre>\n| requester_id | accepter_id | accept_date|\n|--------------|-------------|------------|\n| 1            | 2           | 2016_06-03 |\n| 1            | 3           | 2016-06-08 |\n| 2            | 3           | 2016-06-08 |\n| 3            | 4           | 2016-06-09 |\n</pre>\n    Write a query to find the the people who has most friends and the most friends number. For the\n    sample data above, the result is:\n\n    <pre>\n| id | num |\n|----|-----|\n| 3  | 3   |\n</pre>\n<b>Note:</b>\n<ul>\n<li>It is guaranteed there is only 1 people having the most friends.</li>\n<li>The friend request could only been accepted once, which mean there is no multiple\n            records with the same <b>requester_id</b> and <b>accepter_id</b> value.\n            <p> </p>\n<b>Explanation:</b><br/>\n            The person with id '3' is a friend of people '1', '2' and '4',\n            so he has 3 friends in total, which is the most number than any others.\n            <p> </p>\n<b>Follow-up:</b><br/>\n            In the real world, multiple people could have the same most number of friends, can you\n            find all these people in this case?\n        </li>\n</ul>\n\n</div>", "shadow": {"gold": "SELECT id, SUM(cnt) AS num FROM (\n            SELECT requester_id AS id, COUNT(*) AS cnt FROM RequestAccepted GROUP BY requester_id\n            UNION ALL\n            SELECT accepter_id AS id, COUNT(*) AS cnt FROM RequestAccepted GROUP BY accepter_id\n        ) t GROUP BY id ORDER BY num DESC, id LIMIT 1", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Single accepted request", "inserts": ["DELETE FROM RequestAccepted", "INSERT INTO RequestAccepted VALUES (7,8,'2023-01-01')"], "hint": "With one edge, either endpoint has 1 friend; use stable tie-break (id ASC)."}]}}, "market-analysis-i": {"title": "Market Analysis I", "schemas": ["Create table If Not Exists Users (user_id int, join_date date, favorite_brand varchar(10))", "Create table If Not Exists Orders (order_id int, order_date date, item_id int, buyer_id int, seller_id int)", "Create table If Not Exists Items (item_id int, item_brand varchar(10))", "DELETE FROM  Users", "insert into Users (user_id, join_date, favorite_brand) values ('1', '2018-01-01', 'Lenovo')", "insert into Users (user_id, join_date, favorite_brand) values ('2', '2018-02-09', 'Samsung')", "insert into Users (user_id, join_date, favorite_brand) values ('3', '2018-01-19', 'LG')", "insert into Users (user_id, join_date, favorite_brand) values ('4', '2018-05-21', 'HP')", "DELETE FROM  Orders", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('1', '2019-08-01', '4', '1', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('2', '2018-08-02', '2', '1', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('3', '2019-08-03', '3', '2', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('4', '2018-08-04', '1', '4', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('5', '2018-08-04', '1', '3', '4')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('6', '2019-08-05', '2', '2', '4')", "DELETE FROM  Items", "insert into Items (item_id, item_brand) values ('1', 'Samsung')", "insert into Items (item_id, item_brand) values ('2', 'Lenovo')", "insert into Items (item_id, item_brand) values ('3', 'LG')", "insert into Items (item_id, item_brand) values ('4', 'HP')"], "content": "<p>Table: <code>Users</code></p>\n\n<pre>\n+----------------+---------+\n| Column Name    | Type    |\n+----------------+---------+\n| user_id        | int     |\n| join_date      | date    |\n| favorite_brand | varchar |\n+----------------+---------+\nuser_id is the primary key (column with unique values) of this table.\nThis table has the info of the users of an online shopping website where users can sell and buy items.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Orders</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| order_date    | date    |\n| item_id       | int     |\n| buyer_id      | int     |\n| seller_id     | int     |\n+---------------+---------+\norder_id is the primary key (column with unique values) of this table.\nitem_id is a foreign key (reference column) to the Items table.\nbuyer_id and seller_id are foreign keys to the Users table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Items</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| item_id       | int     |\n| item_brand    | varchar |\n+---------------+---------+\nitem_id is the primary key (column with unique values) of this table.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution&nbsp;to find for each user, the join date and the number of orders they made as a buyer in <code>2019</code>.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nUsers table:\n+---------+------------+----------------+\n| user_id | join_date  | favorite_brand |\n+---------+------------+----------------+\n| 1       | 2018-01-01 | Lenovo         |\n| 2       | 2018-02-09 | Samsung        |\n| 3       | 2018-01-19 | LG             |\n| 4       | 2018-05-21 | HP             |\n+---------+------------+----------------+\nOrders table:\n+----------+------------+---------+----------+-----------+\n| order_id | order_date | item_id | buyer_id | seller_id |\n+----------+------------+---------+----------+-----------+\n| 1        | 2019-08-01 | 4       | 1        | 2         |\n| 2        | 2018-08-02 | 2       | 1        | 3         |\n| 3        | 2019-08-03 | 3       | 2        | 3         |\n| 4        | 2018-08-04 | 1       | 4        | 2         |\n| 5        | 2018-08-04 | 1       | 3        | 4
