n to find&nbsp;the second highest <strong>distinct</strong> salary from the <code>Employee</code> table. If there is no second highest salary,&nbsp;return&nbsp;<code>null (return&nbsp;None in Pandas)</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n| 2  | 200    |\n| 3  | 300    |\n+----+--------+\n<strong>Output:</strong> \n+---------------------+\n| SecondHighestSalary |\n+---------------------+\n| 200                 |\n+---------------------+\n</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n+----+--------+\n<strong>Output:</strong> \n+---------------------+\n| SecondHighestSalary |\n+---------------------+\n| null                |\n+---------------------+\n</pre>\n"}, "nth-highest-salary": {"title": "Nth Highest Salary", "schemas": ["Create table If Not Exists Employee (Id int, Salary int)", "DELETE FROM  Employee", "insert into Employee (id, salary) values ('1', '100')", "insert into Employee (id, salary) values ('2', '200')", "insert into Employee (id, salary) values ('3', '300')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+-------------+------+\n| Column Name | Type |\n+-------------+------+\n| id          | int  |\n| salary      | int  |\n+-------------+------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains information about the salary of an employee.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the <code>n<sup>th</sup></code> highest <strong>distinct</strong> salary from the <code>Employee</code> table. If there are less than <code>n</code> distinct salaries, return&nbsp;<code>null</code>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n| 2  | 200    |\n| 3  | 300    |\n+----+--------+\nn = 2\n<strong>Output:</strong> \n+------------------------+\n| getNthHighestSalary(2) |\n+------------------------+\n| 200                    |\n+------------------------+\n</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+--------+\n| id | salary |\n+----+--------+\n| 1  | 100    |\n+----+--------+\nn = 2\n<strong>Output:</strong> \n+------------------------+\n| getNthHighestSalary(2) |\n+------------------------+\n| null                   |\n+------------------------+\n</pre>\n"}, "rank-scores": {"title": "Rank Scores", "schemas": ["Create table If Not Exists Scores (id int, score DECIMAL(3,2))", "DELETE FROM  Scores", "insert into Scores (id, score) values ('1', '3.5')", "insert into Scores (id, score) values ('2', '3.65')", "insert into Scores (id, score) values ('3', '4.0')", "insert into Scores (id, score) values ('4', '3.85')", "insert into Scores (id, score) values ('5', '4.0')", "insert into Scores (id, score) values ('6', '3.65')"], "content": "<p>Table: <code>Scores</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| score       | decimal |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table contains the score of a game. Score is a floating point value with two decimal places.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the rank of the scores. The ranking should be calculated according to the following rules:</p>\n\n<ul>\n\t<li>The scores should be ranked from the highest to the lowest.</li>\n\t<li>If there is a tie between two scores, both should have the same ranking.</li>\n\t<li>After a tie, the next ranking number should be the next consecutive integer value. In other words, there should be no holes between ranks.</li>\n</ul>\n\n<p>Return the result table ordered by <code>score</code> in descending order.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nScores table:\n+----+-------+\n| id | score |\n+----+-------+\n| 1  | 3.50  |\n| 2  | 3.65  |\n| 3  | 4.00  |\n| 4  | 3.85  |\n| 5  | 4.00  |\n| 6  | 3.65  |\n+----+-------+\n<strong>Output:</strong> \n+-------+------+\n| score | rank |\n+-------+------+\n| 4.00  | 1    |\n| 4.00  | 1    |\n| 3.85  | 2    |\n| 3.65  | 3    |\n| 3.65  | 3    |\n| 3.50  | 4    |\n+-------+------+\n</pre>\n"}, "department-top-three-salaries": {"title": "Department Top Three Salaries", "schemas": ["Create table If Not Exists Employee (id int, name varchar(255), salary int, departmentId int)", "Create table If Not Exists Department (id int, name varchar(255))", "DELETE FROM  Employee", "insert into Employee (id, name, salary, departmentId) values ('1', 'Joe', '85000', '1')", "insert into Employee (id, name, salary, departmentId) values ('2', 'Henry', '80000', '2')", "insert into Employee (id, name, salary, departmentId) values ('3', 'Sam', '60000', '2')", "insert into Employee (id, name, salary, departmentId) values ('4', 'Max', '90000', '1')", "insert into Employee (id, name, salary, departmentId) values ('5', 'Janet', '69000', '1')", "insert into Employee (id, name, salary, departmentId) values ('6', 'Randy', '85000', '1')", "insert into Employee (id, name, salary, departmentId) values ('7', 'Will', '70000', '1')", "DELETE FROM  Department", "insert into Department (id, name) values ('1', 'IT')", "insert into Department (id, name) values ('2', 'Sales')"], "content": "<p>Table: <code>Employee</code></p>\n\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| id           | int     |\n| name         | varchar |\n| salary       | int     |\n| departmentId | int     |\n+--------------+---------+\nid is the primary key (column with unique values) for this table.\ndepartmentId is a foreign key (reference column) of the ID from the <code>Department </code>table.\nEach row of this table indicates the ID, name, and salary of an employee. It also contains the ID of their department.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>Department</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| name        | varchar |\n+-------------+---------+\nid is the primary key (column with unique values) for this table.\nEach row of this table indicates the ID of a department and its name.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>A company&#39;s executives are interested in seeing who earns the most money in each of the company&#39;s departments. A <strong>high earner</strong> in a department is an employee who has a salary in the <strong>top three unique</strong> salaries for that department.</p>\n\n<p>Write a solution to find the employees who are <strong>high earners</strong> in each of the departments.</p>\n\n<p>Return the result table <strong>in any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nEmployee table:\n+----+-------+--------+--------------+\n| id | name  | salary | departmentId |\n+----+-------+--------+--------------+\n| 1  | Joe   | 85000  | 1            |\n| 2  | Henry | 80000  | 2            |\n| 3  | Sam   | 60000  | 2            |\n| 4  | Max   | 90000  | 1            |\n| 5  | Janet | 69000  | 1            |\n| 6  | Randy | 85000  | 1            |\n| 7  | Will  | 70000  | 1            |\n+----+-------+--------+--------------+\nDepartment table:\n+----+-------+\n| id | name  |\n+----+-------+\n| 1  | IT    |\n| 2  | Sales |\n+----+-------+\n<strong>Output:</strong> \n+------------+----------+--------+\n| Department | Employee | Salary |\n+------------+----------+--------+\n| IT         | Max      | 90000  |\n| IT         | Joe      | 85000  |\n| IT         | Randy    | 85000  |\n| IT         | Will     | 70000  |\n| Sales      | Henry    | 80000  |\n| Sales      | Sam      | 60000  |\n+------------+----------+--------+\n<strong>Explanation:</strong> \nIn the IT department:\n- Max earns the highest unique salary\n- Both Randy and Joe earn the second-highest unique salary\n- Will earns the third-highest unique salary\n\nIn the Sales department:\n- Henry earns the highest salary\n- Sam earns the second-highest salary\n- There is no third-highest salary as there are only two employees\n</pre>\n\n<p>&nbsp;</p>\n<p><strong>Constraints:</strong></p>\n\n<ul>\n\t<li>There are no employees with the <strong>exact</strong> same name, salary <em>and</em> department.</li>\n</ul>\n"}, "market-analysis-ii": {"title": "Market Analysis II", "schemas": ["Create table If Not Exists Users (user_id int, join_date date, favorite_brand varchar(10))", "Create table If Not Exists Orders (order_id int, order_date date, item_id int, buyer_id int, seller_id int)", "Create table If Not Exists Items (item_id int, item_brand varchar(10))", "DELETE FROM  Users", "insert into Users (user_id, join_date, favorite_brand) values ('1', '2019-01-01', 'Lenovo')", "insert into Users (user_id, join_date, favorite_brand) values ('2', '2019-02-09', 'Samsung')", "insert into Users (user_id, join_date, favorite_brand) values ('3', '2019-01-19', 'LG')", "insert into Users (user_id, join_date, favorite_brand) values ('4', '2019-05-21', 'HP')", "DELETE FROM  Orders", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('1', '2019-08-01', '4', '1', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('2', '2019-08-02', '2', '1', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('3', '2019-08-03', '3', '2', '3')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('4', '2019-08-04', '1', '4', '2')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('5', '2019-08-04', '1', '3', '4')", "insert into Orders (order_id, order_date, item_id, buyer_id, seller_id) values ('6', '2019-08-05', '2', '2', '4')", "DELETE FROM  Items", "insert into Items (item_id, item_brand) values ('1', 'Samsung')", "insert into Items (item_id, item_brand) values ('2', 'Lenovo')", "insert into Items (item_id, item_brand) values ('3', 'LG')", "insert into Items (item_id, item_brand) values ('4', 'HP')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Users</code></p>\n<pre>\n+----------------+---------+\n| Column Name    | Type    |\n+----------------+---------+\n| user_id        | int     |\n| join_date      | date    |\n| favorite_brand | varchar |\n+----------------+---------+\nuser_id is the primary key of this table.\nThis table has the info of the users of an online shopping website where users can sell and buy items.</pre>\n<p>Table: <code>Orders</code></p>\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| order_id      | int     |\n| order_date    | date    |\n| item_id       | int     |\n| buyer_id      | int     |\n| seller_id     | int     |\n+---------------+---------+\norder_id is the primary key of this table.\nitem_id is a foreign key to the Items table.\nbuyer_id and seller_id are foreign keys to the Users table.\n</pre>\n<p>Table: <code>Items</code></p>\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| item_id       | int     |\n| item_brand    | varchar |\n+---------------+---------+\nitem_id is the primary key of this table.\n</pre>\n<p>\u00a0</p>\n<p>Write an SQL query to find for each user, whether the brand of the second item (by date) they\n        sold\u00a0is\u00a0their favorite brand. If a user sold less than two items, report the\n        answer\u00a0for that user as no.</p>\n<p>It is guaranteed that no seller sold more than one item on a day.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nUsers table:\n+---------+------------+----------------+\n| user_id | join_date  | favorite_brand |\n+---------+------------+----------------+\n| 1       | 2019-01-01 | Lenovo         |\n| 2       | 2019-02-09 | Samsung        |\n| 3       | 2019-01-19 | LG             |\n| 4       | 2019-05-21 | HP             |\n+---------+------------+----------------+\n\nOrders table:\n+----------+------------+---------+----------+-----------+\n| order_id | order_date | item_id | buyer_id | seller_id |\n+----------+------------+---------+----------+-----------+\n| 1        | 2019-08-01 | 4       | 1        | 2         |\n| 2        | 2019-08-02 | 2       | 1        | 3         |\n| 3        | 2019-08-03 | 3       | 2        | 3         |\n| 4        | 2019-08-04 | 1       | 4        | 2         |\n| 5        | 2019-08-04 | 1       | 3        | 4         |\n| 6        | 2019-08-05 | 2       | 2        | 4         |\n+----------+------------+---------+----------+-----------+\n\nItems table:\n+---------+------------+\n| item_id | item_brand |\n+---------+------------+\n| 1       | Samsung    |\n| 2       | Lenovo     |\n| 3       | LG         |\n| 4       | HP         |\n+---------+------------+\n\nResult table:\n+-----------+--------------------+\n| seller_id | 2nd_item_fav_brand |\n+-----------+--------------------+\n| 1         | no                 |\n| 2         | yes                |\n| 3         | yes                |\n| 4         | no                 |\n+-----------+--------------------+\n\nThe answer for the user with id 1 is no because they sold nothing.\nThe answer for the users with id 2 and 3 is yes because the brands of their second sold items are their favorite brands.\nThe answer for the user with id 4 is no because the brand of their second sold item is not their favorite brand.</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2019-02-01-1159-Market-Analysis-II\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1159-Market-Analysis-II</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "rising-temperature": {"title": "Rising Temperature", "schemas": ["Create table If Not Exists Weather (id int, recordDate date, temperature int)", "DELETE FROM  Weather", "insert into Weather (id, recordDate, temperature) values ('1', '2015-01-01', '10')", "insert into Weather (id, recordDate, temperature) values ('2', '2015-01-02', '25')", "insert into Weather (id, recordDate, temperature) values ('3', '2015-01-03', '20')", "insert into Weather (id, recordDate, temperature) values ('4', '2015-01-04', '30')"], "content": "<p>Table: <code>Weather</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| id            | int     |\n| recordDate    | date    |\n| temperature   | int     |\n+---------------+---------+\nid is the column with unique values for this table.\nThere are no different rows with the same recordDate.\nThis table contains information about the temperature on a certain day.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find all dates&#39; <code>id</code> with higher temperatures compared to its previous dates (yesterday).</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nWeather table:\n+----+------------+-------------+\n| id | recordDate | temperature |\n+----+------------+-------------+\n| 1  | 2015-01-01 | 10          |\n| 2  | 2015-01-02 | 25          |\n| 3  | 2015-01-03 | 20          |\n| 4  | 2015-01-04 | 30          |\n+----+------------+-------------+\n<strong>Output:</strong> \n+----+\n| id |\n+----+\n| 2  |\n| 4  |\n+----+\n<strong>Explanation:</strong> \nIn 2015-01-02, the temperature was higher than the previous day (10 -&gt; 25).\nIn 2015-01-04, the temperature was higher than the previous day (20 -&gt; 30).\n</pre>\n"}, "consecutive-numbers": {"title": "Consecutive Numbers", "schemas": ["Create table If Not Exists Logs (id int, num int)", "DELETE FROM  Logs", "insert into Logs (id, num) values ('1', '1')", "insert into Logs (id, num) values ('2', '1')", "insert into Logs (id, num) values ('3', '1')", "insert into Logs (id, num) values ('4', '2')", "insert into Logs (id, num) values ('5', '1')", "insert into Logs (id, num) values ('6', '2')", "insert into Logs (id, num) values ('7', '2')"], "content": "<p>Table: <code>Logs</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| id          | int     |\n| num         | varchar |\n+-------------+---------+\nIn SQL, id is the primary key for this table.\nid is an autoincrement column starting from 1.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Find all numbers that appear at least three times consecutively.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nLogs table:\n+----+-----+\n| id | num |\n+----+-----+\n| 1  | 1   |\n| 2  | 1   |\n| 3  | 1   |\n| 4  | 2   |\n| 5  | 1   |\n| 6  | 2   |\n| 7  | 2   |\n+----+-----+\n<strong>Output:</strong> \n+-----------------+\n| ConsecutiveNums |\n+-----------------+\n| 1               |\n+-----------------+\n<strong>Explanation:</strong> 1 is the only number that appears consecutively for at least three times.\n</pre>\n"}, "find-cumulative-salary-of-an-employee": {"title": "Find Cumulative Salary of an Employee", "schemas": ["Create table If Not Exists Employee (id int, month int, salary int)", "DELETE FROM  Employee", "insert into Employee (id, month, salary) values ('1', '1', '20')", "insert into Employee (id, month, salary) values ('2', '1', '20')", "insert into Employee (id, month, salary) values ('1', '2', '30')", "insert into Employee (id, month, salary) values ('2', '2', '30')", "insert into Employee (id, month, salary) values ('3', '2', '40')", "insert into Employee (id, month, salary) values ('1', '3', '40')", "insert into Employee (id, month, salary) values ('3', '3', '60')", "insert into Employee (id, month, salary) values ('1', '4', '60')", "insert into Employee (id, month, salary) values ('3', '4', '70')", "insert into Employee (id, month, salary) values ('1', '7', '90')", "insert into Employee (id, month, salary) values ('1', '8', '90')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <b>Employee</b> table holds the salary information in a year.</p>\n<p>Write a SQL to get the cumulative sum of an employee's salary over a period of 3 months\n        but exclude the most recent month.</p>\n<p>The result should be displayed by 'Id' ascending, and then by 'Month'\n        descending.</p>\n<p><b>Example</b><br/>\n<b>Input</b></p>\n<pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 1     | 20     |\n| 2  | 1     | 20     |\n| 1  | 2     | 30     |\n| 2  | 2     | 30     |\n| 3  | 2     | 40     |\n| 1  | 3     | 40     |\n| 3  | 3     | 60     |\n| 1  | 4     | 60     |\n| 3  | 4     | 70     |\n</pre>\n<b>Output</b>\n<pre>\n\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 3     | 90     |\n| 1  | 2     | 50     |\n| 1  | 1     | 20     |\n| 2  | 1     | 20     |\n| 3  | 3     | 100    |\n| 3  | 2     | 40     |\n</pre>\n<p>\u00a0</p>\n<b>Explanation</b>\n<p>Employee '1' has 3 salary records for the following 3 months except the most recent\n        month '4': salary 40 for month '3', 30 for month '2' and 20 for\n        month '1'<br/>\n        So the cumulative sum of salary of this employee over 3 months is 90(40+30+20), 50(30+20)\n        and 20 respectively.</p>\n<pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 1  | 3     | 90     |\n| 1  | 2     | 50     |\n| 1  | 1     | 20     |\n</pre>\n    Employee '2' only has one salary record (month '1') except its most recent month\n    '2'.\n\n    <pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 2  | 1     | 20     |\n</pre>\n<p>\u00a0</p>\n    Employ '3' has two salary records except its most recent pay month '4': month\n    '3' with 60 and month '2' with 40. So the cumulative salary is as following.\n\n    <pre>\n| Id | Month | Salary |\n|----|-------|--------|\n| 3  | 3     | 100    |\n| 3  | 2     | 40     |\n</pre>\n<p>\u00a0</p>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-07-01-579-Find-Cumulative-Salary-of-an-Employee\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">579-Find-Cumulative-Salary-of-an-Employee</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "game-play-analysis-iii": {"title": "Game Play Analysis III", "schemas": ["Create table If Not Exists Activity (player_id int, device_id int, event_date date, games_played int)", "DELETE FROM  Activity", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-03-01', '5')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '2', '2016-05-02', '6')", "insert into Activity (player_id, device_id, event_date, games_played) values ('1', '3', '2017-06-25', '1')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '1', '2016-03-02', '0')", "insert into Activity (player_id, device_id, event_date, games_played) values ('3', '4', '2018-07-03', '5')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table:\u00a0<code>Activity</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| player_id    | int     |\n| device_id    | int     |\n| event_date   | date    |\n| games_played | int     |\n+--------------+---------+\n(player_id, event_date) is the primary key of this table.\nThis table shows the activity of players of some game.\nEach row is a record of a player who logged in and played a number of games (possibly 0) before logging out on some day using some device.\n</pre>\n<p>\u00a0</p>\n<p>Write an SQL query that reports the <strong>fraction</strong> of players that logged in again\n        on the day after the day they first logged in,\u00a0<strong>rounded to 2 decimal\n            places</strong>.\u00a0In other words, you need to count the number of players that\n        logged in for at least two consecutive days starting from their first login date, then\n        divide that number by the total number of players.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nActivity table:\n+-----------+-----------+------------+--------------+\n| player_id | device_id | event_date | games_played |\n+-----------+-----------+------------+--------------+\n| 1         | 2         | 2016-03-01 | 5            |\n| 1         | 2         | 2016-03-02 | 6            |\n| 2         | 3         | 2017-06-25 | 1            |\n| 3         | 1         | 2016-03-02 | 0            |\n| 3         | 4         | 2018-07-03 | 5            |\n+-----------+-----------+------------+--------------+\n\nResult table:\n+-----------+\n| fraction  |\n+-----------+\n| 0.33      |\n+-----------+\nOnly the player with id 1 logged back in after the first day he had logged in so the answer is 1/3 = 0.33\n</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-06-02-550-Game-Play-Analysis-IV\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">550-Game-Play-Analysis-IV</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "last-person-to-fit-in-the-bus": {"title": "Last Person to Fit in the Bus", "schemas": ["Create table If Not Exists Queue (person_id int, person_name varchar(30), weight int, turn int)", "DELETE FROM  Queue", "insert into Queue (person_id, person_name, weight, turn) values ('5', 'Alice', '250', '1')", "insert into Queue (person_id, person_name, weight, turn) values ('4', 'Bob', '175', '5')", "insert into Queue (person_id, person_name, weight, turn) values ('3', 'Alex', '350', '2')", "insert into Queue (person_id, person_name, weight, turn) values ('6', 'John Cena', '400', '3')", "insert into Queue (person_id, person_name, weight, turn) values ('1', 'Winston', '500', '6')", "insert into Queue (person_id, person_name, weight, turn) values ('2', 'Marie', '200', '4')"], "content": "<p>Table: <code>Queue</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| person_id   | int     |\n| person_name | varchar |\n| weight      | int     |\n| turn        | int     |\n+-------------+---------+\nperson_id column contains unique values.\nThis table has the information about all people waiting for a bus.\nThe person_id and turn columns will contain all numbers from 1 to n, where n is the number of rows in the table.\nturn determines the order of which the people will board the bus, where turn=1 denotes the first person to board and turn=n denotes the last person to board.\nweight is the weight of the person in kilograms.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>There is a queue of people waiting to board a bus. However, the bus has a weight limit of <code>1000</code><strong> kilograms</strong>, so there may be some people who cannot board.</p>\n\n<p>Write a solution to find the <code>person_name</code> of the <strong>last person</strong> that can fit on the bus without exceeding the weight limit. The test cases are generated such that the first person does not exceed the weight limit.</p>\n\n<p><strong>Note</strong> that <em>only one</em> person can board the bus at any given turn.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nQueue table:\n+-----------+-------------+--------+------+\n| person_id | person_name | weight | turn |\n+-----------+-------------+--------+------+\n| 5         | Alice       | 250    | 1    |\n| 4         | Bob         | 175    | 5    |\n| 3         | Alex        | 350    | 2    |\n| 6         | John Cena   | 400    | 3    |\n| 1         | Winston     | 500    | 6    |\n| 2         | Marie       | 200    | 4    |\n+-----------+-------------+--------+------+\n<strong>Output:</strong> \n+-------------+\n| person_name |\n+-------------+\n| John Cena   |\n+-------------+\n<strong>Explanation:</strong> The folowing table is ordered by the turn for simplicity.\n+------+----+-----------+--------+--------------+\n| Turn | ID | Name      | Weight | Total Weight |\n+------+----+-----------+--------+--------------+\n| 1    | 5  | Alice     | 250    | 250          |\n| 2    | 3  | Alex      | 350    | 600          |\n| 3    | 6  | John Cena | 400    | 1000         | (last person to board)\n| 4    | 2  | Marie     | 200    | 1200         | (cannot board)\n| 5    | 4  | Bob       | 175    | ___          |\n| 6    | 1  | Winston   | 500    | ___          |\n+------+----+-----------+--------+--------------+\n</pre>\n"}, "account-balance": {"title": "Account Balance", "schemas": ["Create table If Not Exists Transactions (account_id int, day date, type ENUM('Deposit', 'Withdraw'), amount int)", "DELETE FROM  Transactions", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-07', 'Deposit', '2000')", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-09', 'Withdraw', '1000')", "insert into Transactions (account_id, day, type, amount) values ('1', '2021-11-11', 'Deposit', '3000')", "insert into Transactions (account_id, day, type, amount) values ('2', '2021-12-07', 'Deposit', '7000')", "insert into Transactions (account_id, day, type, amount) values ('2', '2021-12-12', 'Withdraw', '7000')"], "content": "<p>Problem is locked. \ud83d\ude1e</p>"}, "median-given-frequency-of-numbers": {"title": "Median Given Frequency of Numbers", "schemas": [], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>The <code>Numbers</code> table keeps the value of number and its frequency.</p>\n<pre>\n+----------+-------------+\n|  Number  |  Frequency  |\n+----------+-------------|\n|  0       |  7          |\n|  1       |  1          |\n|  2       |  3          |\n|  3       |  1          |\n+----------+-------------+\n</pre>\n<p>In this table, the numbers are <code>0, 0, 0, 0, 0, 0, 0, 1, 2, 2, 2, 3</code>, so the median\n        is <code>(0 + 0) / 2 = 0</code>.</p>\n<pre>\n+--------+\n| median |\n+--------|\n| 0.0000 |\n+--------+\n</pre>\n<p>Write a query to find the median of all numbers and name the result as <code>median</code>.\n    </p>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2017-06-23-571-Find-Median-Given-Frequency-of-Numbers\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">571-Find-Median-Given-Frequency-of-Numbers</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "active-businesses": {"title": "Active Businesses", "schemas": ["Create table If Not Exists Events (business_id int, event_type varchar(10), occurrences int)", "DELETE FROM  Events", "insert into Events (business_id, event_type, occurrences) values ('1', 'reviews', '7')", "insert into Events (business_id, event_type, occurrences) values ('3', 'reviews', '3')", "insert into Events (business_id, event_type, occurrences) values ('1', 'ads', '11')", "insert into Events (business_id, event_type, occurrences) values ('2', 'ads', '7')", "insert into Events (business_id, event_type, occurrences) values ('3', 'ads', '6')", "insert into Events (business_id, event_type, occurrences) values ('1', 'page views', '3')", "insert into Events (business_id, event_type, occurrences) values ('2', 'page views', '12')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<p>Table: <code>Failed</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| fail_date    | date    |\n+--------------+---------+\nPrimary key for this table is fail_date.\nFailed table contains the days of failed tasks.\n</pre>\n<p>Table: <code>Succeeded</code></p>\n<pre>\n+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| success_date | date    |\n+--------------+---------+\nPrimary key for this table is success_date.\nSucceeded table contains the days of succeeded tasks.\n</pre>\n<p>\u00a0</p>\n<p>A system is running one task <strong>every day</strong>. Every task is independent of the\n        previous tasks. The tasks can fail or succeed.</p>\n<p>Write an SQL query to generate a report of\u00a0<code>period_state</code> for each continuous\n        interval of days in the period from\u00a0<strong>2019-01-01</strong> to\n        <strong>2019-12-31</strong>.</p>\n<p><code>period_state</code> is <em>'failed'\u00a0</em>if tasks in this interval failed\n        or <em>'succeeded'</em>\u00a0if tasks in this interval succeeded. Interval of days\n        are retrieved as <code>start_date</code> and <code>end_date.</code></p>\n<p>Order result by <code>start_date</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre>\nFailed table:\n+-------------------+\n| fail_date         |\n+-------------------+\n| 2018-12-28        |\n| 2018-12-29        |\n| 2019-01-04        |\n| 2019-01-05        |\n+-------------------+\n\nSucceeded table:\n+-------------------+\n| success_date      |\n+-------------------+\n| 2018-12-30        |\n| 2018-12-31        |\n| 2019-01-01        |\n| 2019-01-02        |\n| 2019-01-03        |\n| 2019-01-06        |\n+-------------------+\n\n\nResult table:\n+--------------+--------------+--------------+\n| period_state | start_date   | end_date     |\n+--------------+--------------+--------------+\n| succeeded    | 2019-01-01   | 2019-01-03   |\n| failed       | 2019-01-04   | 2019-01-05   |\n| succeeded    | 2019-01-06   | 2019-01-06   |\n+--------------+--------------+--------------+\n\nThe report ignored the system state in 2018 as we care about the system in the period 2019-01-01 to 2019-12-31.\nFrom 2019-01-01 to 2019-01-03 all tasks succeeded and the system state was \"succeeded\".\nFrom 2019-01-04 to 2019-01-05 all tasks failed and system state was \"failed\".\nFrom 2019-01-06 to 2019-01-06 all tasks succeeded and system state was \"succeeded\".\n</pre>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2019-04-08-1225-Report-Contiguous-Dates\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1225-Report-Contiguous-Dates</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "active-users": {"title": "Active Users", "schemas": ["Create table If Not Exists Accounts (id int, name varchar(10))", "Create table If Not Exists Logins (id int, login_date date)", "DELETE FROM  Accounts", "insert into Accounts (id, name) values ('1', 'Winston')", "insert into Accounts (id, name) values ('7', 'Jonathan')", "DELETE FROM  Logins", "insert into Logins (id, login_date) values ('7', '2020-05-30')", "insert into Logins (id, login_date) values ('1', '2020-05-30')", "insert into Logins (id, login_date) values ('7', '2020-05-31')", "insert into Logins (id, login_date) values ('7', '2020-06-01')", "insert into Logins (id, login_date) values ('7', '2020-06-02')", "insert into Logins (id, login_date) values ('7', '2020-06-02')", "insert into Logins (id, login_date) values ('7', '2020-06-03')", "insert into Logins (id, login_date) values ('1', '2020-06-07')", "insert into Logins (id, login_date) values ('7', '2020-06-10')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Logs</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| log_id        | int     |\n+---------------+---------+\nid is the primary key for this table.\nEach row of this table contains the ID in a log Table.\n\n</pre>\n<p>Since some IDs\u00a0have been removed from <code>Logs</code>. Write an SQL query to\n                find the start and end number of continuous ranges in table <code>Logs</code>.</p>\n<p>Order the result table by <code>start_id</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre>Logs table:\n+------------+\n| log_id     |\n+------------+\n| 1          |\n| 2          |\n| 3          |\n| 7          |\n| 8          |\n| 10         |\n+------------+\n\nResult table:\n+------------+--------------+\n| start_id   | end_id       |\n+------------+--------------+\n| 1          | 3            |\n| 7          | 8            |\n| 10         | 10           |\n+------------+--------------+\nThe result table should contain all ranges in table Logs.\nFrom 1 to 3 is contained in the table.\nFrom 4 to 6 is missing in the table\nFrom 7 to 8 is contained in the table.\nNumber 9 is missing in the table.\nNumber 10 is contained in the table.\n</pre>\n</div>\n</div>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2019-06-07-1285-Find-the-Start-and-End-Number-of-Continuous-Ranges\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1285-Find-the-Start-and-End-Number-of-Continuous-Ranges</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "human-traffic-of-stadium": {"title": "Human Traffic of Stadium", "schemas": ["Create table If Not Exists Stadium (id int, visit_date DATE NULL, people int)", "DELETE FROM  Stadium", "insert into Stadium (id, visit_date, people) values ('1', '2017-01-01', '10')", "insert into Stadium (id, visit_date, people) values ('2', '2017-01-02', '109')", "insert into Stadium (id, visit_date, people) values ('3', '2017-01-03', '150')", "insert into Stadium (id, visit_date, people) values ('4', '2017-01-04', '99')", "insert into Stadium (id, visit_date, people) values ('5', '2017-01-05', '145')", "insert into Stadium (id, visit_date, people) values ('6', '2017-01-06', '1455')", "insert into Stadium (id, visit_date, people) values ('7', '2017-01-07', '199')", "insert into Stadium (id, visit_date, people) values ('8', '2017-01-09', '188')"], "content": "<p>Table: <code>Stadium</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| id            | int     |\n| visit_date    | date    |\n| people        | int     |\n+---------------+---------+\nvisit_date is the column with unique values for this table.\nEach row of this table contains the visit date and visit id to the stadium with the number of people during the visit.\nAs the id increases, the date increases as well.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to display the records with three or more rows with <strong>consecutive</strong> <code>id</code>&#39;s, and the number of people is greater than or equal to 100 for each.</p>\n\n<p>Return the result table ordered by <code>visit_date</code> in <strong>ascending order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nStadium table:\n+------+------------+-----------+\n| id   | visit_date | people    |\n+------+------------+-----------+\n| 1    | 2017-01-01 | 10        |\n| 2    | 2017-01-02 | 109       |\n| 3    | 2017-01-03 | 150       |\n| 4    | 2017-01-04 | 99        |\n| 5    | 2017-01-05 | 145       |\n| 6    | 2017-01-06 | 1455      |\n| 7    | 2017-01-07 | 199       |\n| 8    | 2017-01-09 | 188       |\n+------+------------+-----------+\n<strong>Output:</strong> \n+------+------------+-----------+\n| id   | visit_date | people    |\n+------+------------+-----------+\n| 5    | 2017-01-05 | 145       |\n| 6    | 2017-01-06 | 1455      |\n| 7    | 2017-01-07 | 199       |\n| 8    | 2017-01-09 | 188       |\n+------+------------+-----------+\n<strong>Explanation:</strong> \nThe four rows with ids 5, 6, 7, and 8 have consecutive ids and each of them has &gt;= 100 people attended. Note that row 8 was included even though the visit_date was not the next day after row 7.\nThe rows with ids 2 and 3 are not included because we need at least three consecutive ids.\n</pre>\n"}, "consecutive-transactions-with-increasing-amounts": {"title": "Consecutive Transactions with Increasing Amounts", "schemas": ["Create table If Not Exists Transactions (transaction_id int, customer_id int, transaction_date date, amount int)", "DELETE FROM  Transactions", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('1', '101', '2023-05-01', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('2', '101', '2023-05-02', '150')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('3', '101', '2023-05-03', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('4', '102', '2023-05-01', '50')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('5', '102', '2023-05-03', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('6', '102', '2023-05-04', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('7', '105', '2023-05-01', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('8', '105', '2023-05-02', '150')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('9', '105', '2023-05-03', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('10', '105', '2023-05-04', '300')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('11', '105', '2023-05-12', '250')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('12', '105', '2023-05-13', '260')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('13', '105', '2023-05-14', '270')"], "content": "<p>Problem is locked. \ud83d\ude1e</p>"}, "process-tasks-using-servers": {"title": "Process Tasks Using Servers", "schemas": [], "content": "<p>You are given two <strong>0-indexed</strong> integer arrays <code>servers</code> and <code>tasks</code> of lengths <code>n</code>\u200b\u200b\u200b\u200b\u200b\u200b and <code>m</code>\u200b\u200b\u200b\u200b\u200b\u200b respectively. <code>servers[i]</code> is the <strong>weight</strong> of the <code>i<sup>\u200b\u200b\u200b\u200b\u200b\u200bth</sup></code>\u200b\u200b\u200b\u200b server, and <code>tasks[j]</code> is the <strong>time needed</strong> to process the <code>j<sup>\u200b\u200b\u200b\u200b\u200b\u200bth</sup></code>\u200b\u200b\u200b\u200b task <strong>in seconds</strong>.</p>\n\n<p>Tasks are assigned to the servers using a <strong>task queue</strong>. Initially, all servers are free, and the queue is <strong>empty</strong>.</p>\n\n<p>At second <code>j</code>, the <code>j<sup>th</sup></code> task is <strong>inserted</strong> into the queue (starting with the <code>0<sup>th</sup></code> task being inserted at second <code>0</code>). As long as there are free servers and the queue is not empty, the task in the front of the queue will be assigned to a free server with the <strong>smallest weight</strong>, and in case of a tie, it is assigned to a free server with the <strong>smallest index</strong>.</p>\n\n<p>If there are no free servers and the queue is not empty, we wait until a server becomes free and immediately assign the next task. If multiple servers become free at the same time, then multiple tasks from the queue will be assigned <strong>in order of insertion</strong> following the weight and index priorities above.</p>\n\n<p>A server that is assigned task <code>j</code> at second <code>t</code> will be free again at second <code>t + tasks[j]</code>.</p>\n\n<p>Build an array <code>ans</code>\u200b\u200b\u200b\u200b of length <code>m</code>, where <code>ans[j]</code> is the <strong>index</strong> of the server the <code>j<sup>\u200b\u200b\u200b\u200b\u200b\u200bth</sup></code> task will be assigned to.</p>\n\n<p>Return <em>the array </em><code>ans</code>\u200b\u200b\u200b\u200b.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> servers = [3,3,2], tasks = [1,2,3,2,1,2]\n<strong>Output:</strong> [2,2,0,2,1,2]\n<strong>Explanation: </strong>Events in chronological order go as follows:\n- At second 0, task 0 is added and processed using server 2 until second 1.\n- At second 1, server 2 becomes free. Task 1 is added and processed using server 2 until second 3.\n- At second 2, task 2 is added and processed using server 0 until second 5.\n- At second 3, server 2 becomes free. Task 3 is added and processed using server 2 until second 5.\n- At second 4, task 4 is added and processed using server 1 until second 5.\n- At second 5, all servers become free. Task 5 is added and processed using server 2 until second 7.</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> servers = [5,1,4,3,2], tasks = [2,1,2,4,5,2,1]\n<strong>Output:</strong> [1,4,1,4,1,3,2]\n<strong>Explanation: </strong>Events in chronological order go as follows: \n- At second 0, task 0 is added and processed using server 1 until second 2.\n- At second 1, task 1 is added and processed using server 4 until second 2.\n- At second 2, servers 1 and 4 become free. Task 2 is added and processed using server 1 until second 4. \n- At second 3, task 3 is added and processed using server 4 until second 7.\n- At second 4, server 1 becomes free. Task 4 is added and processed using server 1 until second 9. \n- At second 5, task 5 is added and processed using server 3 until second 7.\n- At second 6, task 6 is added and processed using server 2 until second 7.\n</pre>\n\n<p>&nbsp;</p>\n<p><strong>Constraints:</strong></p>\n\n<ul>\n\t<li><code>servers.length == n</code></li>\n\t<li><code>tasks.length == m</code></li>\n\t<li><code>1 &lt;= n, m &lt;= 2 * 10<sup>5</sup></code></li>\n\t<li><code>1 &lt;= servers[i], tasks[j] &lt;= 2 * 10<sup>5</sup></code></li>\n</ul>\n"}, "find-the-quiet-students-in-all-exams": {"title": "Find the Quiet Students in All Exams", "schemas": ["Create table If Not Exists Student (student_id int, student_name varchar(30))", "Create table If Not Exists Exam (exam_id int, student_id int, score int)", "DELETE FROM  Student", "insert into Student (student_id, student_name) values ('1', 'Daniel')", "insert into Student (student_id, student_name) values ('2', 'Jade')", "insert into Student (student_id, student_name) values ('3', 'Stella')", "insert into Student (student_id, student_name) values ('4', 'Jonathan')", "insert into Student (student_id, student_name) values ('5', 'Will')", "DELETE FROM  Exam", "insert into Exam (exam_id, student_id, score) values ('10', '1', '70')", "insert into Exam (exam_id, student_id, score) values ('10', '2', '80')", "insert into Exam (exam_id, student_id, score) values ('10', '3', '90')", "insert into Exam (exam_id, student_id, score) values ('20', '1', '80')", "insert into Exam (exam_id, student_id, score) values ('30', '1', '70')", "insert into Exam (exam_id, student_id, score) values ('30', '3', '80')", "insert into Exam (exam_id, student_id, score) values ('30', '4', '90')", "insert into Exam (exam_id, student_id, score) values ('40', '1', '60')", "insert into Exam (exam_id, student_id, score) values ('40', '2', '70')", "insert into Exam (exam_id, student_id, score) values ('40', '4', '80')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Visits</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| user_id       | int     |\n| visit_date    | date    |\n+---------------+---------+\n(user_id, visit_date) is the primary key for this table.\nEach row of this table indicates that user_id has visited the bank in visit_date.\n</pre>\n<p>\u00a0</p>\n<p>Table: <code>Transactions</code></p>\n<pre>+------------------+---------+\n| Column Name      | Type    |\n+------------------+---------+\n| user_id          | int     |\n| transaction_date | date    |\n| amount           | int     |\n+------------------+---------+\nThere is no primary key for this table, it may contain duplicates.\nEach row of this table indicates that user_id has done a transaction of amount in transaction_date.\nIt is guaranteed that the user has visited the bank in the transaction_date.(i.e The Visits table contains (user_id, transaction_date) in one row)\n</pre>\n<p>\u00a0</p>\n<p>A bank wants to draw a chart of the number of transactions bank visitors did in one\n                visit to the bank and the corresponding number of visitors who have done this number\n                of transaction in one visit.</p>\n<p>Write an SQL query to find how many users visited the bank and didn't do any\n                transactions, how many visited the bank and did one transaction and so on.</p>\n<p>The result table will contain two columns:</p>\n<ul>\n<li><code>transactions_count</code> which is the number of transactions done in one\n                    visit.\n                </li>\n<li><code>visits_count</code> which is the corresponding\u00a0number of users who\n                    did\u00a0<code>transactions_count</code> in one visit to the bank.\n                </li>\n</ul>\n<p><code>transactions_count</code> should take all values from <code>0</code> to <code>max(transactions_count)</code>\n                done by one or more users.</p>\n<p>Order the result table by <code>transactions_count</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre><code>Visits</code> table:\n+---------+------------+\n| user_id | visit_date |\n+---------+------------+\n| 1       | 2020-01-01 |\n| 2       | 2020-01-02 |\n| 12      | 2020-01-01 |\n| 19      | 2020-01-03 |\n| 1       | 2020-01-02 |\n| 2       | 2020-01-03 |\n| 1       | 2020-01-04 |\n| 7       | 2020-01-11 |\n| 9       | 2020-01-25 |\n| 8       | 2020-01-28 |\n+---------+------------+\n<code>Transactions</code> table:\n+---------+------------------+--------+\n| user_id | transaction_date | amount |\n+---------+------------------+--------+\n| 1       | 2020-01-02       | 120    |\n| 2       | 2020-01-03       | 22     |\n| 7       | 2020-01-11       | 232    |\n| 1       | 2020-01-04       | 7      |\n| 9       | 2020-01-25       | 33     |\n| 9       | 2020-01-25       | 66     |\n| 8       | 2020-01-28       | 1      |\n| 9       | 2020-01-25       | 99     |\n+---------+------------------+--------+\nResult table:\n+--------------------+--------------+\n| <code>transactions_count</code> | visits_count |\n+--------------------+--------------+\n| 0                  | 4            |\n| 1                  | 5            |\n| 2                  | 0            |\n| 3                  | 1            |\n+--------------------+--------------+\n* For transactions_count = 0, The visits (1, \"2020-01-01\"), (2, \"2020-01-02\"), (12, \"2020-01-01\") and (19, \"2020-01-03\") did no transactions so visits_count = 4.\n* For transactions_count = 1, The visits (2, \"2020-01-03\"), (7, \"2020-01-11\"), (8, \"2020-01-28\"),\u00a0(1, \"2020-01-02\") and (1, \"2020-01-04\") did one transaction\u00a0so visits_count = 5.\n* For transactions_count = 2, No customers visited the bank and did two transactions so visits_count = 0.\n* For transactions_count = 3, The visit\u00a0(9, \"2020-01-25\") did three\u00a0transactions so visits_count = 1.\n* For transactions_count &gt;= 4, No customers visited the bank and did more than three transactions so we will stop at\u00a0transactions_count = 3\n\nThe chart drawn for this example is as follows:\n<img alt=\"\" src=\"https://assets.leetcode.com/uploads/2020/01/31/chart.png\" style=\"width: 600px; height: 359px;\"/>\n</pre>\n</div>\n</div>\n<div>\n<h3>Difficulty:</h3>\n\n</div>\n<div>\n<h3>Lock:</h3>\n\n</div>\n<div>\n<h3>Company:</h3>\n\n\n\n</div>\n<div style=\"height=20px;\"></div>\n<div>\n<h3>Problem Solution</h3>\n<a href=\"https://leetcode.ca/2019-07-28-1336-Number-of-Transactions-per-Visit\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">1336-Number-of-Transactions-per-Visit</a>\n</div>\n<div>\n<h3>All Problems:</h3>\n<a href=\"https://leetcode.ca/all/problems.html\" style=\"font-size:20px;color: #0066cc;margin-bottom:15px;text-decoration:underline\">Link to All Problems</a>\n</div>\n<div style=\"width:100%;font-size:18px;background:#f0ad4e;color:#ffffff;\">\n        All contents and pictures on this website come from the Internet and are updated regularly every week. They are for personal study and research only, and should not be used for commercial purposes. Thank you for your cooperation.\n    </div>\n<div style=\"width: 100%; text-align: center; margin: auto;background:#ffffff\">\n</div>\n</div>"}, "hopper-company-queries-i": {"title": "Hopper Company Queries I", "schemas": ["Create table If Not Exists Drivers (driver_id int, join_date date)", "Create table If Not Exists Rides (ride_id int, user_id int, requested_at date)", "Create table If Not Exists AcceptedRides (ride_id int, driver_id int, ride_distance int, ride_duration int)", "DELETE FROM  Drivers", "insert into Drivers (driver_id, join_date) values ('10', '2019-12-10')", "insert into Drivers (driver_id, join_date) values ('8', '2020-1-13')", "insert into Drivers (driver_id, join_date) values ('5', '2020-2-16')", "insert into Drivers (driver_id, join_date) values ('7', '2020-3-8')", "insert into Drivers (driver_id, join_date) values ('4', '2020-5-17')", "insert into Drivers (driver_id, join_date) values ('1', '2020-10-24')", "insert into Drivers (driver_id, join_date) values ('6', '2021-1-5')", "DELETE FROM  Rides", "insert into Rides (ride_id, user_id, requested_at) values ('6', '75', '2019-12-9')", "insert into Rides (ride_id, user_id, requested_at) values ('1', '54', '2020-2-9')", "insert into Rides (ride_id, user_id, requested_at) values ('10', '63', '2020-3-4')", "insert into Rides (ride_id, user_id, requested_at) values ('19', '39', '2020-4-6')", "insert into Rides (ride_id, user_id, requested_at) values ('3', '41', '2020-6-3')", "insert into Rides (ride_id, user_id, requested_at) values ('13', '52', '2020-6-22')", "insert into Rides (ride_id, user_id, requested_at) values ('7', '69', '2020-7-16')", "insert int
