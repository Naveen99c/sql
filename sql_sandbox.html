LECT g.id, g.visit_date, g.people FROM grp g JOIN cnt c ON g.g = c.g WHERE c.c >= 3 ORDER BY g.visit_date", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Fewer than 3 consecutive busy days", "inserts": ["DELETE FROM Stadium", "INSERT INTO Stadium VALUES (1,'2023-01-01',150)", "INSERT INTO Stadium VALUES (2,'2023-01-02',50)", "INSERT INTO Stadium VALUES (3,'2023-01-03',200)", "INSERT INTO Stadium VALUES (4,'2023-01-04',80)", "INSERT INTO Stadium VALUES (5,'2023-01-05',300)"], "hint": "No run of 3+ consecutive busy ids — return empty."}]}}, "consecutive-transactions-with-increasing-amounts": {"title": "Consecutive Transactions with Increasing Amounts", "schemas": ["Create table If Not Exists Transactions (transaction_id int, customer_id int, transaction_date date, amount int)", "DELETE FROM  Transactions", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('1', '101', '2023-05-01', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('2', '101', '2023-05-02', '150')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('3', '101', '2023-05-03', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('4', '102', '2023-05-01', '50')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('5', '102', '2023-05-03', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('6', '102', '2023-05-04', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('7', '105', '2023-05-01', '100')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('8', '105', '2023-05-02', '150')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('9', '105', '2023-05-03', '200')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('10', '105', '2023-05-04', '300')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('11', '105', '2023-05-12', '250')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('12', '105', '2023-05-13', '260')", "insert into Transactions (transaction_id, customer_id, transaction_date, amount) values ('13', '105', '2023-05-14', '270')"], "content": "<p>Table: <code>Transactions(transaction_id, customer_id, transaction_date, amount)</code>.</p>\n<p>For each customer, find every maximal run of <strong>three or more consecutive-day</strong> transactions where the <code>amount</code> strictly increases from one day to the next.</p>\n<p>Output columns: <code>customer_id</code>, <code>consecutive_start</code>, <code>consecutive_end</code>. Order by <code>customer_id, consecutive_start</code>.</p>\n<h4>Rules</h4>\n<ul>\n  <li>Two dates are <em>consecutive</em> only if they differ by exactly 1 calendar day.</li>\n  <li>The run must have at least 3 transactions.</li>\n  <li>A skipped day or a non-increasing amount breaks the run.</li>\n</ul>\n<h4>Sample</h4>\n<p>Customer 101: <code>2023-05-01/100 → 2023-05-02/150 → 2023-05-03/200</code> is a valid 3-day increasing run.<br/>\nCustomer 102: dates 05-01, 05-03, 05-04 — breaks on the gap.<br/>\nCustomer 105: 05-01…05-04 is a valid 4-day run; 05-12…05-14 is another valid 3-day run.</p>", "shadow": {"gold": "WITH ordered AS (\n            SELECT t.*, LAG(amount) OVER (PARTITION BY customer_id ORDER BY transaction_date) AS prev_amt,\n                   LAG(transaction_date) OVER (PARTITION BY customer_id ORDER BY transaction_date) AS prev_dt\n            FROM Transactions t\n        ),\n        flagged AS (\n            SELECT *, CASE WHEN amount > prev_amt AND JULIANDAY(transaction_date) - JULIANDAY(prev_dt) = 1 THEN 0 ELSE 1 END AS brk\n            FROM ordered\n        ),\n        grouped AS (SELECT *, SUM(brk) OVER (PARTITION BY customer_id ORDER BY transaction_date) AS g FROM flagged),\n        runs AS (SELECT customer_id, g, MIN(transaction_date) AS s, MAX(transaction_date) AS e, COUNT(*) AS c FROM grouped GROUP BY customer_id, g)\n        SELECT customer_id, s AS consecutive_start, e AS consecutive_end FROM runs WHERE c >= 3 ORDER BY customer_id, consecutive_start", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Run of exactly 2 does not qualify", "hint": "Runs of length 2 must be excluded — threshold is ≥ 3.", "inserts": ["DELETE FROM Transactions", "INSERT INTO Transactions VALUES (1,500,'2023-01-01',10)", "INSERT INTO Transactions VALUES (2,500,'2023-01-02',20)"]}]}}, "process-tasks-using-servers": {"title": "Process Tasks Using Servers", "schemas": ["CREATE TABLE IF NOT EXISTS Tasks (task_id int, arrival int, duration int)", "DELETE FROM Tasks", "INSERT INTO Tasks VALUES (1,0,3)", "INSERT INTO Tasks VALUES (2,1,2)", "INSERT INTO Tasks VALUES (3,5,4)"], "content": "<p>You are given two <strong>0-indexed</strong> integer arrays <code>servers</code> and <code>tasks</code> of lengths <code>n</code>​​​​​​ and <code>m</code>​​​​​​ respectively. <code>servers[i]</code> is the <strong>weight</strong> of the <code>i<sup>​​​​​​th</sup></code>​​​​ server, and <code>tasks[j]</code> is the <strong>time needed</strong> to process the <code>j<sup>​​​​​​th</sup></code>​​​​ task <strong>in seconds</strong>.</p>\n\n<p>Tasks are assigned to the servers using a <strong>task queue</strong>. Initially, all servers are free, and the queue is <strong>empty</strong>.</p>\n\n<p>At second <code>j</code>, the <code>j<sup>th</sup></code> task is <strong>inserted</strong> into the queue (starting with the <code>0<sup>th</sup></code> task being inserted at second <code>0</code>). As long as there are free servers and the queue is not empty, the task in the front of the queue will be assigned to a free server with the <strong>smallest weight</strong>, and in case of a tie, it is assigned to a free server with the <strong>smallest index</strong>.</p>\n\n<p>If there are no free servers and the queue is not empty, we wait until a server becomes free and immediately assign the next task. If multiple servers become free at the same time, then multiple tasks from the queue will be assigned <strong>in order of insertion</strong> following the weight and index priorities above.</p>\n\n<p>A server that is assigned task <code>j</code> at second <code>t</code> will be free again at second <code>t + tasks[j]</code>.</p>\n\n<p>Build an array <code>ans</code>​​​​ of length <code>m</code>, where <code>ans[j]</code> is the <strong>index</strong> of the server the <code>j<sup>​​​​​​th</sup></code> task will be assigned to.</p>\n\n<p>Return <em>the array </em><code>ans</code>​​​​.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> servers = [3,3,2], tasks = [1,2,3,2,1,2]\n<strong>Output:</strong> [2,2,0,2,1,2]\n<strong>Explanation: </strong>Events in chronological order go as follows:\n- At second 0, task 0 is added and processed using server 2 until second 1.\n- At second 1, server 2 becomes free. Task 1 is added and processed using server 2 until second 3.\n- At second 2, task 2 is added and processed using server 0 until second 5.\n- At second 3, server 2 becomes free. Task 3 is added and processed using server 2 until second 5.\n- At second 4, task 4 is added and processed using server 1 until second 5.\n- At second 5, all servers become free. Task 5 is added and processed using server 2 until second 7.</pre>\n\n<p><strong class=\"example\">Example 2:</strong></p>\n\n<pre>\n<strong>Input:</strong> servers = [5,1,4,3,2], tasks = [2,1,2,4,5,2,1]\n<strong>Output:</strong> [1,4,1,4,1,3,2]\n<strong>Explanation: </strong>Events in chronological order go as follows: \n- At second 0, task 0 is added and processed using server 1 until second 2.\n- At second 1, task 1 is added and processed using server 4 until second 2.\n- At second 2, servers 1 and 4 become free. Task 2 is added and processed using server 1 until second 4. \n- At second 3, task 3 is added and processed using server 4 until second 7.\n- At second 4, server 1 becomes free. Task 4 is added and processed using server 1 until second 9. \n- At second 5, task 5 is added and processed using server 3 until second 7.\n- At second 6, task 6 is added and processed using server 2 until second 7.\n</pre>\n\n<p>&nbsp;</p>\n<p><strong>Constraints:</strong></p>\n\n<ul>\n\t<li><code>servers.length == n</code></li>\n\t<li><code>tasks.length == m</code></li>\n\t<li><code>1 &lt;= n, m &lt;= 2 * 10<sup>5</sup></code></li>\n\t<li><code>1 &lt;= servers[i], tasks[j] &lt;= 2 * 10<sup>5</sup></code></li>\n</ul>", "shadow": {"gold": "WITH ordered AS (\n            SELECT task_id, arrival, duration,\n                   LAG(arrival + duration) OVER (ORDER BY arrival) AS prev_finish\n            FROM Tasks\n        )\n        SELECT task_id,\n            CASE WHEN prev_finish IS NULL OR arrival >= prev_finish THEN 0 ELSE prev_finish - arrival END AS waiting\n        FROM ordered ORDER BY arrival", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "No overlap between tasks", "hint": "When arrival >= previous finish, waiting is 0.", "inserts": ["DELETE FROM Tasks", "INSERT INTO Tasks VALUES (1,0,2)", "INSERT INTO Tasks VALUES (2,5,2)"]}]}}, "find-the-quiet-students-in-all-exams": {"title": "Find the Quiet Students in All Exams", "schemas": ["Create table If Not Exists Student (student_id int, student_name varchar(30))", "Create table If Not Exists Exam (exam_id int, student_id int, score int)", "DELETE FROM  Student", "insert into Student (student_id, student_name) values ('1', 'Daniel')", "insert into Student (student_id, student_name) values ('2', 'Jade')", "insert into Student (student_id, student_name) values ('3', 'Stella')", "insert into Student (student_id, student_name) values ('4', 'Jonathan')", "insert into Student (student_id, student_name) values ('5', 'Will')", "DELETE FROM  Exam", "insert into Exam (exam_id, student_id, score) values ('10', '1', '70')", "insert into Exam (exam_id, student_id, score) values ('10', '2', '80')", "insert into Exam (exam_id, student_id, score) values ('10', '3', '90')", "insert into Exam (exam_id, student_id, score) values ('20', '1', '80')", "insert into Exam (exam_id, student_id, score) values ('30', '1', '70')", "insert into Exam (exam_id, student_id, score) values ('30', '3', '80')", "insert into Exam (exam_id, student_id, score) values ('30', '4', '90')", "insert into Exam (exam_id, student_id, score) values ('40', '1', '60')", "insert into Exam (exam_id, student_id, score) values ('40', '2', '70')", "insert into Exam (exam_id, student_id, score) values ('40', '4', '80')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Visits</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| user_id       | int     |\n| visit_date    | date    |\n+---------------+---------+\n(user_id, visit_date) is the primary key for this table.\nEach row of this table indicates that user_id has visited the bank in visit_date.\n</pre>\n<p> </p>\n<p>Table: <code>Transactions</code></p>\n<pre>+------------------+---------+\n| Column Name      | Type    |\n+------------------+---------+\n| user_id          | int     |\n| transaction_date | date    |\n| amount           | int     |\n+------------------+---------+\nThere is no primary key for this table, it may contain duplicates.\nEach row of this table indicates that user_id has done a transaction of amount in transaction_date.\nIt is guaranteed that the user has visited the bank in the transaction_date.(i.e The Visits table contains (user_id, transaction_date) in one row)\n</pre>\n<p> </p>\n<p>A bank wants to draw a chart of the number of transactions bank visitors did in one\n                visit to the bank and the corresponding number of visitors who have done this number\n                of transaction in one visit.</p>\n<p>Write an SQL query to find how many users visited the bank and didn't do any\n                transactions, how many visited the bank and did one transaction and so on.</p>\n<p>The result table will contain two columns:</p>\n<ul>\n<li><code>transactions_count</code> which is the number of transactions done in one\n                    visit.\n                </li>\n<li><code>visits_count</code> which is the corresponding number of users who\n                    did <code>transactions_count</code> in one visit to the bank.\n                </li>\n</ul>\n<p><code>transactions_count</code> should take all values from <code>0</code> to <code>max(transactions_count)</code>\n                done by one or more users.</p>\n<p>Order the result table by <code>transactions_count</code>.</p>\n<p>The query result format is in the following example:</p>\n<pre><code>Visits</code> table:\n+---------+------------+\n| user_id | visit_date |\n+---------+------------+\n| 1       | 2020-01-01 |\n| 2       | 2020-01-02 |\n| 12      | 2020-01-01 |\n| 19      | 2020-01-03 |\n| 1       | 2020-01-02 |\n| 2       | 2020-01-03 |\n| 1       | 2020-01-04 |\n| 7       | 2020-01-11 |\n| 9       | 2020-01-25 |\n| 8       | 2020-01-28 |\n+---------+------------+\n<code>Transactions</code> table:\n+---------+------------------+--------+\n| user_id | transaction_date | amount |\n+---------+------------------+--------+\n| 1       | 2020-01-02       | 120    |\n| 2       | 2020-01-03       | 22     |\n| 7       | 2020-01-11       | 232    |\n| 1       | 2020-01-04       | 7      |\n| 9       | 2020-01-25       | 33     |\n| 9       | 2020-01-25       | 66     |\n| 8       | 2020-01-28       | 1      |\n| 9       | 2020-01-25       | 99     |\n+---------+------------------+--------+\nResult table:\n+--------------------+--------------+\n| <code>transactions_count</code> | visits_count |\n+--------------------+--------------+\n| 0                  | 4            |\n| 1                  | 5            |\n| 2                  | 0            |\n| 3                  | 1            |\n+--------------------+--------------+\n* For transactions_count = 0, The visits (1, \"2020-01-01\"), (2, \"2020-01-02\"), (12, \"2020-01-01\") and (19, \"2020-01-03\") did no transactions so visits_count = 4.\n* For transactions_count = 1, The visits (2, \"2020-01-03\"), (7, \"2020-01-11\"), (8, \"2020-01-28\"), (1, \"2020-01-02\") and (1, \"2020-01-04\") did one transaction so visits_count = 5.\n* For transactions_count = 2, No customers visited the bank and did two transactions so visits_count = 0.\n* For transactions_count = 3, The visit (9, \"2020-01-25\") did three transactions so visits_count = 1.\n* For transactions_count &gt;= 4, No customers visited the bank and did more than three transactions so we will stop at transactions_count = 3\n\nThe chart drawn for this example is as follows:\n<img alt=\"\" src=\"https://assets.leetcode.com/uploads/2020/01/31/chart.png\" style=\"width: 600px; height: 359px;\"/>\n</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "WITH bounds AS (\n            SELECT exam_id, MIN(score) AS lo, MAX(score) AS hi FROM Exam GROUP BY exam_id\n        )\n        SELECT s.student_id, s.student_name FROM Student s\n        WHERE NOT EXISTS (\n            SELECT 1 FROM Exam e JOIN bounds b ON e.exam_id = b.exam_id\n            WHERE e.student_id = s.student_id AND (e.score = b.lo OR e.score = b.hi)\n        )\n        AND EXISTS (SELECT 1 FROM Exam e WHERE e.student_id = s.student_id)\n        ORDER BY s.student_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Student appears on a boundary only once", "hint": "Any min OR max score in any exam disqualifies the student.", "inserts": ["DELETE FROM Student", "INSERT INTO Student VALUES (1,'Quiet')", "INSERT INTO Student VALUES (2,'Noisy')", "DELETE FROM Exam", "INSERT INTO Exam VALUES (10,1,75)", "INSERT INTO Exam VALUES (10,2,75)", "INSERT INTO Exam VALUES (11,1,80)", "INSERT INTO Exam VALUES (11,2,90)"]}]}}, "hopper-company-queries-i": {"title": "Hopper Company Queries I", "schemas": ["Create table If Not Exists Drivers (driver_id int, join_date date)", "Create table If Not Exists Rides (ride_id int, user_id int, requested_at date)", "Create table If Not Exists AcceptedRides (ride_id int, driver_id int, ride_distance int, ride_duration int)", "DELETE FROM  Drivers", "insert into Drivers (driver_id, join_date) values ('10', '2019-12-10')", "insert into Drivers (driver_id, join_date) values ('8', '2020-1-13')", "insert into Drivers (driver_id, join_date) values ('5', '2020-2-16')", "insert into Drivers (driver_id, join_date) values ('7', '2020-3-8')", "insert into Drivers (driver_id, join_date) values ('4', '2020-5-17')", "insert into Drivers (driver_id, join_date) values ('1', '2020-10-24')", "insert into Drivers (driver_id, join_date) values ('6', '2021-1-5')", "DELETE FROM  Rides", "insert into Rides (ride_id, user_id, requested_at) values ('6', '75', '2019-12-9')", "insert into Rides (ride_id, user_id, requested_at) values ('1', '54', '2020-2-9')", "insert into Rides (ride_id, user_id, requested_at) values ('10', '63', '2020-3-4')", "insert into Rides (ride_id, user_id, requested_at) values ('19', '39', '2020-4-6')", "insert into Rides (ride_id, user_id, requested_at) values ('3', '41', '2020-6-3')", "insert into Rides (ride_id, user_id, requested_at) values ('13', '52', '2020-6-22')", "insert into Rides (ride_id, user_id, requested_at) values ('7', '69', '2020-7-16')", "insert into Rides (ride_id, user_id, requested_at) values ('17', '70', '2020-8-25')", "insert into Rides (ride_id, user_id, requested_at) values ('20', '81', '2020-11-2')", "insert into Rides (ride_id, user_id, requested_at) values ('5', '57', '2020-11-9')", "insert into Rides (ride_id, user_id, requested_at) values ('2', '42', '2020-12-9')", "insert into Rides (ride_id, user_id, requested_at) values ('11', '68', '2021-1-11')", "insert into Rides (ride_id, user_id, requested_at) values ('15', '32', '2021-1-17')", "insert into Rides (ride_id, user_id, requested_at) values ('12', '11', '2021-1-19')", "insert into Rides (ride_id, user_id, requested_at) values ('14', '18', '2021-1-27')", "DELETE FROM  AcceptedRides", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('10', '10', '63', '38')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('13', '10', '73', '96')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('7', '8', '100', '28')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('17', '7', '119', '68')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('20', '1', '121', '92')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('5', '7', '42', '101')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('2', '4', '6', '38')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('11', '8', '37', '43')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('15', '8', '108', '82')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('12', '8', '38', '34')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('14', '1', '90', '74')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Drivers</code></p>\n<pre>+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| driver_id   | int     |\n| join_date   | date    |\n+-------------+---------+\ndriver_id is the primary key for this table.\nEach row of this table contains the driver's ID and the date they joined the Hopper company.\n</pre>\n<p> </p>\n<p>Table: <code>Rides</code></p>\n<pre>+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| ride_id      | int     |\n| user_id      | int     |\n| requested_at | date    |\n+--------------+---------+\nride_id is the primary key for this table.\nEach row of this table contains the ID of a ride, the user's ID that requested it, and the day they requested it.\nThere may be some ride requests in this table that were not accepted.\n</pre>\n<p> </p>\n<p>Table: <code>AcceptedRides</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| ride_id       | int     |\n| driver_id     | int     |\n| ride_distance | int     |\n| ride_duration | int     |\n+---------------+---------+\nride_id is the primary key for this table.\nEach row of this table contains some information about an accepted ride.\nIt is guaranteed that each accepted ride exists in the Rides table.\n</pre>\n<p> </p>\n<p>Write an SQL query to report the following statistics for each month of\n                <strong>2020</strong>:</p>\n<ul>\n<li>The number of drivers currently with the Hopper company by the end of the month\n                    (<code>active_drivers</code>).\n                </li>\n<li>The number of accepted rides in that month (<code>accepted_rides</code>).</li>\n</ul>\n<p>Return the result table ordered by <code>month</code> in ascending order, where\n                <code>month</code> is the month's number (January is <code>1</code>, February is\n                <code>2</code>, etc.).</p>\n<p>The query result format is in the following example.</p>\n<p> </p>\n<pre>Drivers table:\n+-----------+------------+\n| driver_id | join_date  |\n+-----------+------------+\n| 10        | 2019-12-10 |\n| 8         | 2020-1-13  |\n| 5         | 2020-2-16  |\n| 7         | 2020-3-8   |\n| 4         | 2020-5-17  |\n| 1         | 2020-10-24 |\n| 6         | 2021-1-5   |\n+-----------+------------+\n\nRides table:\n+---------+---------+--------------+\n| ride_id | user_id | requested_at |\n+---------+---------+--------------+\n| 6       | 75      | 2019-12-9    |\n| 1       | 54      | 2020-2-9     |\n| 10      | 63      | 2020-3-4     |\n| 19      | 39      | 2020-4-6     |\n| 3       | 41      | 2020-6-3     |\n| 13      | 52      | 2020-6-22    |\n| 7       | 69      | 2020-7-16    |\n| 17      | 70      | 2020-8-25    |\n| 20      | 81      | 2020-11-2    |\n| 5       | 57      | 2020-11-9    |\n| 2       | 42      | 2020-12-9    |\n| 11      | 68      | 2021-1-11    |\n| 15      | 32      | 2021-1-17    |\n| 12      | 11      | 2021-1-19    |\n| 14      | 18      | 2021-1-27    |\n+---------+---------+--------------+\n\nAcceptedRides table:\n+---------+-----------+---------------+---------------+\n| ride_id | driver_id | ride_distance | ride_duration |\n+---------+-----------+---------------+---------------+\n| 10      | 10        | 63            | 38            |\n| 13      | 10        | 73            | 96            |\n| 7       | 8         | 100           | 28            |\n| 17      | 7         | 119           | 68            |\n| 20      | 1         | 121           | 92            |\n| 5       | 7         | 42            | 101           |\n| 2       | 4         | 6             | 38            |\n| 11      | 8         | 37            | 43            |\n| 15      | 8         | 108           | 82            |\n| 12      | 8         | 38            | 34            |\n| 14      | 1         | 90            | 74            |\n+---------+-----------+---------------+---------------+\n\nResult table:\n+-------+----------------+----------------+\n| month | active_drivers | accepted_rides |\n+-------+----------------+----------------+\n| 1     | 2              | 0              |\n| 2     | 3              | 0              |\n| 3     | 4              | 1              |\n| 4     | 4              | 0              |\n| 5     | 5              | 0              |\n| 6     | 5              | 1              |\n| 7     | 5              | 1              |\n| 8     | 5              | 1              |\n| 9     | 5              | 0              |\n| 10    | 6              | 0              |\n| 11    | 6              | 2              |\n| 12    | 6              | 1              |\n+-------+----------------+----------------+\n\nBy the end of January --&gt; two active drivers (10, 8) and no accepted rides.\nBy the end of February --&gt; three active drivers (10, 8, 5) and no accepted rides.\nBy the end of March --&gt; four active drivers (10, 8, 5, 7) and one accepted ride (10).\nBy the end of April --&gt; four active drivers (10, 8, 5, 7) and no accepted rides.\nBy the end of May --&gt; five active drivers (10, 8, 5, 7, 4) and no accepted rides.\nBy the end of June --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride (13).\nBy the end of July --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride (7).\nBy the end of August --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride (17).\nBy the end of Septemeber --&gt; five active drivers (10, 8, 5, 7, 4) and no accepted rides.\nBy the end of October --&gt; six active drivers (10, 8, 5, 7, 4, 1) and no accepted rides.\nBy the end of November --&gt; six active drivers (10, 8, 5, 7, 4, 1) and two accepted rides (20, 5).\nBy the end of December --&gt; six active drivers (10, 8, 5, 7, 4, 1) and one accepted ride (2).\n</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "WITH months(m) AS (\n            SELECT 1 UNION ALL SELECT m+1 FROM months WHERE m < 12\n        )\n        SELECT m.m AS month,\n            (SELECT COUNT(DISTINCT d.driver_id) FROM Drivers d\n             WHERE strftime('%Y', d.join_date) < '2020' OR (strftime('%Y', d.join_date) = '2020' AND CAST(strftime('%m', d.join_date) AS INT) <= m.m)\n            ) AS active_drivers,\n            (SELECT COUNT(*) FROM AcceptedRides ar JOIN Rides r ON ar.ride_id = r.ride_id\n             WHERE strftime('%Y', r.requested_at) = '2020' AND CAST(strftime('%m', r.requested_at) AS INT) = m.m\n            ) AS accepted_rides\n        FROM months m ORDER BY m.m", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Month with zero rides", "hint": "Every month 1-12 must appear — use a 12-row CTE join, not just months that have rides.", "inserts": ["DELETE FROM Rides", "DELETE FROM AcceptedRides"]}]}}, "hopper-company-queries-ii": {"title": "Hopper Company Queries II", "schemas": ["Create table If Not Exists Drivers (driver_id int, join_date date)", "Create table If Not Exists Rides (ride_id int, user_id int, requested_at date)", "Create table If Not Exists AcceptedRides (ride_id int, driver_id int, ride_distance int, ride_duration int)", "DELETE FROM  Drivers", "insert into Drivers (driver_id, join_date) values ('10', '2019-12-10')", "insert into Drivers (driver_id, join_date) values ('8', '2020-1-13')", "insert into Drivers (driver_id, join_date) values ('5', '2020-2-16')", "insert into Drivers (driver_id, join_date) values ('7', '2020-3-8')", "insert into Drivers (driver_id, join_date) values ('4', '2020-5-17')", "insert into Drivers (driver_id, join_date) values ('1', '2020-10-24')", "insert into Drivers (driver_id, join_date) values ('6', '2021-1-5')", "DELETE FROM  Rides", "insert into Rides (ride_id, user_id, requested_at) values ('6', '75', '2019-12-9')", "insert into Rides (ride_id, user_id, requested_at) values ('1', '54', '2020-2-9')", "insert into Rides (ride_id, user_id, requested_at) values ('10', '63', '2020-3-4')", "insert into Rides (ride_id, user_id, requested_at) values ('19', '39', '2020-4-6')", "insert into Rides (ride_id, user_id, requested_at) values ('3', '41', '2020-6-3')", "insert into Rides (ride_id, user_id, requested_at) values ('13', '52', '2020-6-22')", "insert into Rides (ride_id, user_id, requested_at) values ('7', '69', '2020-7-16')", "insert into Rides (ride_id, user_id, requested_at) values ('17', '70', '2020-8-25')", "insert into Rides (ride_id, user_id, requested_at) values ('20', '81', '2020-11-2')", "insert into Rides (ride_id, user_id, requested_at) values ('5', '57', '2020-11-9')", "insert into Rides (ride_id, user_id, requested_at) values ('2', '42', '2020-12-9')", "insert into Rides (ride_id, user_id, requested_at) values ('11', '68', '2021-1-11')", "insert into Rides (ride_id, user_id, requested_at) values ('15', '32', '2021-1-17')", "insert into Rides (ride_id, user_id, requested_at) values ('12', '11', '2021-1-19')", "insert into Rides (ride_id, user_id, requested_at) values ('14', '18', '2021-1-27')", "DELETE FROM  AcceptedRides", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('10', '10', '63', '38')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('13', '10', '73', '96')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('7', '8', '100', '28')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('17', '7', '119', '68')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('20', '1', '121', '92')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('5', '7', '42', '101')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('2', '4', '6', '38')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('11', '8', '37', '43')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('15', '8', '108', '82')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('12', '8', '38', '34')", "insert into AcceptedRides (ride_id, driver_id, ride_distance, ride_duration) values ('14', '1', '90', '74')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Drivers</code></p>\n<pre>+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| driver_id   | int     |\n| join_date   | date    |\n+-------------+---------+\ndriver_id is the primary key for this table.\nEach row of this table contains the driver's ID and the date they joined the Hopper company.\n</pre>\n<p> </p>\n<p>Table: <code>Rides</code></p>\n<pre>+--------------+---------+\n| Column Name  | Type    |\n+--------------+---------+\n| ride_id      | int     |\n| user_id      | int     |\n| requested_at | date    |\n+--------------+---------+\nride_id is the primary key for this table.\nEach row of this table contains the ID of a ride, the user's ID that requested it, and the day they requested it.\nThere may be some ride requests in this table that were not accepted.\n</pre>\n<p> </p>\n<p>Table: <code>AcceptedRides</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| ride_id       | int     |\n| driver_id     | int     |\n| ride_distance | int     |\n| ride_duration | int     |\n+---------------+---------+\nride_id is the primary key for this table.\nEach row of this table contains some information about an accepted ride.\nIt is guaranteed that each accepted ride exists in the Rides table.\n</pre>\n<p> </p>\n<p>Write an SQL query to report the <strong>percentage</strong> of working drivers\n                (<code>working_percentage</code>) for each month of <strong>2020</strong> where:</p>\n<img alt=\"\" src=\"https://assets.leetcode.com/uploads/2020/10/31/codecogseqn.png\" style=\"width: 970px; height: 44px;\"/>\n<p><strong>Note</strong> that if the number of available drivers during a month is zero,\n                we consider the <code>working_percentage</code> to be <code>0</code>.</p>\n<p>Return the result table ordered by <code>month</code> in <strong>ascending</strong>\n                order, where <code>month</code> is the month's number (January is <code>1</code>,\n                February is <code>2</code>, etc.). Round <code>working_percentage</code> to the\n                nearest <strong>2 decimal places</strong>.</p>\n<p>The query result format is in the following example.</p>\n<p> </p>\n<pre>Drivers table:\n+-----------+------------+\n| driver_id | join_date  |\n+-----------+------------+\n| 10        | 2019-12-10 |\n| 8         | 2020-1-13  |\n| 5         | 2020-2-16  |\n| 7         | 2020-3-8   |\n| 4         | 2020-5-17  |\n| 1         | 2020-10-24 |\n| 6         | 2021-1-5   |\n+-----------+------------+\n\nRides table:\n+---------+---------+--------------+\n| ride_id | user_id | requested_at |\n+---------+---------+--------------+\n| 6       | 75      | 2019-12-9    |\n| 1       | 54      | 2020-2-9     |\n| 10      | 63      | 2020-3-4     |\n| 19      | 39      | 2020-4-6     |\n| 3       | 41      | 2020-6-3     |\n| 13      | 52      | 2020-6-22    |\n| 7       | 69      | 2020-7-16    |\n| 17      | 70      | 2020-8-25    |\n| 20      | 81      | 2020-11-2    |\n| 5       | 57      | 2020-11-9    |\n| 2       | 42      | 2020-12-9    |\n| 11      | 68      | 2021-1-11    |\n| 15      | 32      | 2021-1-17    |\n| 12      | 11      | 2021-1-19    |\n| 14      | 18      | 2021-1-27    |\n+---------+---------+--------------+\n\nAcceptedRides table:\n+---------+-----------+---------------+---------------+\n| ride_id | driver_id | ride_distance | ride_duration |\n+---------+-----------+---------------+---------------+\n| 10      | 10        | 63            | 38            |\n| 13      | 10        | 73            | 96            |\n| 7       | 8         | 100           | 28            |\n| 17      | 7         | 119           | 68            |\n| 20      | 1         | 121           | 92            |\n| 5       | 7         | 42            | 101           |\n| 2       | 4         | 6             | 38            |\n| 11      | 8         | 37            | 43            |\n| 15      | 8         | 108           | 82            |\n| 12      | 8         | 38            | 34            |\n| 14      | 1         | 90            | 74            |\n+---------+-----------+---------------+---------------+\n\nResult table:\n+-------+--------------------+\n| month | working_percentage |\n+-------+--------------------+\n| 1     | 0.00               |\n| 2     | 0.00               |\n| 3     | 25.00              |\n| 4     | 0.00               |\n| 5     | 0.00               |\n| 6     | 20.00              |\n| 7     | 20.00              |\n| 8     | 20.00              |\n| 9     | 0.00               |\n| 10    | 0.00               |\n| 11    | 33.33              |\n| 12    | 16.67              |\n+-------+--------------------+\n\nBy the end of January --&gt; two active drivers (10, 8) and no accepted rides. The percentage is 0%.\nBy the end of February --&gt; three active drivers (10, 8, 5) and no accepted rides. The percentage is 0%.\nBy the end of March --&gt; four active drivers (10, 8, 5, 7) and one accepted ride by driver (10). The percentage is (1 / 4) * 100 = 25%.\nBy the end of April --&gt; four active drivers (10, 8, 5, 7) and no accepted rides. The percentage is 0%.\nBy the end of May --&gt; five active drivers (10, 8, 5, 7, 4) and no accepted rides. The percentage is 0%.\nBy the end of June --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride by driver (10). The percentage is (1 / 5) * 100 = 20%.\nBy the end of July --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride by driver (8). The percentage is (1 / 5) * 100 = 20%.\nBy the end of August --&gt; five active drivers (10, 8, 5, 7, 4) and one accepted ride by driver (7). The percentage is (1 / 5) * 100 = 20%.\nBy the end of Septemeber --&gt; five active drivers (10, 8, 5, 7, 4) and no accepted rides. The percentage is 0%.\nBy the end of October --&gt; six active drivers (10, 8, 5, 7, 4, 1) and no accepted rides. The percentage is 0%.\nBy the end of November --&gt; six active drivers (10, 8, 5, 7, 4, 1) and two accepted rides by <strong>two different</strong> drivers (1, 7). The percentage is (2 / 6) * 100 = 33.33%.\nBy the end of December --&gt; six active drivers (10, 8, 5, 7, 4, 1) and one accepted ride by driver (4). The percentage is (1 / 6) * 100 = 16.67%.\n</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "WITH months(m) AS (\n            SELECT 1 UNION ALL SELECT m+1 FROM months WHERE m < 12\n        ),\n        active AS (\n            SELECT m.m,\n                (SELECT COUNT(DISTINCT d.driver_id) FROM Drivers d\n                 WHERE strftime('%Y', d.join_date) < '2020' OR (strftime('%Y', d.join_date) = '2020' AND CAST(strftime('%m', d.join_date) AS INT) <= m.m)\n                ) AS a\n            FROM months m\n        ),\n        with_rides AS (\n            SELECT m.m, COUNT(DISTINCT ar.driver_id) AS d FROM months m\n            LEFT JOIN Rides r ON strftime('%Y', r.requested_at) = '2020' AND CAST(strftime('%m', r.requested_at) AS INT) = m.m\n            LEFT JOIN AcceptedRides ar ON ar.ride_id = r.ride_id\n            GROUP BY m.m\n        )\n        SELECT a.m AS month, CASE WHEN a.a = 0 THEN 0.00 ELSE ROUND(100.0 * w.d / a.a, 2) END AS working_percentage\n        FROM active a JOIN with_rides w ON a.m = w.m ORDER BY a.m", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Division by zero guard", "hint": "If active_drivers=0 in some month, working_percentage must be 0 (not NULL/error).", "inserts": ["DELETE FROM Drivers", "DELETE FROM Rides", "DELETE FROM AcceptedRides"]}]}}, "product-sales-analysis-iii": {"title": "Product Sales Analysis III", "schemas": ["Create table If Not Exists Sales (sale_id int, product_id int, year int, quantity int, price int)", "DELETE FROM  Sales", "insert into Sales (sale_id, product_id, year, quantity, price) values ('1', '100', '2008', '10', '5000')", "insert into Sales (sale_id, product_id, year, quantity, price) values ('2', '100', '2009', '12', '5000')", "insert into Sales (sale_id, product_id, year, quantity, price) values ('7', '200', '2011', '15', '9000')"], "content": "<p>Table: <code>Sales</code></p>\n\n<pre>\n+-------------+-------+\n| Column Name | Type  |\n+-------------+-------+\n| sale_id     | int   |\n| product_id  | int   |\n| year        | int   |\n| quantity    | int   |\n| price       | int   |\n+-------------+-------+\n(sale_id, year) is the primary key (combination of columns with unique values) of this table.\nEach row records a sale of a product in a given year.\nA product may have multiple sales entries in the same year.\nNote that the per-unit price.\n\n</pre>\n\n<p>Write a solution to find all sales that occurred in the <strong data-end=\"967\" data-start=\"953\">first year</strong> each product was sold.</p>\n\n<ul data-end=\"1234\" data-start=\"992\">\n\t<li data-end=\"1078\" data-start=\"992\">\n\t<p data-end=\"1078\" data-start=\"994\">For each <code data-end=\"1015\" data-start=\"1003\">product_id</code>, identify the earliest <code data-end=\"1045\" data-start=\"1039\">year</code> it appears in the <code data-end=\"1071\" data-start=\"1064\">Sales</code> table.</p>\n\t</li>\n\t<li data-end=\"1140\" data-start=\"1079\">\n\t<p data-end=\"1140\" data-start=\"1081\">Return <strong data-end=\"1095\" data-start=\"1088\">all</strong> sales entries for that product in that year.</p>\n\t</li>\n</ul>\n\n<p data-end=\"1234\" data-start=\"1143\">Return a table with the following columns: <strong>product_id</strong>,<strong> first_year</strong>, <strong>quantity, </strong>and<strong> price</strong>.<br />\nReturn the result in any order.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nSales table:\n+---------+------------+------+----------+-------+\n| sale_id | product_id | year | quantity | price |\n+---------+------------+------+----------+-------+ \n| 1       | 100        | 2008 | 10       | 5000  |\n| 2       | 100        | 2009 | 12       | 5000  |\n| 7       | 200        | 2011 | 15       | 9000  |\n+---------+------------+------+----------+-------+\n\n<strong>Output:</strong> \n+------------+------------+----------+-------+\n| product_id | first_year | quantity | price |\n+------------+------------+----------+-------+ \n| 100        | 2008       | 10       | 5000  |\n| 200        | 2011       | 15       | 9000  |\n+------------+------------+----------+-------+\n</pre>", "shadow": {"gold": "WITH firsts AS (SELECT product_id, MIN(year) AS first_year FROM Sales GROUP BY product_id)\n        SELECT s.product_id, s.year AS first_year, s.quantity, s.price\n        FROM Sales s JOIN firsts f ON s.product_id = f.product_id AND s.year = f.first_year\n        ORDER BY s.product_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Product with multiple sales in first year", "hint": "Return all rows whose year equals the product's first year — not just one.", "inserts": ["DELETE FROM Sales", "INSERT INTO Sales VALUES (1,500,2020,3,100)", "INSERT INTO Sales VALUES (2,500,2020,5,120)", "INSERT INTO Sales VALUES (3,500,2021,7,140)"]}]}}, "rearrange-products-table": {"title": "Rearrange Products Table", "schemas": ["Create table If Not Exists Products (product_id int, store1 int, store2 int, store3 int)", "DELETE FROM  Products", "insert into Products (product_id, store1, store2, store3) values ('0', '95', '100', '105')", "insert into Products (product_id, store1, store2, store3) values ('1', '70', NULL, '80')"], "content": "<p>Table: <code>Products</code></p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| product_id  | int     |\n| store1      | int     |\n| store2      | int     |\n| store3      | int     |\n+-------------+---------+\nproduct_id is the primary key (column with unique values) for this table.\nEach row in this table indicates the product&#39;s price in 3 different stores: store1, store2, and store3.\nIf the product is not available in a store, the price will be null in that store&#39;s column.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to rearrange the <code>Products</code> table so that each row has <code>(product_id, store, price)</code>. If a product is not available in a store, do <strong>not</strong> include a row with that <code>product_id</code> and <code>store</code> combination in the result table.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nProducts table:\n+------------+--------+--------+--------+\n| product_id | store1 | store2 | store3 |\n+------------+--------+--------+--------+\n| 0          | 95     | 100    | 105    |\n| 1          | 70     | null   | 80     |\n+------------+--------+--------+--------+\n<strong>Output:</strong> \n+------------+--------+-------+\n| product_id | store  | price |\n+------------+--------+-------+\n| 0          | store1 | 95    |\n| 0          | store2 | 100   |\n| 0          | store3 | 105   |\n| 1          | store1 | 70    |\n| 1          | store3 | 80    |\n+------------+--------+-------+\n<strong>Explanation:</strong> \nProduct 0 is available in all three stores with prices 95, 100, and 105 respectively.\nProduct 1 is available in store1 with price 70 and store3 with price 80. The product is not available in store2.\n</pre>", "shadow": {"gold": "SELECT product_id, 'store1' AS store, store1 AS price FROM Products WHERE store1 IS NOT NULL\n        UNION ALL\n        SELECT product_id, 'store2', store2 FROM Products WHERE store2 IS NOT NULL\n        UNION ALL\n        SELECT product_id, 'store3', store3 FROM Products WHERE store3 IS NOT NULL\n        ORDER BY product_id, store", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Product sold only in store2", "inserts": ["INSERT INTO Products VALUES (99,NULL,777,NULL)"], "hint": "NULL prices must be excluded — use WHERE IS NOT NULL, don't emit rows with NULL price."}]}}, "students-report-by-geography": {"title": "Students Report By Geography", "schemas": ["Create table If Not Exists Student (name varchar(50), continent varchar(7))", "DELETE FROM  Student", "insert into Student (name, continent) values ('Jane', 'America')", "insert into Student (name, continent) values ('Pascal', 'Europe')", "insert into Student (name, continent) values ('Xi', 'Asia')", "insert into Student (name, continent) values ('Jack', 'America')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n\n    A U.S graduate school has students from Asia, Europe and America. The students' location\n    information are stored in table <code>student</code> as below.\n    <p> </p>\n<pre>\n| name   | continent |\n|--------|-----------|\n| Jack   | America   |\n| Pascal | Europe    |\n| Xi     | Asia      |\n| Jane   | America   |\n</pre>\n<p> </p>\n<a href=\"https://en.wikipedia.org/wiki/Pivot_table\"> Pivot</a> the continent column in this\n    table so that each name is sorted alphabetically and displayed underneath its corresponding\n    continent. The output headers should be America, Asia and Europe respectively. It is guaranteed\n    that the student number from America is no less than either Asia or Europe.\n\n    <p> </p>\n    For the sample input, the output is:\n\n    <p> </p>\n<pre>\n| America | Asia | Europe |\n|---------|------|--------|\n| Jack    | Xi   | Pascal |\n| Jane    |      |        |\n</pre>\n<p> </p>\n<b>Follow-up:</b> If it is unknown which continent has the most students, can you write a query\n    to generate the student report?\n\n    <p> </p>\n\n</div>", "shadow": {"gold": "WITH nums AS (\n            SELECT name, continent, ROW_NUMBER() OVER (PARTITION BY continent ORDER BY name) AS rn FROM Student\n        )\n        SELECT MAX(CASE WHEN continent='America' THEN name END) AS America,\n               MAX(CASE WHEN continent='Asia' THEN name END) AS Asia,\n               MAX(CASE WHEN continent='Europe' THEN name END) AS Europe\n        FROM nums GROUP BY rn ORDER BY rn", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Asymmetric continent counts", "hint": "Output rows = max count across continents. Missing cells are NULL.", "inserts": ["DELETE FROM Student", "INSERT INTO Student VALUES ('Alice','America')", "INSERT INTO Student VALUES ('Bob','America')", "INSERT INTO Student VALUES ('Chen','Asia')"]}]}}, "monthly-transactions-i": {"title": "Monthly Transactions I", "schemas": ["Create table If Not Exists Transactions (id int, country varchar(4), state VARCHAR(20), amount int, trans_date date)", "DELETE FROM  Transactions", "insert into Transactions (id, country, state, amount, trans_date) values ('121', 'US', 'approved', '1000', '2018-12-18')", "insert into Transactions (id, country, state, amount, trans_date) values ('122', 'US', 'declined', '2000', '2018-12-19')", "insert into Transactions (id, country, state, amount, trans_date) values ('123', 'US', 'approved', '2000', '2019-01-01')", "insert into Transactions (id, country, state, amount, trans_date) values ('124', 'DE', 'approved', '2000', '2019-01-07')"], "content": "<p>Table: <code>Transactions</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| id            | int     |\n| country       | varchar |\n| state         | enum    |\n| amount        | int     |\n| trans_date    | date    |\n+---------------+---------+\nid is the primary key of this table.\nThe table has information about incoming transactions.\nThe state column is an enum of type [&quot;approved&quot;, &quot;declined&quot;].\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write an SQL query to find for each month and country, the number of transactions and their total amount, the number of approved transactions and their total amount.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The query result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nTransactions table:\n+------+---------+----------+--------+------------+\n| id   | country | state    | amount | trans_date |\n+------+---------+----------+--------+------------+\n| 121  | US      | approved | 1000   | 2018-12-18 |\n| 122  | US      | declined | 2000   | 2018-12-19 |\n| 123  | US      | approved | 2000   | 2019-01-01 |\n| 124  | DE      | approved | 2000   | 2019-01-07 |\n+------+---------+----------+--------+------------+\n<strong>Output:</strong> \n+----------+---------+-------------+----------------+--------------------+-----------------------+\n| month    | country | trans_count | approved_count | trans_total_amount | approved_total_amount |\n+----------+---------+-------------+----------------+--------------------+-----------------------+\n| 2018-12  | US      | 2           | 1              | 3000               | 1000                  |\n| 2019-01  | US      | 1           | 1              | 2000               | 2000                  |\n| 2019-01  | DE      | 1           | 1              | 2000               | 2000                  |\n+----------+---------+-------------+----------------+--------------------+-----------------------+\n</pre>", "shadow": {"gold": "SELECT strftime('%Y-%m', trans_date) AS month, country, COUNT(*) AS trans_count,\n            SUM(CASE WHEN state='approved' THEN 1 ELSE 0 END) AS approved_count,\n            SUM(amount) AS trans_total_amount,\n            SUM(CASE WHEN state='approved' THEN amount ELSE 0 END) AS approved_total_amount\n        FROM Transactions GROUP BY strftime('%Y-%m', trans_date), country ORDER BY month, country", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "All declined month", "hint": "approved_count and approved_total_amount must be 0 when none approved.", "inserts": ["DELETE FROM Transactions", "INSERT INTO Transactions VALUES (1,'FR','declined',500,'2020-02-01')", "INSERT INTO Transactions VALUES (2,'FR','declined',700,'2020-02-15')"]}]}}, "restaurant-growth": {"title": "Restaurant Growth", "schemas": ["Create table If Not Exists Customer (customer_id int, name varchar(20), visited_on date, amount int)", "DELETE FROM  Customer", "insert into Customer (customer_id, name, visited_on, amount) values ('1', 'Jhon', '2019-01-01', '100')", "insert into Customer (customer_id, name, visited_on, amount) values ('2', 'Daniel', '2019-01-02', '110')", "insert into Customer (customer_id, name, visited_on, amount) values ('3', 'Jade', '2019-01-03', '120')", "insert into Customer (customer_id, name, visited_on, amount) values ('4', 'Khaled', '2019-01-04', '130')", "insert into Customer (customer_id, name, visited_on, amount) values ('5', 'Winston', '2019-01-05', '110')", "insert into Customer (customer_id, name, visited_on, amount) values ('6', 'Elvis', '2019-01-06', '140')", "insert into Customer (customer_id, name, visited_on, amount) values ('7', 'Anna', '2019-01-07', '150')", "insert into Customer (customer_id, name, visited_on, amount) values ('8', 'Maria', '2019-01-08', '80')", "insert into Customer (customer_id, name, visited_on, amount) values ('9', 'Jaze', '2019-01-09', '110')", "insert into Customer (customer_id, name, visited_on, amount) values ('1', 'Jhon', '2019-01-10', '130')", "insert into Customer (customer_id, name, visited_on, amount) values ('3', 'Jade', '2019-01-10', '150')"], "content": "<p>Table: <code>Customer</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| customer_id   | int     |\n| name          | varchar |\n| visited_on    | date    |\n| amount        | int     |\n+---------------+---------+\nIn SQL,(customer_id, visited_on) is the primary key for this table.\nThis table contains data about customer transactions in a restaurant.\nvisited_on is the date on which the customer with ID (customer_id) has visited the restaurant.\namount is the total paid by a customer.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>You are the restaurant owner and you want to analyze a possible expansion (there will be at least one customer every day).</p>\n\n<p>Compute the moving average of how much the customer paid in a seven days window (i.e., current day + 6 days before). <code>average_amount</code> should be <strong>rounded to two decimal places</strong>.</p>\n\n<p>Return the result table ordered by <code>visited_on</code> <strong>in ascending order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nCustomer table:\n+-------------+--------------+--------------+-------------+\n| customer_id | name         | visited_on   | amount      |\n+-------------+--------------+--------------+-------------+\n| 1           | Jhon         | 2019-01-01   | 100         |\n| 2           | Daniel       | 2019-01-02   | 110         |\n| 3           | Jade         | 2019-01-03   | 120         |\n| 4           | Khaled       | 2019-01-04   | 130         |\n| 5           | Winston      | 2019-01-05   | 110         | \n| 6           | Elvis        | 2019-01-06   | 140         | \n| 7           | Anna         | 2019-01-07   | 150         |\n| 8           | Maria        | 2019-01-08   | 80          |\n| 9           | Jaze         | 2019-01-09   | 110         | \n| 1           | Jhon         | 2019-01-10   | 130         | \n| 3           | Jade         | 2019-01-10   | 150         | \n+-------------+--------------+--------------+-------------+\n<strong>Output:</strong> \n+--------------+--------------+----------------+\n| visited_on   | amount       | average_amount |\n+--------------+--------------+----------------+\n| 2019-01-07   | 860          | 122.86         |\n| 2019-01-08   | 840          | 120            |\n| 2019-01-09   | 840          | 120            |\n| 2019-01-10   | 1000         | 142.86         |\n+--------------+--------------+----------------+\n<strong>Explanation:</strong> \n1st moving average from 2019-01-01 to 2019-01-07 has an average_amount of (100 + 110 + 120 + 130 + 110 + 140 + 150)/7 = 122.86\n2nd moving average from 2019-01-02 to 2019-01-08 has an average_amount of (110 + 120 + 130 + 110 + 140 + 150 + 80)/7 = 120\n3rd moving average from 2019-01-03 to 2019-01-09 has an average_amount of (120 + 130 + 110 + 140 + 150 + 80 + 110)/7 = 120\n4th moving average from 2019-01-04 to 2019-01-10 has an average_amount of (130 + 110 + 140 + 150 + 80 + 110 + 130 + 150)/7 = 142.86\n</pre>", "shadow": {"gold": "WITH daily AS (SELECT visited_on AS d, SUM(amount) AS tot FROM Customer GROUP BY visited_on),\n        wind AS (\n            SELECT d,\n                   SUM(tot) OVER (ORDER BY d ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) AS amount,\n                   AVG(1.0*tot) OVER (ORDER BY d ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) AS average_amount,\n                   ROW_NUMBER() OVER (ORDER BY d) AS rn\n            FROM daily\n        )\n        SELECT d AS visited_on, amount, ROUND(average_amount, 2) AS average_amount FROM wind WHERE rn >= 7 ORDER BY d", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Fewer than 7 days — no rows", "hint": "Output only begins on day 7 of the window.", "inserts": ["DELETE FROM Customer", "INSERT INTO Customer VALUES (1,'a','2023-01-01',100)", "INSERT INTO Customer VALUES (2,'b','2023-01-02',100)", "INSERT INTO Customer VALUES (3,'c','2023-01-03',100)"]}]}}, "group-sold-products-by-the-date": {"title": "Group Sold Products By The Date", "schemas": ["Create table If Not Exists Activities (sell_date date, product varchar(20))", "DELETE FROM  Activities", "insert into Activities (sell_date, product) values ('2020-05-30', 'Headphone')", "insert into Activities (sell_date, product) values ('2020-06-01', 'Pencil')", "insert into Activities (sell_date, product) values ('2020-06-02', 'Mask')", "insert into Activities (sell_date, product) values ('2020-05-30', 'Basketball')", "insert into Activities (sell_date, product) values ('2020-06-01', 'Bible')", "insert into Activities (sell_date, product) values ('2020-06-02', 'Mask')", "insert into Activities (sell_date, product) values ('2020-05-30', 'T-Shirt')"], "content": "<p>Table <code>Activities</code>:</p>\n\n<pre>\n+-------------+---------+\n| Column Name | Type    |\n+-------------+---------+\n| sell_date   | date    |\n| product     | varchar |\n+-------------+---------+\nThere is no primary key (column with unique values) for this table. It may contain duplicates.\nEach row of this table contains the product name and the date it was sold in a market.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find for each date the number of different products sold and their names.</p>\n\n<p>The sold products names for each date should be sorted lexicographically.</p>\n\n<p>Return the result table ordered by <code>sell_date</code>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nActivities table:\n+------------+------------+\n| sell_date  | product     |\n+------------+------------+\n| 2020-05-30 | Headphone  |\n| 2020-06-01 | Pencil     |\n| 2020-06-02 | Mask       |\n| 2020-05-30 | Basketball |\n| 2020-06-01 | Bible      |\n| 2020-06-02 | Mask       |\n| 2020-05-30 | T-Shirt    |\n+------------+------------+\n<strong>Output:</strong> \n+------------+----------+------------------------------+\n| sell_date  | num_sold | products                     |\n+------------+----------+------------------------------+\n| 2020-05-30 | 3        | Basketball,Headphone,T-shirt |\n| 2020-06-01 | 2        | Bible,Pencil                 |\n| 2020-06-02 | 1        | Mask                         |\n+------------+----------+------------------------------+\n<strong>Explanation:</strong> \nFor 2020-05-30, Sold items were (Headphone, Basketball, T-shirt), we sort them lexicographically and separate them by a comma.\nFor 2020-06-01, Sold items were (Pencil, Bible), we sort them lexicographically and separate them by a comma.\nFor 2020-06-02, the Sold item is (Mask), we just return it.\n</pre>", "shadow": {"gold": "SELECT sell_date, COUNT(DISTINCT product) AS num_sold,\n            GROUP_CONCAT(DISTINCT product) AS products\n        FROM (SELECT DISTINCT sell_date, product FROM Activities ORDER BY product) x\n        GROUP BY sell_date ORDER BY sell_date", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Duplicate products same day", "hint": "COUNT DISTINCT and GROUP_CONCAT DISTINCT — duplicates must not appear twice.", "inserts": ["DELETE FROM Activities", "INSERT INTO Activities VALUES ('2024-01-01','Apple')", "INSERT INTO Activities VALUES ('2024-01-01','Apple')", "INSERT INTO Activities VALUES ('2024-01-01','Banana')"]}]}}, "invalid-tweets": {"title": "Invalid Tweets", "schemas": ["Create table If Not Exists Tweets(tweet_id int, content varchar(50))", "DELETE FROM  Tweets", "insert into Tweets (tweet_id, content) values ('1', 'Let us Code')", "insert into Tweets (tweet_id, content) values ('2', 'More than fifteen chars are here!')"], "content": "<p>Table: <code>Tweets</code></p>\n\n<pre>\n+----------------+---------+\n| Column Name    | Type    |\n+----------------+---------+\n| tweet_id       | int     |\n| content        | varchar |\n+----------------+---------+\ntweet_id is the primary key (column with unique values) for this table.\ncontent consists of alphanumeric characters, &#39;!&#39;, or &#39; &#39; and no other special characters.\nThis table contains all the tweets in a social media app.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the IDs of the invalid tweets. The tweet is invalid if the number of characters used in the content of the tweet is <strong>strictly greater</strong> than <code>15</code>.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nTweets table:\n+----------+-----------------------------------+\n| tweet_id | content                           |\n+----------+-----------------------------------+\n| 1        | Let us Code                       |\n| 2        | More than fifteen chars are here! |\n+----------+-----------------------------------+\n<strong>Output:</strong> \n+----------+\n| tweet_id |\n+----------+\n| 2        |\n+----------+\n<strong>Explanation:</strong> \nTweet 1 has length = 11. It is a valid tweet.\nTweet 2 has length = 33. It is an invalid tweet.\n</pre>", "shadow": {"gold": "SELECT tweet_id FROM Tweets WHERE LENGTH(content) > 15 ORDER BY tweet_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Boundary — exactly 15 chars must NOT be returned", "inserts": ["INSERT INTO Tweets VALUES (999,'123456789012345')"], "hint": "Use LENGTH(content) > 15, not >=."}]}}, "strong-friendship": {"title": "Strong Friendship", "schemas": ["Create table If Not Exists Friendship (user1_id int, user2_id int)", "DELETE FROM  Friendship", "insert into Friendship (user1_id, user2_id) values ('1', '2')", "insert into Friendship (user1_id, user2_id) values ('1', '3')", "insert into Friendship (user1_id, user2_id) values ('2', '3')", "insert into Friendship (user1_id, user2_id) values ('1', '4')", "insert into Friendship (user1_id, user2_id) values ('2', '4')", "insert into Friendship (user1_id, user2_id) values ('1', '5')", "insert into Friendship (user1_id, user2_id) values ('2', '5')", "insert into Friendship (user1_id, user2_id) values ('1', '7')", "insert into Friendship (user1_id, user2_id) values ('3', '7')", "insert into Friendship (user1_id, user2_id) values ('1', '6')", "insert into Friendship (user1_id, user2_id) values ('3', '6')", "insert into Friendship (user1_id, user2_id) values ('2', '6')"], "content": "<p>Table: <code>Friendship(user1_id, user2_id)</code> — one row per friendship, with <code>user1_id &lt; user2_id</code>.</p>\n<p>A friendship is <strong>strong</strong> if the two people share at least <strong>3 common friends</strong> (mutual friendships).</p>\n<p>Return every strong friendship with its common-friend count.</p>\n<p>Output columns: <code>user1_id</code>, <code>user2_id</code>, <code>common_friend</code>. Order by <code>user1_id, user2_id</code>.</p>\n<h4>Sample</h4>\n<p>Users 1 and 2 are both friends with users 3, 4, 5, and 6 → 4 common friends → strong friendship.</p>", "shadow": {"gold": "WITH f AS (\n            SELECT user1_id AS u, user2_id AS v FROM Friendship\n            UNION\n            SELECT user2_id, user1_id FROM Friendship\n        )\n        SELECT fr.user1_id, fr.user2_id, COUNT(*) AS common_friend\n        FROM Friendship fr\n        JOIN f a ON a.u = fr.user1_id\n        JOIN f b ON b.u = fr.user2_id AND a.v = b.v\n        GROUP BY fr.user1_id, fr.user2_id\n        HAVING COUNT(*) >= 3\n        ORDER BY fr.user1_id, fr.user2_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Exactly 2 common friends — not strong", "hint": "Threshold is ≥3 common friends. 2 must be excluded.", "inserts": ["DELETE FROM Friendship", "INSERT INTO Friendship VALUES (1,2)", "INSERT INTO Friendship VALUES (1,3)", "INSERT INTO Friendship VALUES (2,3)", "INSERT INTO Friendship VALUES (1,4)", "INSERT INTO Friendship VALUES (2,4)"]}]}}, "leetcodify-friends-recommendations": {"title": "Leetcodify Friends Recommendations", "schemas": ["Create table If Not Exists Listens (user_id int, song_id int, day date)", "Create table If Not Exists Friendship (user1_id int, user2_id int)", "DELETE FROM  Listens", "insert into Listens (user_id, song_id, day) values ('1', '10', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('1', '11', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('1', '12', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('2', '10', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('2', '11', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('2', '12', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('3', '10', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('3', '11', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('3', '12', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('4', '10', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('4', '11', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('4', '13', '2021-03-15')", "insert into Listens (user_id, song_id, day) values ('5', '10', '2021-03-16')", "insert into Listens (user_id, song_id, day) values ('5', '11', '2021-03-16')", "insert into Listens (user_id, song_id, day) values ('5', '12', '2021-03-16')", "DELETE FROM  Friendship", "insert into Friendship (user1_id, user2_id) values ('1', '2')"], "content": "<p>Tables: <code>Listens(user_id, song_id, day)</code> and <code>Friendship(user1_id, user2_id)</code>.</p>\n<p>Two users become <strong>friend-recommendation candidates</strong> for each other if, on the <strong>same day</strong>, they listen to at least <strong>3 distinct songs in common</strong>, and they are <strong>not already friends</strong>.</p>\n<p>Return each recommendation in both directions (u → v and v → u) as <code>(user_id, recommended_id)</code>, deduplicated. Order by <code>user_id, recommended_id</code>.</p>\n<h4>Sample</h4>\n<p>On 2021-03-15, users 1, 2, and 3 each listened to songs 10, 11, 12 — ≥3 overlapping songs same day. Users 1 &amp; 2 are already friends, so they are excluded. Valid recommendations: (1,3), (3,1), (2,3), (3,2), etc.</p>", "shadow": {"gold": "WITH pairs AS (\n            SELECT a.user_id AS u, b.user_id AS v FROM Listens a JOIN Listens b\n              ON a.day = b.day AND a.song_id = b.song_id AND a.user_id < b.user_id\n            GROUP BY a.user_id, b.user_id HAVING COUNT(DISTINCT a.song_id) >= 3\n        ),\n        ordered AS (\n            SELECT u AS user_id, v AS rec FROM pairs\n            UNION\n            SELECT v, u FROM pairs\n        )\n        SELECT DISTINCT o.user_id, o.rec AS recommended_id\n        FROM ordered o\n        WHERE NOT EXISTS (\n            SELECT 1 FROM Friendship f WHERE\n              (f.user1_id = o.user_id AND f.user2_id = o.rec) OR\n              (f.user2_id = o.user_id AND f.user1_id = o.rec)\n        )\n        ORDER BY o.user_id, o.rec", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Already-friends pair is excluded", "hint": "Same-day ≥3 song overlap but existing friendship → must NOT be recommended.", "inserts": ["DELETE FROM Listens", "INSERT INTO Listens VALUES (10,1,'2024-01-01')", "INSERT INTO Listens VALUES (10,2,'2024-01-01')", "INSERT INTO Listens VALUES (10,3,'2024-01-01')", "INSERT INTO Listens VALUES (11,1,'2024-01-01')", "INSERT INTO Listens VALUES (11,2,'2024-01-01')", "INSERT INTO Listens VALUES (11,3,'2024-01-01')", "DELETE FROM Friendship", "INSERT INTO Friendship VALUES (10,11)"]}]}}, "dynamic-pivoting-of-a-table": {"title": "Dynamic Pivoting of a Table", "schemas": ["Create table If Not Exists Products (product_id int, store varchar(7), price int)", "DELETE FROM  Products", "insert into Products (product_id, store, price) values ('1', 'Shop', '110')", "insert into Products (product_id, store, price) values ('1', 'LC_Store', '100')", "insert into Products (product_id, store, price) values ('2', 'Nozama', '200')", "insert into Products (product_id, store, price) values ('2', 'Souq', '190')", "insert into Products (product_id, store, price) values ('3', 'Shop', '1000')", "insert into Products (product_id, store, price) values ('3', 'Souq', '1900')"], "content": "<p>Table: <code>Products(product_id, store, price)</code>. The sample uses store names <code>'store1'</code>, <code>'store2'</code>, <code>'store3'</code>.</p>\n<p>Pivot the table so each row is one <code>product_id</code> and each store becomes its own column holding that product's price. Use <code>NULL</code> for products not sold at that store.</p>\n<p>Output columns: <code>product_id</code>, <code>store1</code>, <code>store2</code>, <code>store3</code>. Order by <code>product_id</code>.</p>\n<h4>Classic pattern</h4>\n<pre>\nSELECT product_id,\n  SUM(CASE WHEN store='store1' THEN price END) AS store1,\n  SUM(CASE WHEN store='store2' THEN price END) AS store2,\n  SUM(CASE WHEN store='store3' THEN price END) AS store3\nFROM Products GROUP BY product_id;\n</pre>", "shadow": {"gold": "SELECT product_id,\n            SUM(CASE WHEN store='store1' THEN price END) AS store1,\n            SUM(CASE WHEN store='store2' THEN price END) AS store2,\n            SUM(CASE WHEN store='store3' THEN price END) AS store3\n        FROM Products GROUP BY product_id ORDER BY product_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Products with only one store", "hint": "NULL columns for missing stores.", "inserts": ["DELETE FROM Products", "INSERT INTO Products VALUES (5,'store1',50)", "INSERT INTO Products VALUES (6,'store2',60)", "INSERT INTO Products VALUES (7,'store3',70)"]}]}}, "average-selling-price": {"title": "Average Selling Price", "schemas": ["Create table If Not Exists Prices (product_id int, start_date date, end_date date, price int)", "Create table If Not Exists UnitsSold (product_id int, purchase_date date, units int)", "DELETE FROM  Prices", "insert into Prices (product_id, start_date, end_date, price) values ('1', '2019-02-17', '2019-02-28', '5')", "insert into Prices (product_id, start_date, end_date, price) values ('1', '2019-03-01', '2019-03-22', '20')", "insert into Prices (product_id, start_date, end_date, price) values ('2', '2019-02-01', '2019-02-20', '15')", "insert into Prices (product_id, start_date, end_date, price) values ('2', '2019-02-21', '2019-03-31', '30')", "DELETE FROM  UnitsSold", "insert into UnitsSold (product_id, purchase_date, units) values ('1', '2019-02-25', '100')", "insert into UnitsSold (product_id, purchase_date, units) values ('1', '2019-03-01', '15')", "insert into UnitsSold (product_id, purchase_date, units) values ('2', '2019-02-10', '200')", "insert into UnitsSold (product_id, purchase_date, units) values ('2', '2019-03-22', '30')"], "content": "<p>Table: <code>Prices</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| product_id    | int     |\n| start_date    | date    |\n| end_date      | date    |\n| price         | int     |\n+---------------+---------+\n(product_id, start_date, end_date) is the primary key (combination of columns with unique values) for this table.\nEach row of this table indicates the price of the product_id in the period from start_date to end_date.\nFor each product_id there will be no two overlapping periods. That means there will be no two intersecting periods for the same product_id.\n</pre>\n\n<p>&nbsp;</p>\n\n<p>Table: <code>UnitsSold</code></p>\n\n<pre>\n+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| product_id    | int     |\n| purchase_date | date    |\n| units         | int     |\n+---------------+---------+\nThis table may contain duplicate rows.\nEach row of this table indicates the date, units, and product_id of each product sold. \n</pre>\n\n<p>&nbsp;</p>\n\n<p>Write a solution to find the average selling price for each product. <code>average_price</code> should be <strong>rounded to 2 decimal places</strong>. If a product does not have any sold units, its average selling price is assumed to be 0.</p>\n\n<p>Return the result table in <strong>any order</strong>.</p>\n\n<p>The&nbsp;result format is in the following example.</p>\n\n<p>&nbsp;</p>\n<p><strong class=\"example\">Example 1:</strong></p>\n\n<pre>\n<strong>Input:</strong> \nPrices table:\n+------------+------------+------------+--------+\n| product_id | start_date | end_date   | price  |\n+------------+------------+------------+--------+\n| 1          | 2019-02-17 | 2019-02-28 | 5      |\n| 1          | 2019-03-01 | 2019-03-22 | 20     |\n| 2          | 2019-02-01 | 2019-02-20 | 15     |\n| 2          | 2019-02-21 | 2019-03-31 | 30     |\n+------------+------------+------------+--------+\nUnitsSold table:\n+------------+---------------+-------+\n| product_id | purchase_date | units |\n+------------+---------------+-------+\n| 1          | 2019-02-25    | 100   |\n| 1          | 2019-03-01    | 15    |\n| 2          | 2019-02-10    | 200   |\n| 2          | 2019-03-22    | 30    |\n+------------+---------------+-------+\n<strong>Output:</strong> \n+------------+---------------+\n| product_id | average_price |\n+------------+---------------+\n| 1          | 6.96          |\n| 2          | 16.96         |\n+------------+---------------+\n<strong>Explanation:</strong> \nAverage selling price = Total Price of Product / Number of products sold.\nAverage selling price for product 1 = ((100 * 5) + (15 * 20)) / 115 = 6.96\nAverage selling price for product 2 = ((200 * 15) + (30 * 30)) / 230 = 16.96\n</pre>", "shadow": {"gold": "SELECT p.product_id,\n            ROUND(COALESCE(1.0*SUM(p.price*u.units)/NULLIF(SUM(u.units),0), 0), 2) AS average_price\n        FROM Prices p LEFT JOIN UnitsSold u\n          ON u.product_id = p.product_id AND u.purchase_date BETWEEN p.start_date AND p.end_date\n        GROUP BY p.product_id ORDER BY p.product_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Product with no units sold", "hint": "ROUND(0, 2) = 0 when no units — not NULL.", "inserts": ["DELETE FROM Prices", "INSERT INTO Prices VALUES (99,'2024-01-01','2024-01-31',10)", "DELETE FROM UnitsSold"]}]}}, "number-of-comments-per-post": {"title": "Number of Comments per Post", "schemas": ["Create table If Not Exists Submissions (sub_id int, parent_id int)", "DELETE FROM  Submissions", "insert into Submissions (sub_id, parent_id) values ('1', NULL)", "insert into Submissions (sub_id, parent_id) values ('2', NULL)", "insert into Submissions (sub_id, parent_id) values ('1', NULL)", "insert into Submissions (sub_id, parent_id) values ('12', NULL)", "insert into Submissions (sub_id, parent_id) values ('3', '1')", "insert into Submissions (sub_id, parent_id) values ('5', '2')", "insert into Submissions (sub_id, parent_id) values ('3', '1')", "insert into Submissions (sub_id, parent_id) values ('4', '1')", "insert into Submissions (sub_id, parent_id) values ('9', '1')", "insert into Submissions (sub_id, parent_id) values ('10', '2')", "insert into Submissions (sub_id, parent_id) values ('6', '7')"], "content": "<div class=\"markdown-body div-width\" style=\"margin-top: 20px\">\n<div class=\"content__u3I1 question-content__JfgR\">\n<div class=\"sql-schema-wrapper__3VBi\"><a class=\"sql-schema-link__3cEg\">SQL Schema\n            <svg class=\"icon__3Su4\" height=\"1em\" viewbox=\"0 0 24 24\" width=\"1em\">\n<path d=\"M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z\" fill-rule=\"evenodd\"></path>\n</svg>\n</a></div>\n<div><p>Table: <code>Student</code></p>\n<pre>+---------------------+---------+\n| Column Name         | Type    |\n+---------------------+---------+\n| student_id          | int     |\n| student_name        | varchar |\n+---------------------+---------+\nstudent_id is the primary key for this table.\nstudent_name is the name of the student.</pre>\n<p> </p>\n<p>Table: <code>Exam</code></p>\n<pre>+---------------+---------+\n| Column Name   | Type    |\n+---------------+---------+\n| exam_id       | int     |\n| student_id    | int     |\n| score         | int     |\n+---------------+---------+\n(exam_id, student_id) is the primary key for this table.\nStudent with student_id got score points in exam with id exam_id.\n</pre>\n<p> </p>\n<p>A \"quite\" student is the one who took at least one exam and didn't score neither the\n                high score nor the low score.</p>\n<p>Write an SQL query to report the students (student_id, student_name) being \"quiet\" in\n                <strong>ALL</strong> exams.</p>\n<p>Don't return the student who has never taken any exam. Return the result table\n                <strong>ordered</strong> by student_id.</p>\n<p>The query result format is in the following example.</p>\n<p> </p>\n<pre>Student table:\n+-------------+---------------+\n| student_id  | student_name  |\n+-------------+---------------+\n| 1           | Daniel        |\n| 2           | Jade          |\n| 3           | Stella        |\n| 4           | Jonathan      |\n| 5           | Will          |\n+-------------+---------------+\n\nExam table:\n+------------+--------------+-----------+\n| exam_id    | student_id   | score     |\n+------------+--------------+-----------+\n| 10         |     1        |    70     |\n| 10         |     2        |    80     |\n| 10         |     3        |    90     |\n| 20         |     1        |    80     |\n| 30         |     1        |    70     |\n| 30         |     3        |    80     |\n| 30         |     4        |    90     |\n| 40         |     1        |    60     |\n| 40         |     2        |    70     |\n| 40         |     4        |    80     |\n+------------+--------------+-----------+\n\nResult table:\n+-------------+---------------+\n| student_id  | student_name  |\n+-------------+---------------+\n| 2           | Jade          |\n+-------------+---------------+\n\nFor exam 1: Student 1 and 3 hold the lowest and high score respectively.\nFor exam 2: Student 1 hold both highest and lowest score.\nFor exam 3 and 4: Studnet 1 and 4 hold the lowest and high score respectively.\nStudent 2 and 5 have never got the highest or lowest in any of the exam.\nSince student 5 is not taking any exam, he is excluded from the result.\nSo, we only return the information of Student 2.</pre>\n</div>\n</div>\n\n</div>", "shadow": {"gold": "SELECT p.sub_id AS post_id, COUNT(DISTINCT c.sub_id) AS number_of_comments\n        FROM Submissions p LEFT JOIN Submissions c ON c.parent_id = p.sub_id\n        WHERE p.parent_id IS NULL\n        GROUP BY p.sub_id ORDER BY p.sub_id", "cases": [{"name": "Base sample", "inserts": [], "hint": ""}, {"name": "Post with zero comments", "hint": "LEFT JOIN — every root post must appear with count 0 when nothing is child.", "inserts": ["DELETE FROM Submissions", "INSERT INTO Submissions VALUES (100,NULL)"]}]}}, "new-users-daily-count": {"title": "New Users Daily Count", "schemas": ["Create table If Not Exists Traffic (user_id int, activity VARCHAR(20), activity_date date)", "DELETE FROM  Traffic", "insert into Traffic (user_id, activity, activity_date) values ('1', 'login', '2019-05-01')", "insert into Traffic (user_id, activity, activity_date) values ('1', 'homepage', '2019-05-01')", "insert into Traffic (user_id, activity, activity_
