<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity SQL Sandbox</title>
    <!-- Alpine.js for logic -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- CodeMirror for SQL Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --surface: #1a1d27;
            --surface-hover: #262a3f;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(26, 29, 39, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .problem-title {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            flex-grow: 1;
            height: calc(100vh - 70px);
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .panel-header {
            background: rgba(0,0,0,0.2);
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-container { flex-grow: 1; overflow: auto; }
        .CodeMirror { height: 100%; font-family: 'Fira Code', monospace; font-size: 14px; background: transparent; padding: 10px; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.6); }
        .result-container { flex-grow: 1; overflow: auto; padding: 1rem; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.2); font-weight: 600; color: var(--text-muted); position: sticky; top: 0; }
        tr:hover td { background: var(--surface-hover); }
        
        .status-success { color: var(--success); font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .status-error { color: var(--danger); font-weight: 500; background: rgba(239,68,68,0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(239,68,68,0.2); }
        
        .schema-tree { font-size: 0.85rem; color: var(--text-muted); font-family: 'Fira Code', monospace; overflow: auto; padding: 1rem; flex-grow: 1; }
        .tbl-name { color: #818cf8; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }
        .col-name { margin-left: 1.5rem; color: #cbd5e1; }
        
        /* Layout logic */
        .right-pane { display: flex; flex-direction: column; gap: 1.5rem; }
        .output-panel { flex: 2; }
        .schema-panel { flex: 1; }
    </style>
</head>
<body x-data="sqlApp()">
    
    <header>
        <div class="brand">Antigravity SQL</div>
        <div class="problem-title" x-text="title">Loading...</div>
        <div></div>
    </header>

    <div class="container">
        <!-- Editor Panel -->
        <div class="panel">
            <div class="panel-header">
                <span>SQL Query</span>
                <button class="btn" @click="executeQuery()">▶ Run Code</button>
            </div>
            <div class="editor-container" id="editorWrapper"></div>
        </div>
        
        <!-- Right Column -->
        <div class="right-pane">
            <!-- Output Panel -->
            <div class="panel output-panel">
                <div class="panel-header">Result</div>
                <div class="result-container">
                    <template x-if="error">
                        <div class="status-error" x-html="'⚠️ ' + error"></div>
                    </template>
                    <template x-if="!error && executed && results.length > 0">
                        <div>
                            <div class="status-success">✅ Query executed successfully (0.01s)</div>
                            <table>
                                <thead>
                                    <tr>
                                        <template x-for="col in results[0].columns">
                                            <th x-text="col"></th>
                                        </template>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="row in results[0].values">
                                        <tr>
                                            <template x-for="val in row">
                                                <td x-text="val !== null ? val : 'null'"></td>
                                            </template>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                    <template x-if="!error && executed && results.length === 0">
                        <div class="status-success">✅ Query ran successfully but returned 0 rows.</div>
                    </template>
                </div>
            </div>
            
            <!-- Schema Panel -->
            <div class="panel schema-panel">
                <div class="panel-header">Database Schema</div>
                <div class="schema-tree" x-html="schemaHTML">Loading...</div>
            </div>
        </div>
    </div>

        document.addEventListener('alpine:init', () => {
            Alpine.data('sqlApp', () => ({
                slug: new URLSearchParams(window.location.search).get('slug') || '',
                title: 'SQL Interface',
                db: null,
                editor: null,
                error: null,
                executed: false,
                results: [],
                schemaHTML: '',
                
                async init() {
                    if (this.slug) {
                        this.title = this.slug.split('-').map(t => t.charAt(0).toUpperCase() + t.slice(1)).join(' ');
                    } else {
                        this.title = 'SQL Sandbox (No syntax provided)';
                        this.slug = Object.keys(schemas_db)[0];
                    }
                    
                    // Setup CodeMirror
                    this.editor = CodeMirror(document.getElementById('editorWrapper'), {
                        value: "-- Write your query here\nSELECT * FROM ...",
                        mode: "text/x-sql",
                        theme: "monokai",
                        lineNumbers: true,
                        matchBrackets: true,
                        indentUnit: 4
                    });
                    
                    // Boot sql.js
                    const SQL = await initSqlJs({
                        locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.wasm`
                    });
                    this.db = new SQL.Database();
                    
                    this.loadSchema();
                },
                
                loadSchema() {
                    const stmts = schemas_db[this.slug];
                    if (!stmts || stmts.length === 0) {
                        this.schemaHTML = "No schema data found for this problem.";
                        return;
                    }
                    
                    try {
                        stmts.forEach(s => this.db.run(s));
                        this.buildSchemaHTML();
                    } catch(e) {
                        console.error('Schema insertion err:', e);
                        this.schemaHTML = "Error loading schema: " + e;
                    }
                },
                
                buildSchemaHTML() {
                    let html = '';
                    const r = this.db.exec("SELECT name FROM sqlite_master WHERE type='table';");
                    if(r.length === 0) return;
                    
                    r[0].values.forEach(tbl => {
                        html += `<div class="tbl-name">🗄️ ${tbl[0]}</div>`;
                        const cols = this.db.exec(`PRAGMA table_info(${tbl[0]});`);
                        if(cols.length > 0) {
                            cols[0].values.forEach(c => {
                                html += `<div class="col-name">• ${c[1]}  <span style="opacity:0.5">(${c[2]})</span></div>`;
                            });
                        }
                    });
                    
                    this.schemaHTML = html;
                    
                    // Update editor placeholder to first table
                    if(r[0].values.length > 0) {
                        this.editor.setValue(`-- Write your query here\nSELECT * FROM ${r[0].values[0][0]};`);
                    }
                },
                
                executeQuery() {
                    this.executed = true;
                    this.error = null;
                    const query = this.editor.getValue();
                    try {
                        this.results = this.db.exec(query);
                    } catch (err) {
                        this.results = [];
                        this.error = err.message;
                    }
                }
            }));
        });
    </script>
